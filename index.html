    // Charge glow: yellow emissive overlay
    if (e.stunT > 0) {
      if (!e._stunKey) e._stunKey = {};
      const stunRing = getOrCreateMesh(e._stunKey, () => {
        const geo = new THREE.RingGeometry(e.r + 10, e.r + 13, 32);
        const mat = new THREE.MeshBasicMaterial({ color: 0x00ffff, transparent: true, opacity: 0.7, side: THREE.DoubleSide });
        return new THREE.Mesh(geo, mat);
      });
      const stunPulse = 0.5 + 0.5 * Math.sin(now * 0.01);
      stunRing.position.set(e.x, e.y, 10);
      stunRing.material.opacity = 0.4 + stunPulse * 0.4;
    } else if (e.charge > 0) {
      const chargePulse = 0.4 + 0.3 * Math.sin(now * 0.01);
      const chargeIntensity = Math.min(e.charge * 0.15, 0.8) + chargePulse * 0.2;
      mesh.material.emissive.setRGB(1, 1, 0);
      mesh.material.emissiveIntensity = chargeIntensity;
    } else if (e.stuck.length === 0) {
      mesh.material.emissive.set(e.color);
    }
  }

  // Saber swing arc visual
  if (player.saberSwingT > 0) {
    const swingArc = player.saberSwingArc || Math.PI / 5;
    const swingRange = player.saberSwingRange || 160;
    const swingMesh = getOrCreateMesh(saberSwingKey, () => {
      const geo = new THREE.RingGeometry(14, swingRange, 16, 1, -swingArc / 2, swingArc);
      const mat = new THREE.MeshBasicMaterial({ color: 0x00ffff, transparent: true, opacity: 0.5, side: THREE.DoubleSide });
      return new THREE.Mesh(geo, mat);
    });
    // Recreate geometry if arc/range changed from powerups
    const gp = swingMesh.geometry.parameters;
    if (Math.abs(gp.outerRadius - swingRange) > 1 || Math.abs(gp.thetaLength - swingArc) > 0.01) {
      swingMesh.geometry.dispose();
      swingMesh.geometry = new THREE.RingGeometry(14, swingRange, 16, 1, -swingArc / 2, swingArc);
    }
    const frac = player.saberSwingT / 0.2;
    swingMesh.position.set(player.x, player.y, 12);
    swingMesh.rotation.z = player.saberSwingAngle;
    swingMesh.material.opacity = frac * 0.7;
  }

  // Lance thrust visual — triangle with tip at far end
  if (player.lanceSwingT > 0) {
    const lanceRange = player.lanceSwingRange || 240;
    const lanceArc = player.lanceSwingArc || Math.PI / 12;
    const baseWidth = Math.sin(lanceArc / 2) * 160; // wide base near player
    function makeLanceShape() {
      const shape = new THREE.Shape();
      const startOff = 30;
      shape.moveTo(startOff, baseWidth);    // base top
      shape.lineTo(startOff, -baseWidth);   // base bottom
      shape.lineTo(lanceRange, 0);          // apex/tip
      shape.closePath();
      return shape;
    }
    const lanceMesh = getOrCreateMesh(lanceSwingKey, () => {
      const geo = new THREE.ShapeGeometry(makeLanceShape());
      const mat = new THREE.MeshBasicMaterial({ color: 0x44ff44, transparent: true, opacity: 0.5, side: THREE.DoubleSide });
      const m = new THREE.Mesh(geo, mat);
      m._lanceRange = lanceRange; m._baseWidth = baseWidth;
      return m;
    });
    if (lanceMesh._lanceRange !== lanceRange || lanceMesh._baseWidth !== baseWidth) {
      lanceMesh.geometry.dispose();
      lanceMesh.geometry = new THREE.ShapeGeometry(makeLanceShape());
      lanceMesh._lanceRange = lanceRange;
      lanceMesh._baseWidth = baseWidth;
    }
    const frac = player.lanceSwingT / 0.15;
    lanceMesh.position.set(player.x, player.y, 12);
    lanceMesh.rotation.z = player.lanceSwingAngle;
    lanceMesh.material.opacity = frac * 0.6;
  }

  // Stuck bullets
  for (let e of enemies) {
    for (let s of e.stuck) {
      const sm = getOrCreateMesh(s, () => new THREE.Mesh(stuckGeo, stuckMat.clone()));
      const pulse = 0.5 + 0.5 * Math.sin(s.pulseT * 8);
      sm.position.set(e.x + s.ox, e.y + s.oy, 8);
      sm.scale.setScalar(0.8 + pulse * 0.4);
      sm.material.color.setRGB(1, 0.5 + pulse * 0.3, pulse * 0.2);
    }
  }

  // Grenades
  for (let g of grenades) {
    // Ground shadow
    const shadowKey = 'gshadow_' + g.gid;
    const shadow = getOrCreateMesh({ _id: shadowKey }, () => {
      const sm = new THREE.Mesh(
        new THREE.CircleGeometry(8, 12),
        new THREE.MeshBasicMaterial({ color: 0x000000, transparent: true, opacity: 0.3 })
      );
      sm.rotation.x = 0;
      return sm;
    });
    shadow.position.set(g.x, g.y, 0.5);
    const sThrowDist = Math.sqrt((g.tx - g.sx) ** 2 + (g.ty - g.sy) ** 2);
    const maxArc = 30 + sThrowDist * 0.2;
    const zFrac = maxArc > 0 ? g.z / maxArc : 0;
    shadow.scale.setScalar(1.5 + zFrac * 0.5);
    shadow.material.opacity = 0.2 + zFrac * 0.1;

    const mesh = getOrCreateMesh(g, () => {
      const group = new THREE.Group();
      const body = new THREE.Mesh(new THREE.SphereGeometry(6, 8, 8), new THREE.MeshBasicMaterial({ color: 0x44ff44 }));
      body.scale.set(1, 0.6, 0.6); // oblong shape
      group.add(body);
      const ring = new THREE.Mesh(new THREE.TorusGeometry(11, 1, 4, 8), new THREE.MeshBasicMaterial({ color: 0x88ff88, transparent: true, opacity: 0.5 }));
      ring.name = 'gring';
      group.add(ring);
      return group;
    });
    const frac = Math.min(g.t / g.dur, 1);
    const lobHeight = Math.sin(frac * Math.PI) * 60;
    const lobScale = 1 + 0.8 * Math.sin(frac * Math.PI);
    mesh.position.set(g.x, g.y + lobHeight, 10 + g.z);
    mesh.scale.setScalar(lobScale);
    mesh.rotation.z = frac * Math.PI * 8;
    mesh.rotation.x = frac * Math.PI * 5;
    const gring = mesh.getObjectByName('gring');
    if (gring) { gring.rotation.z = now * 0.01; gring.rotation.x = now * 0.007; }
  }

  // Bullets
  for (let b of bullets) {
    const mesh = getOrCreateMesh(b, () => {
      if (b.shrapnel) {
        const m = new THREE.Mesh(shrapnelGeo, shrapnelMat.clone());
        const ring = new THREE.Mesh(shrapnelRingGeo, shrapnelRingMat.clone());
        ring.name = 'ring';
        m.add(ring);
        return m;
      }
      if (b.spear) {
        const g = new THREE.Group();
        // Outer aura glow
        const aura = new THREE.Mesh(new THREE.CircleGeometry(80, 24), new THREE.MeshBasicMaterial({ color: 0x22ff22, transparent: true, opacity: 0.1, side: THREE.DoubleSide }));
        g.add(aura);
        // Mid glow ring
        const glow2 = new THREE.Mesh(new THREE.RingGeometry(40, 85, 24), new THREE.MeshBasicMaterial({ color: 0x44ff44, transparent: true, opacity: 0.15, side: THREE.DoubleSide }));
        g.add(glow2);
        // Main diamond shape — blunt rear
        const shape = new THREE.Shape();
        shape.moveTo(-30, 15);
        shape.lineTo(0, 25);
        shape.lineTo(60, 0);
        shape.lineTo(0, -25);
        shape.lineTo(-30, -15);
        shape.lineTo(-35, 0);
        shape.closePath();
        g.add(new THREE.Mesh(new THREE.ShapeGeometry(shape), new THREE.MeshBasicMaterial({ color: 0x44ff44, transparent: true, opacity: 0.8 })));
        // Inner bright core
        const coreShape = new THREE.Shape();
        coreShape.moveTo(-20, 0);
        coreShape.lineTo(0, 12);
        coreShape.lineTo(40, 0);
        coreShape.lineTo(0, -12);
        coreShape.closePath();
        g.add(new THREE.Mesh(new THREE.ShapeGeometry(coreShape), new THREE.MeshBasicMaterial({ color: 0xccffcc, transparent: true, opacity: 0.9 })));
        // Bright center point
        const center = new THREE.Mesh(new THREE.CircleGeometry(6, 12), new THREE.MeshBasicMaterial({ color: 0xffffff, transparent: true, opacity: 0.9 }));
        g.add(center);
        // Outer glow ring
        const glow = new THREE.Mesh(new THREE.RingGeometry(50, 75, 16), new THREE.MeshBasicMaterial({ color: 0x44ff44, transparent: true, opacity: 0.25, side: THREE.DoubleSide }));
        g.add(glow);
        return g;
      }
      if (b.mega) {
        const group = new THREE.Group();
        const core = new THREE.Mesh(new THREE.SphereGeometry(9, 8, 8), new THREE.MeshBasicMaterial({ color: 0xffff00 }));
        group.add(core);
        const glow = new THREE.Mesh(new THREE.SphereGeometry(13, 8, 8), new THREE.MeshBasicMaterial({ color: 0xffaa00, transparent: true, opacity: 0.3 }));
        glow.name = 'mglow';
        group.add(glow);
        return group;
      }
      return new THREE.Mesh(bulletGeo, bulletMat);
    });
    mesh.position.set(b.x, b.y, 4);
    if (b.spear) {
      mesh.rotation.z = Math.atan2(b.vy, b.vx);
      const pulse = 1.9 + 0.15 * Math.sin(now * 0.006);
      const shrink = b.spearScale != null ? b.spearScale : 1;
      mesh.scale.setScalar(pulse * shrink);
      // Prismatic shimmer — fast, green-blue
      const sh = now * 0.006;
      const r = Math.sin(sh) * 0.1 + 0.1;
      const g = Math.sin(sh * 1.3) * 0.2 + 0.75;
      const bl = Math.sin(sh * 0.9 + 2) * 0.3 + 0.45;
      if (mesh.children) {
        // Outer aura
        if (mesh.children[0]) {
          mesh.children[0].material.opacity = 0.08 + 0.06 * Math.sin(sh * 1.5);
          mesh.children[0].material.color.setRGB(r * 0.5, g, bl * 0.5);
        }
        // Mid glow ring
        if (mesh.children[1]) {
          mesh.children[1].material.opacity = 0.12 + 0.1 * Math.sin(sh * 2.1);
          mesh.children[1].material.color.setRGB(r * 0.4 + 0.1, g * 0.9 + 0.1, bl * 0.4 + 0.1);
        }
        // Main diamond
        if (mesh.children[2]) {
          mesh.children[2].material.color.setRGB(r * 0.3 + 0.1, g * 0.8 + 0.2, bl * 0.3 + 0.1);
        }
        // Inner core
        if (mesh.children[3]) {
          mesh.children[3].material.color.setRGB(r * 0.2 + 0.6, g * 0.2 + 0.8, bl * 0.2 + 0.6);
        }
        // Bright center
        if (mesh.children[4]) {
          mesh.children[4].material.opacity = 0.7 + 0.3 * Math.sin(sh * 3);
          mesh.children[4].material.color.setRGB(0.8 + 0.2 * Math.sin(sh * 2.5), 1, 0.8 + 0.2 * Math.sin(sh * 1.8));
        }
        // Outer glow ring
        if (mesh.children[5]) {
          mesh.children[5].material.opacity = 0.15 + 0.15 * Math.sin(sh * 1.7);
          mesh.children[5].material.color.setRGB(r * 0.3, g * 0.8 + 0.2, bl * 0.3);
        }
      }
    } else if (!b.shrapnel && !b.mega) {
      mesh.scale.setScalar(b.r / 4);
    }
    if (b.shrapnel) {
      const pulse = 0.6 + 0.4 * Math.sin(now * 0.012 + b.x);
      mesh.scale.setScalar(0.8 + pulse * 0.3);
      if (b.grenadeShrapnel) {
        mesh.material.color.setRGB(1, 0.15 + pulse * 0.15, pulse * 0.05);
      } else {
        mesh.material.color.setRGB(1, 0.4 + pulse * 0.4, pulse * 0.1);
      }
      const ring = mesh.getObjectByName('ring');
      if (ring) { ring.rotation.x = now * 0.005; ring.rotation.y = now * 0.003; ring.material.opacity = 0.3 + pulse * 0.3; }
    }
    if (b.mega) {
      const mglow = mesh.getObjectByName('mglow');
      if (mglow) {
        const pulse = 0.5 + 0.5 * Math.sin(now * 0.01 + b.x);
        mglow.scale.setScalar(0.9 + pulse * 0.3);
        mglow.material.opacity = 0.2 + pulse * 0.15;
      }
    }
  }

  // Explosions
  const sortedExp = explosions.slice().sort((a, b) => b.maxR - a.maxR);
  let li = 0;
  for (const l of expLights) l.visible = false;
  for (let ex of sortedExp) {
    const sides = ex.sides || 6;
    const mesh = getOrCreateMesh(ex, () => {
      function makeIrregularPoly(sides) {
        const shape = new THREE.Shape();
        for (let i = 0; i < sides; i++) {
          const angle = (Math.PI * 2 / sides) * i;
          const r = 0.7 + Math.random() * 0.3;
          const x = Math.cos(angle) * r, y = Math.sin(angle) * r;
          if (i === 0) shape.moveTo(x, y); else shape.lineTo(x, y);
        }
        shape.closePath();
        return new THREE.ShapeGeometry(shape);
      }
      const polyGeo = makeIrregularPoly(sides);
      const m = new THREE.Mesh(polyGeo, new THREE.MeshBasicMaterial({ color: 0xff8800, transparent: true, opacity: 1.0 }));
      const coreGeo = makeIrregularPoly(sides);
      const core = new THREE.Mesh(coreGeo, explosionCoreMat.clone());
      core.name = 'core';
      m.add(core);
      return m;
    });
    const alpha = 1 - ex.t / ex.dur;
    mesh.position.set(ex.x, ex.y, 2);
    mesh.scale.setScalar(Math.max(0.1, ex.r));
    mesh.rotation.z = ex.rot || 0;
    if (ex.spearBirth) {
      const frac = ex.t / ex.dur;
      const visualMax = ex.maxR * 1.5;
      const innerR = frac * visualMax * 0.6;
      const outerR = frac * visualMax;
      if (mesh.geometry) mesh.geometry.dispose();
      // Forward-facing arc (90 degree cone)
      const arcAngle = Math.PI * 0.5;
      const startAngle = (ex.angle || 0) - arcAngle / 2;
      mesh.geometry = new THREE.RingGeometry(innerR, outerR, 24, 1, startAngle, arcAngle);
      const fade = (1 - frac) * (1 - frac);
      mesh.material.opacity = fade * 0.7;
      mesh.material.color.setRGB(0.2, 0.9, 0.3);
      mesh.scale.setScalar(1);
      const core = mesh.getObjectByName('core');
      if (core) { core.visible = false; }
    } else if (ex.repel) {
      ex.x = player.x; ex.y = player.y;
      mesh.position.set(player.x, player.y, 2);
      const frac = ex.t / ex.dur;
      const visualMax = ex.maxR * 1.6;
      const innerR = frac * visualMax * 0.75;
      const outerR = frac * visualMax;
      if (mesh.geometry) mesh.geometry.dispose();
      mesh.geometry = new THREE.RingGeometry(innerR, outerR, 48);
      mesh.material.opacity = (1 - frac) * (1 - frac);
      mesh.material.color.setRGB(0, 1, 1);
      mesh.scale.setScalar(1);
      const core = mesh.getObjectByName('core');
      if (core) { core.visible = false; }
    } else if (ex.indicator) {
      mesh.material.opacity = alpha * 0.25;
      mesh.material.color.setRGB(1, 0.15, 0.1);
      const core = mesh.getObjectByName('core');
      if (core) { core.scale.setScalar(0.92); core.material.opacity = 0; }
    } else {
      mesh.material.opacity = Math.max(alpha, 0.4);
      mesh.material.color.setHSL(0.08 - alpha * 0.02, 1, 0.50 + alpha * 0.2);
      const core = mesh.getObjectByName('core');
      if (core) { core.scale.setScalar(0.5); core.material.opacity = Math.max(alpha, 0.5); }
    }
    if (li < MAX_EXP_LIGHTS && !ex.repel && !ex.spearBirth) {
      const lt = expLights[li++];
      lt.visible = true;
      lt.position.set(ex.x, ex.y, 30);
      lt.intensity = alpha * 3 * (ex.maxR / 50);
      lt.distance = Math.min(ex.r * 3, 300);
    }
  }

  // Powerups
  for (let p of powerups) {
    const fade = p.life < 3 ? 0.3 + 0.7 * (p.life / 3) : 1;
    const blink = p.life < 3 && Math.floor(p.life * 6) % 2 === 0;
    const mesh = getOrCreateMesh(p, () => {
      const group = new THREE.Group();
      if (p.isWeapon) {
        // Weapon: box core with diamond ring
        const core = new THREE.Mesh(
          new THREE.BoxGeometry(10, 10, 10),
          new THREE.MeshBasicMaterial({ color: new THREE.Color(p.color), transparent: true })
        );
        core.name = 'pcore';
        group.add(core);
        // Diamond ring (4-sided)
        const ringGeo = new THREE.RingGeometry(16, 20, 4);
        const ringMat = new THREE.MeshBasicMaterial({ color: new THREE.Color(p.color), transparent: true, opacity: 0.7, side: THREE.DoubleSide });
        const ring = new THREE.Mesh(ringGeo, ringMat);
        ring.name = 'pring';
        group.add(ring);
        // Outer diamond glow
        const glowGeo = new THREE.RingGeometry(22, 28, 4);
        const glowMat = new THREE.MeshBasicMaterial({ color: new THREE.Color(p.color), transparent: true, opacity: 0.3, side: THREE.DoubleSide });
        const glow = new THREE.Mesh(glowGeo, glowMat);
        glow.name = 'pglow';
        group.add(glow);
      } else {
        // Powerup: octahedron core with round rings
        const core = new THREE.Mesh(
          new THREE.OctahedronGeometry(8, 0),
          new THREE.MeshBasicMaterial({ color: new THREE.Color(p.color), transparent: true })
        );
        core.name = 'pcore';
        group.add(core);
        const ringGeo = new THREE.RingGeometry(14, 17, 24);
        const ringMat = new THREE.MeshBasicMaterial({ color: new THREE.Color(p.color), transparent: true, opacity: 0.6, side: THREE.DoubleSide });
        const ring = new THREE.Mesh(ringGeo, ringMat);
        ring.name = 'pring';
        group.add(ring);
        const glowGeo = new THREE.RingGeometry(18, 24, 24);
        const glowMat = new THREE.MeshBasicMaterial({ color: new THREE.Color(p.color), transparent: true, opacity: 0.25, side: THREE.DoubleSide });
        const glow = new THREE.Mesh(glowGeo, glowMat);
        glow.name = 'pglow';
        group.add(glow);
      }
      return group;
    });
    mesh.visible = !blink;
    const bobZ = 5 + Math.sin(p.bobT * 4) * 4;
    mesh.position.set(p.x, p.y, bobZ);
    const pcore = mesh.getObjectByName('pcore');
    if (pcore) {
      pcore.rotation.z = now * 0.003;
      pcore.rotation.y = now * 0.002;
      pcore.material.opacity = fade;
    }
    const pring = mesh.getObjectByName('pring');
    if (pring) {
      const pulse = 0.8 + 0.4 * Math.sin(now * 0.006);
      pring.scale.setScalar(pulse);
      pring.material.opacity = fade * 0.6 * pulse;
      pring.rotation.z = -now * 0.002;
    }
    const pglow = mesh.getObjectByName('pglow');
    if (pglow) {
      const pulse2 = 0.7 + 0.5 * Math.sin(now * 0.004 + 1);
      pglow.scale.setScalar(pulse2);
      pglow.material.opacity = fade * 0.2 * pulse2;
      pglow.rotation.z = now * 0.001;
    }
  }

  // Particles
  let pIdx = 0;
  const pCount = Math.min(particles.length, maxParticles3D);
  for (let i = 0; i < pCount; i++) {
    const p = particles[i];
    const alpha = p.life / p.maxLife;
    const s = p.size * alpha;
    dummyMatrix.makeScale(s, s, s);
    dummyMatrix.setPosition(p.x, p.y, 2);
    particleInstanced.setMatrixAt(pIdx, dummyMatrix);
    dummyColor.set(p.color);
    particleInstanced.setColorAt(pIdx, dummyColor);
    pIdx++;
  }
  particleInstanced.count = pIdx;
  if (pIdx > 0) {
    particleInstanced.instanceMatrix.needsUpdate = true;
    if (particleInstanced.instanceColor) particleInstanced.instanceColor.needsUpdate = true;
  }

  cleanupMeshes();
  renderer.render(scene, camera);
}

// ============ HUD ============
function drawHUD(now) {
  ctx.clearRect(0, 0, W, H);

  // Enemy health bars (large enemies)
  for (let e of enemies) {
    if ((e.sizeClass || 0) < 1 || e.hp <= 0) continue;
    const sx = W / 2 + (e.x - player.x);
    const sy = H / 2 - (e.y - player.y) - e.r - 8;
    const bw = [0, 36, 44, 56, 70][e.sizeClass] || 36;
    const bh = e.sizeClass >= 3 ? 5 : 4;
    const frac = e.hp / e.maxHp;
    ctx.fillStyle = 'rgba(0,0,0,0.5)';
    ctx.fillRect(sx - bw / 2, sy, bw, bh);
    ctx.fillStyle = frac > 0.5 ? '#4f4' : frac > 0.25 ? '#ff4' : '#f44';
    ctx.fillRect(sx - bw / 2, sy, bw * frac, bh);
  }

  // Charge count display above enemies
  for (let e of enemies) {
    if (!e.charge || e.charge <= 0 || e.hp <= 0) continue;
    const sx = W / 2 + (e.x - player.x);
    const hasBar = (e.sizeClass || 0) >= 1;
    const sy = H / 2 - (e.y - player.y) - e.r - (hasBar ? 22 : 12);
    const pulse = 0.7 + 0.3 * Math.sin(performance.now() * 0.008);
    ctx.globalAlpha = pulse;
    ctx.fillStyle = '#ff0';
    ctx.font = 'bold 12px monospace';
    ctx.textAlign = 'center';
    ctx.fillText(`⚡${e.charge}`, sx, sy);
    ctx.globalAlpha = 1;
    ctx.textAlign = 'left';
  }

  // Floating texts (convert world to screen)
  for (let ft of floatingTexts) {
    const holdTime = 0.35;
    const alpha = ft.t < holdTime ? 1 : 1 - (ft.t - holdTime) / (ft.dur - holdTime);
    const sx = W / 2 + (ft.x - player.x);
    const sy = H / 2 - (ft.y - player.y);
    ctx.globalAlpha = alpha;
    ctx.fillStyle = ft.color;
    ctx.font = `bold ${ft.size}px monospace`;
    ctx.textAlign = 'center';
    ctx.fillText(ft.text, sx, sy);
  }
  ctx.globalAlpha = 1;
  ctx.textAlign = 'left';

  // Powerup/weapon drop labels
  ctx.textAlign = 'center';
  ctx.font = 'bold 10px monospace';
  for (let p of powerups) {
    const sx = W / 2 + (p.x - player.x);
    const sy = H / 2 - (p.y - player.y) + 28;
    const fade = p.life < 3 ? 0.3 + 0.7 * (p.life / 3) : 1;
    const blink = p.life < 3 && Math.floor(p.life * 6) % 2 === 0;
    if (blink) continue;
    ctx.globalAlpha = fade * 0.9;
    ctx.fillStyle = p.color;
    ctx.fillText(p.label, sx, sy);
  }
  ctx.globalAlpha = 1;
  ctx.textAlign = 'left';

  // Wave announcement
  if (waveAnnounce) {
    const wa = waveAnnounce;
    const alpha = wa.t < 0.3 ? wa.t / 0.3 : wa.t > wa.dur - 0.5 ? (wa.dur - wa.t) / 0.5 : 1;
    ctx.globalAlpha = alpha;
    ctx.fillStyle = wa.color;
    ctx.font = 'bold 36px monospace';
    ctx.textAlign = 'center';
    ctx.fillText(wa.text, W / 2, H / 2 - 80);
    ctx.textAlign = 'left';
    ctx.globalAlpha = 1;
  }

  // Score & high score
  ctx.fillStyle = '#fff'; ctx.font = '14px monospace';
  ctx.fillText(`SCORE: ${score}`, 10, 20);
  ctx.fillStyle = '#888'; ctx.font = '11px monospace';
  ctx.fillText(`HI: ${highScore}`, 10 + String(score).length * 8 + 70, 20);

  // Level-up glow around player
  if (levelUpTimer > 0) {
    const glowFrac = levelUpTimer / 1.8;
    const pulseR = 60 + 50 * (1 - glowFrac) + 15 * Math.sin(now * 0.015);

    // Outer glow
    const grad = ctx.createRadialGradient(W / 2, H / 2, 5, W / 2, H / 2, pulseR);
    grad.addColorStop(0, `rgba(255,230,60,${0.8 * glowFrac})`);
    grad.addColorStop(0.3, `rgba(255,200,40,${0.6 * glowFrac})`);
    grad.addColorStop(0.7, `rgba(255,160,20,${0.3 * glowFrac})`);
    grad.addColorStop(1, `rgba(255,120,0,0)`);
    ctx.fillStyle = grad;
    ctx.beginPath(); ctx.arc(W / 2, H / 2, pulseR, 0, Math.PI * 2); ctx.fill();

    // Inner bright core
    const coreR = 25 + 10 * Math.sin(now * 0.02);
    const coreGrad = ctx.createRadialGradient(W / 2, H / 2, 0, W / 2, H / 2, coreR);
    coreGrad.addColorStop(0, `rgba(255,255,200,${0.9 * glowFrac})`);
    coreGrad.addColorStop(1, `rgba(255,220,50,0)`);
    ctx.fillStyle = coreGrad;
    ctx.beginPath(); ctx.arc(W / 2, H / 2, coreR, 0, Math.PI * 2); ctx.fill();

    // "LEVEL UP!" text with shadow
    const textAlpha = Math.min(1, (1.8 - levelUpTimer) * 2.5);
    ctx.globalAlpha = textAlpha;
    ctx.textAlign = 'center';
    ctx.shadowColor = '#fd0';
    ctx.shadowBlur = 20;
    ctx.fillStyle = '#fff'; ctx.font = 'bold 28px monospace';
    ctx.fillText('LEVEL UP!', W / 2, H / 2 - 45);
    ctx.fillStyle = '#fd0'; ctx.font = 'bold 16px monospace';
    ctx.fillText(`Level ${playerLevel}`, W / 2, H / 2 - 22);
    ctx.shadowBlur = 0;
    ctx.globalAlpha = 1;
    ctx.textAlign = 'left';
  }

  // HP & XP bars under player
  {
    const px = W / 2, py = H / 2 + 28;
    const barW = 40, barH = 4;

    // HP bar
    ctx.fillStyle = '#333';
    ctx.fillRect(px - barW / 2, py, barW, barH);
    ctx.fillStyle = '#f44';
    ctx.fillRect(px - barW / 2, py, barW * (player.hp / player.maxHp), barH);

    // XP bar
    ctx.fillStyle = '#222';
    ctx.fillRect(px - barW / 2, py + barH + 1, barW, 3);
    ctx.fillStyle = '#af4';
    ctx.fillRect(px - barW / 2, py + barH + 1, barW * (xp / xpToNext), 3);

    // Level label
    ctx.fillStyle = '#af4'; ctx.font = 'bold 9px monospace'; ctx.textAlign = 'center';
    ctx.fillText(`LV${playerLevel}`, px, py + barH + 12);

    ctx.textAlign = 'left';
  }

  // Combo
  if (combo > 1) {
    const mult = Math.min(1 + Math.floor(combo / 3), 8);
    const pulse = 0.8 + 0.2 * Math.sin(now / 100);
    ctx.fillStyle = mult >= 5 ? '#f4f' : mult >= 3 ? '#ff4' : '#4ff';
    ctx.globalAlpha = pulse;
    ctx.font = `bold ${16 + mult}px monospace`;
    ctx.fillText(`${combo} COMBO x${mult}`, W - 180, 22);
    ctx.fillStyle = '#333'; ctx.fillRect(W - 180, 28, 100, 4);
    ctx.fillStyle = mult >= 5 ? '#f4f' : mult >= 3 ? '#ff4' : '#4ff';
    ctx.fillRect(W - 180, 28, 100 * (comboTimer / 2), 4);
    ctx.globalAlpha = 1;
  }

  // Weapon & powerup bar (bottom center)
  {
    const activeItems = [];
    // Weapon first
    const wLabel = player.lance > 0 ? 'LANCE' : player.saber > 0 ? 'SABER' : player.shotgun > 0 ? 'SHOTGUN' : player.minigun > 0 ? 'MINIGUN' : player.grenade > 0 ? 'GRENADE' : 'PISTOL';
    const wColor = player.lance > 0 ? '#4f4' : player.saber > 0 ? '#0ff' : player.shotgun > 0 ? '#f84' : player.minigun > 0 ? '#ff4' : player.grenade > 0 ? '#4f4' : '#4af';
    const wTime = player.lance > 0 ? player.lance : player.saber > 0 ? player.saber : player.shotgun > 0 ? player.shotgun : player.minigun > 0 ? player.minigun : player.grenade > 0 ? player.grenade : -1;
    activeItems.push({ label: wLabel, color: wColor, t: wTime, max: 10, isWeapon: true });
    // Powerups
    if (player.spread > 0) activeItems.push({ label: 'SPREAD', color: '#4ff', t: player.spread, max: 12 });
    if (player.rapid > 0) activeItems.push({ label: 'RAPID', color: '#f4f', t: player.rapid, max: 10 });
    if (player.megablast > 0) activeItems.push({ label: 'MEGA', color: '#ff4', t: player.megablast, max: 10 });
    if (player.shield > 0) activeItems.push({ label: 'SHIELD', color: '#ff8', t: player.shield, max: 8 });
    if (player.ricochet > 0) activeItems.push({ label: 'RICOCHET', color: '#f84', t: player.ricochet, max: 10 });
    if (player.homing > 0) activeItems.push({ label: 'HOMING', color: '#8ff', t: player.homing, max: 8 });
    if (player.overcharge > 0) activeItems.push({ label: 'OVERCHARGE', color: '#fa0', t: player.overcharge, max: 10 });

    const barW = 150, barH = 22, gap = 10;
    const totalH = activeItems.length * barH + (activeItems.length - 1) * gap;
    const bx = W / 2 - barW / 2;
    const startY = H - 75 - totalH;

    for (let i = 0; i < activeItems.length; i++) {
      const item = activeItems[i];
      const by = startY + i * (barH + gap);

      // Background
      ctx.fillStyle = 'rgba(0,0,0,0.5)';
      ctx.fillRect(bx, by, barW, barH);

      // Duration fill (pistol has no timer)
      if (item.t > 0) {
        const frac = Math.min(item.t / item.max, 1);
        ctx.fillStyle = item.color;
        ctx.globalAlpha = 0.35;
        ctx.fillRect(bx, by, barW * frac, barH);
        ctx.globalAlpha = 1;
      }

      // Border
      ctx.strokeStyle = item.color;
      ctx.lineWidth = item.isWeapon ? 2 : 1;
      ctx.strokeRect(bx, by, barW, barH);

      // Label
      ctx.fillStyle = item.color; ctx.font = 'bold 14px monospace'; ctx.textAlign = 'center';
      ctx.fillText(item.label, bx + barW / 2, by + 16);
    }
    ctx.textAlign = 'left';
  }

  // Stuck count
  let totalStuck = 0;
  for (let e of enemies) totalStuck += e.stuck.length;
  if (totalStuck > 0) {
    const pulse = 0.7 + 0.3 * Math.sin(now / 200);
    ctx.fillStyle = `rgba(255,128,0,${pulse})`;
    ctx.font = 'bold 16px monospace';
    ctx.textAlign = 'center';
    ctx.fillText(`STUCK: ${totalStuck}`, W / 2, 20);
    ctx.fillStyle = '#f80'; ctx.font = '12px monospace';
    ctx.fillText('[X/SHIFT/RIGHT-CLICK to DETONATE]', W / 2, 34);
    ctx.textAlign = 'left';
  }

  // Wave
  ctx.fillStyle = '#666'; ctx.font = '11px monospace';
  ctx.fillText(`WAVE ${waveNum}`, W - 70, 14);

  // Minimap
  {
    const mmR = 60; // minimap radius
    const mmX = W - mmR - 15, mmY = H - mmR - 25;
    const scale = mmR / ARENA_R;

    // Background
    ctx.globalAlpha = 0.4;
    ctx.fillStyle = '#111';
    ctx.beginPath(); ctx.arc(mmX, mmY, mmR, 0, Math.PI * 2); ctx.fill();
    ctx.strokeStyle = '#446'; ctx.lineWidth = 1;
    ctx.beginPath(); ctx.arc(mmX, mmY, mmR, 0, Math.PI * 2); ctx.stroke();
    ctx.globalAlpha = 1;

    // Enemies
    for (let e of enemies) {
      const ex = mmX + e.x * scale, ey = mmY - e.y * scale;
      const er = Math.max(1.5, e.r * scale * 0.5);
      ctx.fillStyle = e.stuck.length > 0 ? '#fa0' : e.color;
      ctx.beginPath(); ctx.arc(ex, ey, er, 0, Math.PI * 2); ctx.fill();
    }

    // Powerups
    for (let p of powerups) {
      const px2 = mmX + p.x * scale, py2 = mmY - p.y * scale;
      ctx.fillStyle = p.color;
      ctx.fillRect(px2 - 1.5, py2 - 1.5, 3, 3);
    }

    // Player
    ctx.fillStyle = '#4af';
    const ppx = mmX + player.x * scale, ppy = mmY - player.y * scale;
    ctx.beginPath(); ctx.arc(ppx, ppy, 3, 0, Math.PI * 2); ctx.fill();
  }

  // Controls
  ctx.fillStyle = 'rgba(255,255,255,0.3)'; ctx.font = '11px monospace';
  ctx.fillText('WASD: Move | Mouse: Aim & Shoot | Right-Click/X: Detonate | R: Restart', W / 2 - 250, H - 10);

  // Active skills (left side)
  if (perksPicked.length > 0) {
    const perkCounts = {};
    for (const pid of perksPicked) perkCounts[pid] = (perkCounts[pid] || 0) + 1;
    const entries = Object.entries(perkCounts);
    const skillX = 12;
    let skillY = 50;
    ctx.fillStyle = 'rgba(255,255,255,0.4)'; ctx.font = 'bold 11px monospace';
    ctx.fillText('SKILLS', skillX, skillY);
    skillY += 16;
    for (const [pid, cnt] of entries) {
      const pdef = ALL_PERKS.find(p => p.id === pid);
      if (!pdef) continue;
      ctx.fillStyle = pdef.color; ctx.font = '12px monospace';
      ctx.fillText(`${pdef.label}`, skillX, skillY);
      if (cnt > 1) {
        ctx.fillStyle = '#fff'; ctx.font = 'bold 12px monospace';
        ctx.fillText(` x${cnt}`, skillX + ctx.measureText(pdef.label).width, skillY);
      }
      skillY += 16;
    }
  }

  // Perk selection screen
  if (perkChoices) {
    ctx.fillStyle = 'rgba(0,0,0,0.75)'; ctx.fillRect(0, 0, W, H);

    ctx.fillStyle = '#af4'; ctx.font = 'bold 30px monospace'; ctx.textAlign = 'center';
    ctx.fillText(`LEVEL UP! (Lv ${playerLevel})`, W / 2, H / 2 - 110);
    ctx.fillStyle = '#fff'; ctx.font = '14px monospace';
    ctx.fillText('Choose a perk (click or press 1/2/3)', W / 2, H / 2 - 80);

    const cardW = 200, cardH = 140, gap = 30;
    const totalW = perkChoices.length * cardW + (perkChoices.length - 1) * gap;
    const startX = W / 2 - totalW / 2;
    const cardY = H / 2 - cardH / 2 + 20;

    for (let i = 0; i < perkChoices.length; i++) {
      const perk = perkChoices[i];
      const cx = startX + i * (cardW + gap);
      const stacks = getPerkCount(perk.id);

      // Card hover detection
      const hovered = mouse.sx >= cx && mouse.sx <= cx + cardW && mouse.sy >= cardY && mouse.sy <= cardY + cardH;

      // Card background
      ctx.fillStyle = hovered ? 'rgba(60,60,80,0.95)' : 'rgba(30,30,50,0.95)';
      ctx.fillRect(cx, cardY, cardW, cardH);
      ctx.strokeStyle = perk.color;
      ctx.lineWidth = hovered ? 3 : 1.5;
      ctx.strokeRect(cx, cardY, cardW, cardH);

      // Number
      ctx.fillStyle = 'rgba(255,255,255,0.3)'; ctx.font = 'bold 16px monospace';
      ctx.textAlign = 'left';
      ctx.fillText(`[${i + 1}]`, cx + 8, cardY + 22);

      // Icon
      ctx.fillStyle = perk.color; ctx.font = 'bold 22px monospace';
      ctx.textAlign = 'center';
      ctx.fillText(perk.icon, cx + cardW / 2, cardY + 38);

      // Label
      ctx.fillStyle = '#fff'; ctx.font = 'bold 13px monospace';
      ctx.fillText(perk.label, cx + cardW / 2, cardY + 62);

      // Description (word wrap)
      ctx.fillStyle = '#aaa'; ctx.font = '11px monospace';
      const words = perk.desc.split(' ');
      let line = '', ly = cardY + 82;
      for (const w of words) {
        const test = line + (line ? ' ' : '') + w;
        if (ctx.measureText(test).width > cardW - 20) {
          ctx.fillText(line, cx + cardW / 2, ly); ly += 14; line = w;
        } else { line = test; }
      }
      if (line) ctx.fillText(line, cx + cardW / 2, ly);

      // Stack count
      if (stacks > 0) {
        ctx.fillStyle = perk.color; ctx.font = '10px monospace';
        ctx.fillText(`(owned: ${stacks})`, cx + cardW / 2, cardY + cardH - 8);
      }
    }

    ctx.textAlign = 'left';
  }

  // Paused
  if (paused && !debugMenu) {
    ctx.fillStyle = 'rgba(0,0,0,0.6)'; ctx.fillRect(0, 0, W, H);
    ctx.fillStyle = '#fff'; ctx.font = 'bold 36px monospace'; ctx.textAlign = 'center';
    ctx.fillText('PAUSED', W / 2, H / 2 - 10);
    ctx.fillStyle = '#aaa'; ctx.font = '14px monospace';
    ctx.fillText('Click or press ESC to resume', W / 2, H / 2 + 25);
    ctx.textAlign = 'left';
  }

  // Debug menu
  if (debugMenu) {
    ctx.fillStyle = 'rgba(0,0,0,0.75)'; ctx.fillRect(0, 0, W, H);
    const items = getDebugItems()[debugTab];
    const panelX = W / 2 - DEBUG_PANEL_W / 2;
    const headerH = 70;
    const tabH = 30;
    const baseY = H * 0.2;
    // Title
    ctx.fillStyle = '#ff0'; ctx.font = 'bold 20px monospace'; ctx.textAlign = 'center';
    ctx.fillText('DEBUG MENU', W / 2, baseY + 24);
    ctx.fillStyle = '#aaa'; ctx.font = '12px monospace';
    ctx.fillText(`WAVE ${Math.floor(wave)}`, W / 2, baseY + 10);
    // Clear settings button
    const clearBtnW = 170, clearBtnH = 24;
    const clearBtnX = W / 2 - clearBtnW / 2, clearBtnY = baseY + 38;
    const clearHover = mouse.sx >= clearBtnX && mouse.sx <= clearBtnX + clearBtnW && mouse.sy >= clearBtnY && mouse.sy <= clearBtnY + clearBtnH;
    ctx.fillStyle = clearHover ? 'rgba(255,255,255,0.15)' : 'rgba(255,255,255,0.05)';
    ctx.fillRect(clearBtnX, clearBtnY, clearBtnW, clearBtnH);
    ctx.strokeStyle = clearHover ? 'rgba(255,255,255,0.4)' : 'rgba(255,255,255,0.15)'; ctx.lineWidth = 1;
    ctx.strokeRect(clearBtnX, clearBtnY, clearBtnW, clearBtnH);
    ctx.fillStyle = clearHover ? '#fff' : '#888'; ctx.font = '10px monospace';
    ctx.fillText('RESET DEBUG SETTINGS', W / 2, clearBtnY + 16);
    // Tabs
    const tabY = baseY + headerH;
    const tabW = DEBUG_PANEL_W / 6;
    for (let t = 0; t < 6; t++) {
      const tx = panelX + t * tabW;
      const tabHover = mouse.sx >= tx && mouse.sx <= tx + tabW && mouse.sy >= tabY && mouse.sy <= tabY + tabH;
      ctx.fillStyle = t === debugTab ? 'rgba(255,255,100,0.25)' : tabHover ? 'rgba(255,255,255,0.15)' : 'rgba(255,255,255,0.08)';
      ctx.fillRect(tx, tabY, tabW, tabH);
      ctx.strokeStyle = 'rgba(255,255,255,0.2)'; ctx.lineWidth = 1;
      ctx.strokeRect(tx, tabY, tabW, tabH);
      ctx.fillStyle = t === debugTab ? '#ff0' : tabHover ? '#fff' : '#888';
      ctx.font = 'bold 11px monospace'; ctx.textAlign = 'center';
      ctx.fillText(DEBUG_TABS[t], tx + tabW / 2, tabY + 19);
    }
    // Items
    const startItemY = tabY + tabH;
    for (let i = 0; i < items.length; i++) {
      const iy = startItemY + i * DEBUG_ITEM_H;
      const hover = mouse.sx >= panelX && mouse.sx <= panelX + DEBUG_PANEL_W && mouse.sy >= iy && mouse.sy <= iy + DEBUG_ITEM_H;
      ctx.fillStyle = hover ? 'rgba(255,255,255,0.12)' : 'rgba(255,255,255,0.04)';
      ctx.fillRect(panelX, iy, DEBUG_PANEL_W, DEBUG_ITEM_H);
      ctx.strokeStyle = 'rgba(255,255,255,0.1)'; ctx.lineWidth = 1;
      ctx.strokeRect(panelX, iy, DEBUG_PANEL_W, DEBUG_ITEM_H);
      // Color dot
      ctx.fillStyle = items[i].color;
      ctx.beginPath(); ctx.arc(panelX + 16, iy + DEBUG_ITEM_H / 2, 5, 0, Math.PI * 2); ctx.fill();
      // Label
      ctx.fillStyle = hover ? '#fff' : '#ccc';
      ctx.font = '13px monospace'; ctx.textAlign = 'left';
      ctx.fillText(items[i].label, panelX + 30, iy + DEBUG_ITEM_H / 2 + 4);
      if (items[i].perkId) {
        const count = getPerkCount(items[i].perkId);
        if (count > 0) {
          ctx.fillStyle = '#ff0'; ctx.textAlign = 'right'; ctx.font = 'bold 12px monospace';
          ctx.fillText('x' + count, panelX + DEBUG_PANEL_W - 12, iy + DEBUG_ITEM_H / 2 + 4);
        }
      }
      if (items[i].enemyType) {
        const count = enemies.filter(e => e.type === items[i].enemyType && e.hp > 0).length;
        ctx.fillStyle = count > 0 ? '#ff0' : '#666'; ctx.textAlign = 'right'; ctx.font = 'bold 12px monospace';
        ctx.fillText('W' + Math.floor(wave) + '  x' + count, panelX + DEBUG_PANEL_W - 12, iy + DEBUG_ITEM_H / 2 + 4);
      }
      if (items[i].powerupId) {
        const k = items[i].powerupId;
        const val = player[k] || 0;
        const on = val > 0;
        ctx.fillStyle = on ? '#4f4' : '#666'; ctx.textAlign = 'right'; ctx.font = 'bold 11px monospace';
        ctx.fillText(on ? 'ON' : 'OFF', panelX + DEBUG_PANEL_W - 12, iy + DEBUG_ITEM_H / 2 + 4);
      }
      if (items[i].weaponId) {
        const active = (player.lance > 0 ? 'lance' : player.saber > 0 ? 'saber' : player.shotgun > 0 ? 'shotgun' : player.minigun > 0 ? 'minigun' : player.grenade > 0 ? 'grenade' : 'pistol') === items[i].weaponId;
        if (active) {
          ctx.fillStyle = '#4f4'; ctx.textAlign = 'right'; ctx.font = 'bold 11px monospace';
          ctx.fillText('ACTIVE', panelX + DEBUG_PANEL_W - 12, iy + DEBUG_ITEM_H / 2 + 4);
        }
      }
      if (items[i].toggle) {
        const on = items[i].color !== '#888';
        ctx.fillStyle = on ? '#4f4' : '#666'; ctx.textAlign = 'right'; ctx.font = 'bold 11px monospace';
        ctx.fillText(on ? 'ON' : 'OFF', panelX + DEBUG_PANEL_W - 12, iy + DEBUG_ITEM_H / 2 + 4);
      }
      if (items[i].showLevel) {
        ctx.fillStyle = '#ff0'; ctx.textAlign = 'right'; ctx.font = 'bold 12px monospace';
        ctx.fillText('Lv' + playerLevel, panelX + DEBUG_PANEL_W - 12, iy + DEBUG_ITEM_H / 2 + 4);
      }
      if (items[i].showHp) {
        ctx.fillStyle = '#4f4'; ctx.textAlign = 'right'; ctx.font = 'bold 12px monospace';
        ctx.fillText(player.hp + '/' + player.maxHp, panelX + DEBUG_PANEL_W - 12, iy + DEBUG_ITEM_H / 2 + 4);
      }
      if (items[i].showWave) {
        ctx.fillStyle = '#fa0'; ctx.textAlign = 'right'; ctx.font = 'bold 12px monospace';
        ctx.fillText('W' + Math.floor(wave), panelX + DEBUG_PANEL_W - 12, iy + DEBUG_ITEM_H / 2 + 4);
      }
    }
    ctx.textAlign = 'left';
  }

  // Crosshair - follows mouse directly (drawn after overlays so it's always visible)
  const cx = mouse.sx;
  const cy = mouse.sy;
  // Detonation radius ring / Melee weapon cooldown
  if (player.lance > 0) {
    const px = W / 2, py = H / 2;
    const cd = player.lanceSpearCD;
    if (cd > 0) {
      const frac = cd / 8;
      ctx.strokeStyle = 'rgba(68,255,68,0.3)';
      ctx.lineWidth = 2;
      ctx.beginPath(); ctx.arc(px, py, 40, -Math.PI / 2, -Math.PI / 2 + Math.PI * 2 * (1 - frac)); ctx.stroke();
      ctx.fillStyle = 'rgba(68,255,68,0.6)'; ctx.font = '10px monospace'; ctx.textAlign = 'center';
      ctx.fillText(Math.ceil(cd) + 's', px, py + 52);
      ctx.textAlign = 'left';
    } else {
      const glow = 0.5 + 0.5 * Math.sin(now * 0.004);
      ctx.shadowColor = '#4f4';
      ctx.shadowBlur = 4 + glow * 4;
      ctx.strokeStyle = `rgba(68,255,68,${0.5 + glow * 0.2})`;
      ctx.lineWidth = 2;
      ctx.beginPath(); ctx.arc(px, py, 40, 0, Math.PI * 2); ctx.stroke();
      ctx.shadowColor = 'transparent';
      ctx.shadowBlur = 0;
    }
  } else if (player.saber > 0) {
    const px = W / 2, py = H / 2;
    const cd = player.saberRepelCD;
    if (cd > 0) {
      const frac = cd / 5;
      ctx.strokeStyle = 'rgba(0,255,255,0.3)';
      ctx.lineWidth = 2;
      ctx.beginPath(); ctx.arc(px, py, 40, -Math.PI / 2, -Math.PI / 2 + Math.PI * 2 * (1 - frac)); ctx.stroke();
      ctx.fillStyle = 'rgba(0,255,255,0.6)'; ctx.font = '10px monospace'; ctx.textAlign = 'center';
      ctx.fillText(Math.ceil(cd) + 's', px, py + 52);
      ctx.textAlign = 'left';
    } else {
      const glow = 0.5 + 0.5 * Math.sin(now * 0.004);
      ctx.shadowColor = '#0ff';
      ctx.shadowBlur = 4 + glow * 4;
      ctx.strokeStyle = `rgba(0,255,255,${0.5 + glow * 0.2})`;
      ctx.lineWidth = 2;
      ctx.beginPath(); ctx.arc(px, py, 40, 0, Math.PI * 2); ctx.stroke();
      ctx.shadowColor = 'transparent';
      ctx.shadowBlur = 0;
    }
  } else {
    ctx.strokeStyle = 'rgba(255,60,40,0.9)';
    ctx.lineWidth = 1;
    ctx.beginPath(); ctx.arc(cx, cy, 120, 0, Math.PI * 2); ctx.stroke();
  }
  // Main crosshair
  ctx.strokeStyle = 'rgba(255,255,255,0.8)'; ctx.lineWidth = 1.5;
  ctx.beginPath(); ctx.arc(cx, cy, 10, 0, Math.PI * 2); ctx.stroke();
  ctx.beginPath(); ctx.moveTo(cx - 15, cy); ctx.lineTo(cx - 6, cy); ctx.stroke();
  ctx.beginPath(); ctx.moveTo(cx + 6, cy); ctx.lineTo(cx + 15, cy); ctx.stroke();
  ctx.beginPath(); ctx.moveTo(cx, cy - 15); ctx.lineTo(cx, cy - 6); ctx.stroke();
  ctx.beginPath(); ctx.moveTo(cx, cy + 6); ctx.lineTo(cx, cy + 15); ctx.stroke();

  // Start screen
  if (startScreen) {
    ctx.fillStyle = 'rgba(0,0,0,0.85)'; ctx.fillRect(0, 0, W, H);
    ctx.textAlign = 'center';

    // Title
    const titlePulse = 0.85 + 0.15 * Math.sin(now * 0.003);
    ctx.globalAlpha = titlePulse;
    ctx.fillStyle = '#ff4'; ctx.font = 'bold 52px monospace';
    ctx.fillText('CHAIN REACTION', W / 2, H / 2 - 120);
    ctx.fillStyle = '#f80'; ctx.font = 'bold 28px monospace';
    ctx.fillText('ARENA', W / 2, H / 2 - 82);
    ctx.globalAlpha = 1;

    // Controls
    ctx.fillStyle = '#aaa'; ctx.font = '14px monospace';
    const controls = [
      'WASD - Move',
      'Mouse - Aim & Shoot',
      'Right-Click / X / Shift - Detonate',
    ];
    let cy = H / 2 - 30;
    for (const line of controls) {
      ctx.fillText(line, W / 2, cy);
      cy += 22;
    }

    // Tips
    ctx.fillStyle = '#f84'; ctx.font = 'bold 13px monospace';
    cy += 10;
    ctx.fillText('Stick bullets to enemies, then DETONATE for chain reactions!', W / 2, cy);
    cy += 18;
    ctx.fillStyle = '#4ff'; ctx.font = '12px monospace';
    ctx.fillText('More stuck bullets = bigger bonus multiplier', W / 2, cy);

    // Start prompt
    const startPulse = 0.5 + 0.5 * Math.sin(now * 0.005);
    ctx.globalAlpha = startPulse;
    ctx.fillStyle = '#fff'; ctx.font = 'bold 22px monospace';
    ctx.fillText('Click to start', W / 2, H / 2 + 130);
    ctx.globalAlpha = 1;

    // High score
    if (highScore > 0) {
      ctx.fillStyle = '#888'; ctx.font = '13px monospace';
      ctx.fillText(`High Score: ${highScore}`, W / 2, H / 2 + 165);
    }

    ctx.textAlign = 'left';
    return;
  }

  // Game over
  if (gameOver) {
    ctx.fillStyle = 'rgba(0,0,0,0.7)'; ctx.fillRect(0, 0, W, H);
    ctx.fillStyle = '#f44'; ctx.font = '48px monospace'; ctx.textAlign = 'center';
    ctx.fillText('GAME OVER', W / 2, H / 2 - 40);
    ctx.fillStyle = '#fff'; ctx.font = '20px monospace';
    ctx.fillText(`Score: ${score}`, W / 2, H / 2);
    if (score >= highScore && score > 0) {
      ctx.fillStyle = '#ff4'; ctx.font = 'bold 16px monospace';
      ctx.fillText('NEW HIGH SCORE!', W / 2, H / 2 + 25);
    }
    ctx.fillStyle = '#888'; ctx.font = '14px monospace';
    ctx.fillText(`Best Combo: ${maxCombo} | Wave: ${waveNum}`, W / 2, H / 2 + 50);
    ctx.fillStyle = '#fff'; ctx.font = '18px monospace';
    ctx.fillText('Press R to restart', W / 2, H / 2 + 80);
    ctx.textAlign = 'left';
  }
}

// ============ GAME LOOP ============
let lastTime = performance.now();
function loop(now) {
  const dt = Math.min((now - lastTime) / 1000, 0.05);
  lastTime = now;
  update(dt);
  draw3D(now);
  drawHUD(now);
  requestAnimationFrame(loop);
}
requestAnimationFrame(loop);
</script>
</body>
</html>

<script>
// ============ THREE.JS SETUP ============
let W = window.innerWidth, H = window.innerHeight;

const renderer = new THREE.WebGLRenderer({ antialias: true });
renderer.setSize(W, H);
renderer.setPixelRatio(window.devicePixelRatio);
renderer.shadowMap.enabled = false;
renderer.toneMapping = THREE.ACESFilmicToneMapping;
renderer.toneMappingExposure = 1.2;
renderer.domElement.style.position = 'absolute';
renderer.domElement.style.top = '0';
renderer.domElement.style.left = '0';
document.body.appendChild(renderer.domElement);

const scene = new THREE.Scene();
scene.background = new THREE.Color(0x080818);

// Top-down camera
const camera = new THREE.OrthographicCamera(-W/2, W/2, H/2, -H/2, 1, 2000);
camera.position.set(0, 0, 500);
camera.lookAt(0, 0, 0);
camera.updateProjectionMatrix();

// HUD overlay
const hudCanvas = document.getElementById('hud');
const ctx = hudCanvas.getContext('2d');
hudCanvas.width = W; hudCanvas.height = H;

window.addEventListener('resize', () => {
  W = window.innerWidth; H = window.innerHeight;
  renderer.setSize(W, H);
  camera.left = -W/2; camera.right = W/2;
  camera.top = H/2; camera.bottom = -H/2;
  camera.updateProjectionMatrix();

});

// Lighting
scene.add(new THREE.AmbientLight(0xffffff, 0.8));
const dirLight = new THREE.DirectionalLight(0xaaaaff, 0.6);
dirLight.position.set(0, 0, 400);
scene.add(dirLight);

// Explosion light pool
const MAX_EXP_LIGHTS = 6;
const expLights = [];
for (let i = 0; i < MAX_EXP_LIGHTS; i++) {
  const l = new THREE.PointLight(0xff8800, 0, 300);
  l.visible = false;
  scene.add(l);
  expLights.push(l);
}

// ============ ARENA FLOOR ============
const ARENA_R = 850;
const floorGeo = new THREE.CircleGeometry(ARENA_R, 64);
const floorMat = new THREE.MeshStandardMaterial({ color: 0x222244, metalness: 0.2, roughness: 0.8 });
const floor = new THREE.Mesh(floorGeo, floorMat);
floor.position.z = -5;
scene.add(floor);
// Arena ring
const ringGeo = new THREE.TorusGeometry(ARENA_R, 3, 8, 64);
const ringMat = new THREE.MeshBasicMaterial({ color: 0x224488, transparent: true, opacity: 0.6 });
const ring = new THREE.Mesh(ringGeo, ringMat);
ring.position.z = -2;
scene.add(ring);
// Grid lines on floor
const gridHelper = new THREE.GridHelper(ARENA_R * 2, 30, 0x2a2a50, 0x2a2a50);
gridHelper.rotation.x = Math.PI / 2;
gridHelper.position.z = -4;
scene.add(gridHelper);

// ============ AUDIO ============
const audioCtx = new (window.AudioContext || window.webkitAudioContext)();
const sfxThrottles = {};
function sfx(type, opts = {}) {
  if (type === 'stick' || type === 'explode') {
    const t = performance.now();
    if (t - (sfxThrottles[type] || 0) < 10) return;
    sfxThrottles[type] = t;
  }
  if (audioCtx.state === 'suspended') audioCtx.resume();
  const now = audioCtx.currentTime;
  const g = audioCtx.createGain();
  g.connect(audioCtx.destination);
  if (type === 'shoot') {
    const osc = audioCtx.createOscillator();
    osc.type = 'square';
    osc.frequency.setValueAtTime(880, now);
    osc.frequency.exponentialRampToValueAtTime(220, now + 0.08);
    g.gain.setValueAtTime(0.12, now);
    g.gain.exponentialRampToValueAtTime(0.001, now + 0.08);
    osc.connect(g); osc.start(now); osc.stop(now + 0.08);
  }
  if (type === 'stick') {
    const osc = audioCtx.createOscillator();
    osc.type = 'sine';
    osc.frequency.setValueAtTime(600, now);
    osc.frequency.exponentialRampToValueAtTime(1200, now + 0.06);
    g.gain.setValueAtTime(0.15, now);
    g.gain.exponentialRampToValueAtTime(0.001, now + 0.1);
    osc.connect(g); osc.start(now); osc.stop(now + 0.1);
    const osc2 = audioCtx.createOscillator();
    const g2 = audioCtx.createGain();
    osc2.type = 'triangle'; osc2.frequency.setValueAtTime(1400, now);
    g2.gain.setValueAtTime(0.1, now); g2.gain.exponentialRampToValueAtTime(0.001, now + 0.03);
    osc2.connect(g2); g2.connect(audioCtx.destination);
    osc2.start(now); osc2.stop(now + 0.03);
  }
  if (type === 'explode') {
    const count = opts.intensity || 1;
    const vol = Math.min(0.3, 0.1 + count * 0.04);
    const dur = Math.min(0.6, 0.2 + count * 0.05);
    const bufSize = audioCtx.sampleRate * dur;
    const buf = audioCtx.createBuffer(1, bufSize, audioCtx.sampleRate);
    const data = buf.getChannelData(0);
    for (let i = 0; i < bufSize; i++) data[i] = Math.random() * 2 - 1;
    const noise = audioCtx.createBufferSource(); noise.buffer = buf;
    const filter = audioCtx.createBiquadFilter(); filter.type = 'lowpass';
    filter.frequency.setValueAtTime(800 + count * 100, now);
    filter.frequency.exponentialRampToValueAtTime(60, now + dur);
    g.gain.setValueAtTime(vol, now); g.gain.exponentialRampToValueAtTime(0.001, now + dur);
    noise.connect(filter); filter.connect(g); noise.start(now); noise.stop(now + dur);
    const sub = audioCtx.createOscillator(); const gSub = audioCtx.createGain();
    sub.type = 'sine'; sub.frequency.setValueAtTime(80 + count * 10, now);
    sub.frequency.exponentialRampToValueAtTime(20, now + dur * 0.8);
    gSub.gain.setValueAtTime(vol * 1.2, now); gSub.gain.exponentialRampToValueAtTime(0.001, now + dur * 0.8);
    sub.connect(gSub); gSub.connect(audioCtx.destination); sub.start(now); sub.stop(now + dur * 0.8);
  }
  if (type === 'chain') {
    const osc = audioCtx.createOscillator(); osc.type = 'sine';
    const pitch = 400 + (opts.depth || 0) * 200;
    osc.frequency.setValueAtTime(pitch, now);
    osc.frequency.exponentialRampToValueAtTime(pitch * 2, now + 0.15);
    g.gain.setValueAtTime(0.12, now); g.gain.exponentialRampToValueAtTime(0.001, now + 0.15);
    osc.connect(g); osc.start(now); osc.stop(now + 0.15);
  }
  if (type === 'hit') {
    const osc = audioCtx.createOscillator(); osc.type = 'sawtooth';
    osc.frequency.setValueAtTime(200, now); osc.frequency.exponentialRampToValueAtTime(80, now + 0.2);
    g.gain.setValueAtTime(0.15, now); g.gain.exponentialRampToValueAtTime(0.001, now + 0.2);
    osc.connect(g); osc.start(now); osc.stop(now + 0.2);
  }
  if (type === 'death') {
    const bufSize = audioCtx.sampleRate * 0.8;
    const buf = audioCtx.createBuffer(1, bufSize, audioCtx.sampleRate);
    const data = buf.getChannelData(0);
    for (let i = 0; i < bufSize; i++) data[i] = Math.random() * 2 - 1;
    const noise = audioCtx.createBufferSource(); noise.buffer = buf;
    const filter = audioCtx.createBiquadFilter(); filter.type = 'lowpass';
    filter.frequency.setValueAtTime(2000, now); filter.frequency.exponentialRampToValueAtTime(100, now + 0.8);
    g.gain.setValueAtTime(0.2, now); g.gain.exponentialRampToValueAtTime(0.001, now + 0.8);
    noise.connect(filter); filter.connect(g); noise.start(now); noise.stop(now + 0.8);
  }
  if (type === 'enemyDie') {
    const osc = audioCtx.createOscillator(); osc.type = 'square';
    osc.frequency.setValueAtTime(300, now); osc.frequency.exponentialRampToValueAtTime(50, now + 0.15);
    g.gain.setValueAtTime(0.08, now); g.gain.exponentialRampToValueAtTime(0.001, now + 0.15);
    osc.connect(g); osc.start(now); osc.stop(now + 0.15);
  }
  if (type === 'powerup') {
    [0, 0.06, 0.12].forEach((t, i) => {
      const o = audioCtx.createOscillator(); const gn = audioCtx.createGain();
      o.type = 'sine'; o.frequency.setValueAtTime([523, 659, 784][i], now + t);
      gn.gain.setValueAtTime(0.1, now + t); gn.gain.exponentialRampToValueAtTime(0.001, now + t + 0.12);
      o.connect(gn); gn.connect(audioCtx.destination); o.start(now + t); o.stop(now + t + 0.12);
    });
  }
}

// ============ 3D MESH MANAGEMENT ============
const meshMap = new WeakMap();
const activeMeshes = new Set();
let prevMeshes = new Set();
const saberSwingKey = {}; // stable object key for WeakMap
const lanceSwingKey = {};

function getOrCreateMesh(obj, createFn) {
  if (!meshMap.has(obj)) {
    const mesh = createFn();
    scene.add(mesh);
    meshMap.set(obj, mesh);
  }
  activeMeshes.add(obj);
  return meshMap.get(obj);
}

function cleanupMeshes() {
  for (const obj of prevMeshes) {
    if (!activeMeshes.has(obj)) {
      const mesh = meshMap.get(obj);
      if (mesh) { scene.remove(mesh); meshMap.delete(obj); }
    }
  }
  prevMeshes = new Set(activeMeshes);
  activeMeshes.clear();
}

// ============ GAME STATE ============
let player, bullets, enemies, explosions, particles, powerups, grenades;
let floatingTexts, waveAnnounce;
let score, highScore, wave, waveNum, spawnTimer, gameOver, shakeTimer, shakeIntensity;
let combo, comboTimer, maxCombo;
let xp, playerLevel, xpToNext, perkChoices, perksPicked, levelUpTimer, pendingPerks;
let keys = {};
let mouse = { sx: W / 2, sy: H / 2, down: false };
let detonating = false;
let startScreen = true;
let paused = false;
let debugMenu = false;
let debugTab = 0;
const ENEMY_SPEED_MULT = 0.85;
let debugNoEnemies = false;
let debugMode = false;
let debugNoDrops = false;
let debugNoCooldowns = false;
let debugMenuOpenedAt = 0;

function saveDebugSettings() {
  const spawnCounts = {};
  for (const e of enemies) spawnCounts[e.type] = (spawnCounts[e.type] || 0) + 1;
  const settings = {
    noSpawn: debugNoEnemies,
    godMode: player.invuln > 9000,
    weapon: player.lance > 0 ? 'lance' : player.saber > 0 ? 'saber' : player.shotgun > 0 ? 'shotgun' : player.minigun > 0 ? 'minigun' : player.grenade > 0 ? 'grenade' : null,
    perks: perksPicked.slice(),
    powerups: {
      spread: player.spread, rapid: player.rapid, megablast: player.megablast,
      shield: player.shield, ricochet: player.ricochet, homing: player.homing,
      overcharge: player.overcharge
    },
    spawns: spawnCounts,
    tab: debugTab
  };
  localStorage.setItem('arenaDebug', JSON.stringify(settings));
}

function loadDebugSettings() {
  const raw = localStorage.getItem('arenaDebug');
  if (!raw) return false;
  try {
    const s = JSON.parse(raw);
    debugNoEnemies = s.noSpawn || false;
    if (s.godMode) player.invuln = 99999;
    if (s.weapon) {
      player.shotgun = 0; player.minigun = 0; player.grenade = 0; player.saber = 0; player.lance = 0;
      player[s.weapon] = 99999;
    }
    if (s.perks && s.perks.length > 0) {
      for (const pid of s.perks) {
        perksPicked.push(pid);
        if (pid === 'maxHp') { player.maxHp++; player.hp = Math.min(player.hp + 1, player.maxHp); }
      }
    }
    if (s.powerups) {
      for (const [k, v] of Object.entries(s.powerups)) {
        if (v > 0) player[k] = v;
      }
    }
    if (s.spawns) {
      for (const [type, count] of Object.entries(s.spawns)) {
        for (let i = 0; i < count; i++) spawnEnemy(type);
      }
    }
    if (s.tab != null) debugTab = s.tab;
    return true;
  } catch (e) { return false; }
}

function clearDebugSettings() {
  localStorage.removeItem('arenaDebug');
}

// ============ PERK SYSTEM ============
const ALL_PERKS = [
  { id: 'maxHp',       label: '+1 Max HP',           color: '#f44', desc: 'Increases maximum health by 1 and heals 1 HP', icon: '+HP' },
  { id: 'moveSpeed',   label: 'Swift',               color: '#4af', desc: 'Move 12% faster', icon: 'SPD' },
  { id: 'fireRate',    label: 'Trigger Happy',        color: '#f4f', desc: 'Shoot 15% faster', icon: 'ROF' },
  { id: 'bulletSize',  label: 'Big Bullets',          color: '#ff4', desc: 'Bullets are 25% larger', icon: 'BIG' },
  { id: 'blastRadius', label: 'Wide Blast',           color: '#fa0', desc: 'Explosions 20% bigger', icon: 'AOE' },
  { id: 'shrapnel',    label: 'Extra Shrapnel',       color: '#f84', desc: '+50% shrapnel on chain kills', icon: 'SHR' },
  { id: 'powerDur',    label: 'Lasting Power',        color: '#8ff', desc: 'Powerups last 30% longer', icon: 'DUR' },
  { id: 'dropRate',    label: 'Lucky',                color: '#4f4', desc: 'Powerup drop rate +15%', icon: 'LCK' },
  { id: 'bulletSpeed', label: 'Velocity',             color: '#aaf', desc: 'Bullets travel 20% faster', icon: 'VEL' },
  { id: 'chainRange',  label: 'Chain Reach',          color: '#ff8', desc: 'Chain explosions reach 25% further', icon: 'CHN' },
  { id: 'armor',       label: 'Tough',                color: '#aaa', desc: '20% chance to ignore damage', icon: 'ARM' },
  { id: 'multishot',   label: 'Double Tap',           color: '#f8f', desc: 'Fire an extra bullet', icon: 'x2' },
];

function getPerkCount(id) {
  return perksPicked.filter(p => p === id).length;
}

function xpForLevel(lvl) {
  return Math.floor(200 + lvl * 150 + lvl * lvl * 50);
}

function gainXp(amount) {
  if (debugMode) return;
  const xpMult = 1;
  xp += Math.floor(amount * xpMult);
  while (xp >= xpToNext) {
    xp -= xpToNext;
    playerLevel++;
    xpToNext = xpForLevel(playerLevel);
    // Apply max HP perk immediately if chosen before
    sfx('powerup');
    offerPerks();
  }
}

function offerPerks() {
  // Delay perk screen to show level-up glow
  levelUpTimer = 1.8;
  pendingPerks = true;
}

function showPerkScreen() {
  const shuffled = ALL_PERKS.slice().sort(() => Math.random() - 0.5);
  perkChoices = shuffled.slice(0, 3);
  pendingPerks = false;
}

function selectPerk(index) {
  if (!perkChoices || index >= perkChoices.length) return;
  const perk = perkChoices[index];
  perksPicked.push(perk.id);

  // Immediate effects
  if (perk.id === 'maxHp') {
    player.maxHp++;
    player.hp = Math.min(player.hp + 1, player.maxHp);
  }

  spawnFloatingText(player.x, player.y + 30, perk.label, perk.color, 18);
  spawnParticles(player.x, player.y, 15, perk.color, 0.5);
  perkChoices = null;
}

function getDebugItems() {
  const perks = ALL_PERKS.map(p => ({ label: p.label, color: p.color, perkId: p.id, action: () => {
    perksPicked.push(p.id);
    if (p.id === 'maxHp') { player.maxHp++; player.hp = Math.min(player.hp + 1, player.maxHp); }
    spawnFloatingText(player.x, player.y + 30, p.label, p.color, 18);
  }, unsub: () => {
    const idx = perksPicked.lastIndexOf(p.id);
    if (idx === -1) return;
    perksPicked.splice(idx, 1);
    if (p.id === 'maxHp') { player.maxHp = Math.max(1, player.maxHp - 1); player.hp = Math.min(player.hp, player.maxHp); }
    spawnFloatingText(player.x, player.y + 30, '-' + p.label, '#f44', 18);
  }}));
  const powerups = Object.entries(POWERUP_DEFS).map(([k, v]) => ({ label: v.label, color: v.color, powerupId: k, action: () => {
    if (k === 'heal') { player.hp = Math.min(player.hp + 2, player.maxHp); }
    else { player[k] = player[k] > 0 ? 0 : 99999; }
    spawnFloatingText(player.x, player.y + 30, v.label, v.color, 18);
  }, unsub: () => {
    if (k === 'heal') return;
    player[k] = player[k] > 0 ? 0 : 99999;
    spawnFloatingText(player.x, player.y + 30, v.label, v.color, 18);
  }}));
  const activeWeapon = player.lance > 0 ? 'lance' : player.saber > 0 ? 'saber' : player.shotgun > 0 ? 'shotgun' : player.minigun > 0 ? 'minigun' : player.grenade > 0 ? 'grenade' : 'pistol';
  const weapons = [
    { label: 'PISTOL', color: '#4af', weaponId: 'pistol', action: () => {
      player.shotgun = 0; player.minigun = 0; player.grenade = 0; player.saber = 0; player.lance = 0;
      spawnFloatingText(player.x, player.y + 30, 'PISTOL', '#4af', 18);
    }},
    ...Object.entries(WEAPON_DROP_DEFS).map(([k, v]) => ({ label: v.label, color: v.color, weaponId: k, action: () => {
      player.shotgun = 0; player.minigun = 0; player.grenade = 0; player.saber = 0; player.lance = 0;
      player[k] = 99999;
      spawnFloatingText(player.x, player.y + 30, v.label, v.color, 18);
    }})),
  ];
  const misc = [
    { label: '+5 LEVELS', color: '#ff4', showLevel: true, action: () => { for (let i = 0; i < 5; i++) { playerLevel++; xpToNext = xpForLevel(playerLevel); } }, unsub: () => { playerLevel = Math.max(1, playerLevel - 5); xpToNext = xpForLevel(playerLevel); }},
    { label: '+1 LEVEL', color: '#ff4', showLevel: true, action: () => { playerLevel++; xpToNext = xpForLevel(playerLevel); }, unsub: () => { playerLevel = Math.max(1, playerLevel - 1); xpToNext = xpForLevel(playerLevel); }},
    { label: 'FULL HP', color: '#4f4', showHp: true, action: () => { player.hp = player.maxHp; }},
    { label: '+10 MAX HP', color: '#4f4', showHp: true, action: () => { player.maxHp += 10; player.hp = player.maxHp; }, unsub: () => { player.maxHp = Math.max(1, player.maxHp - 10); player.hp = Math.min(player.hp, player.maxHp); }},
    { label: 'KILL ALL', color: '#f44', action: () => { for (let e of enemies) e.hp = 0; }},
    { label: 'SKIP WAVE', color: '#fa0', showWave: true, action: () => { wave += 1; }, unsub: () => { wave = Math.max(1, wave - 1); }},
  ];
  const removeEnemy = (type) => { const idx = enemies.findIndex(e => e.type === type && e.hp > 0); if (idx !== -1) enemies.splice(idx, 1); };
  const enemyTypes = [
    { label: 'DUMMY',    color: '#888', enemyType: 'dummy',    action: () => spawnEnemy('dummy'), unsub: () => removeEnemy('dummy') },
    { label: 'SMALL',    color: '#4f8', enemyType: 'small',    action: () => spawnEnemy('small'), unsub: () => removeEnemy('small') },
    { label: 'MEDIUM',   color: '#f84', enemyType: 'medium',   action: () => spawnEnemy('medium'), unsub: () => removeEnemy('medium') },
    { label: 'LARGE',    color: '#f44', enemyType: 'large',    action: () => spawnEnemy('large'), unsub: () => removeEnemy('large') },
    { label: 'CHASER',   color: '#8ff', enemyType: 'chaser',   action: () => spawnEnemy('chaser'), unsub: () => removeEnemy('chaser') },
    { label: 'SPAWNER',  color: '#a6a', enemyType: 'spawner',  action: () => spawnEnemy('spawner'), unsub: () => removeEnemy('spawner') },
    { label: 'ELECTRIC', color: '#ff0', enemyType: 'electric', action: () => spawnEnemy('electric'), unsub: () => removeEnemy('electric') },
    { label: 'BOSS',     color: '#f22', enemyType: 'boss',     action: () => spawnEnemy('boss'), unsub: () => removeEnemy('boss') },
    { label: 'HIVE',     color: '#6a4', enemyType: 'hive',     action: () => spawnEnemy('hive'), unsub: () => removeEnemy('hive') },
  ];
  const godMode = player.invuln > 9000;
  const modes = [
    { label: 'GOD MODE', color: godMode ? '#4f4' : '#888', toggle: true, action: () => { player.invuln = godMode ? 0 : 99999; } },
    { label: 'SPAWNS', color: debugNoEnemies ? '#888' : '#4f4', toggle: true, action: () => { debugNoEnemies = !debugNoEnemies; } },
    { label: 'XP', color: debugMode ? '#888' : '#4f4', toggle: true, action: () => { debugMode = !debugMode; } },
    { label: 'ITEMS', color: debugNoDrops ? '#888' : '#4f4', toggle: true, action: () => { debugNoDrops = !debugNoDrops; } },
    { label: 'COOLDOWNS', color: debugNoCooldowns ? '#888' : '#4f4', toggle: true, action: () => { debugNoCooldowns = !debugNoCooldowns; } },
  ];
  return [weapons, perks, powerups, enemyTypes, modes, misc];
}

const DEBUG_TABS = ['WEAPONS', 'SKILLS', 'POWERUPS', 'SPAWNS', 'MODES', 'MISC'];
const DEBUG_ITEM_H = 28;
const DEBUG_PANEL_W = 330;

function handleDebugClick(mx, my, count, subtract) {
  count = count || 1;
  const items = getDebugItems()[debugTab];
  const panelX = W / 2 - DEBUG_PANEL_W / 2;
  const headerH = 70;
  const tabH = 30;
  const baseY = H * 0.2;
  // Clear settings button
  const clearBtnW = 170, clearBtnH = 24;
  const clearBtnX = W / 2 - clearBtnW / 2, clearBtnY = baseY + 38;
  if (mx >= clearBtnX && mx <= clearBtnX + clearBtnW && my >= clearBtnY && my <= clearBtnY + clearBtnH) {
    clearDebugSettings();
    // Reset current state
    player.shotgun = 0; player.minigun = 0; player.grenade = 0; player.saber = 0; player.lance = 0;
    player.spread = 0; player.rapid = 0; player.megablast = 0;
    player.shield = 0; player.ricochet = 0; player.homing = 0; player.overcharge = 0;
    player.invuln = 0;
    perksPicked = [];
    player.maxHp = 5; player.hp = Math.min(player.hp, player.maxHp);
    debugNoEnemies = true;
    for (let ei = enemies.length - 1; ei >= 0; ei--) enemies.splice(ei, 1);
    spawnEnemy('dummy');
    spawnFloatingText(player.x, player.y + 30, 'SETTINGS RESET', '#f44', 18);
    return;
  }
  const tabY = baseY + headerH;
  const tabW = DEBUG_PANEL_W / 6;
  // Tab clicks
  for (let t = 0; t < 6; t++) {
    const tx = panelX + t * tabW;
    if (mx >= tx && mx <= tx + tabW && my >= tabY && my <= tabY + tabH) {
      debugTab = t;
      saveDebugSettings();
      return;
    }
  }
  // Item clicks
  const startItemY = tabY + tabH;
  for (let i = 0; i < items.length; i++) {
    const iy = startItemY + i * DEBUG_ITEM_H;
    if (mx >= panelX && mx <= panelX + DEBUG_PANEL_W && my >= iy && my <= iy + DEBUG_ITEM_H) {
      const fn = subtract && items[i].unsub ? items[i].unsub : items[i].action;
      for (let c = 0; c < count; c++) fn(1);
      saveDebugSettings();
      return;
    }
  }
  // Clicked outside menu — close (unless just opened)
  if (performance.now() - debugMenuOpenedAt < 100) return;
  debugMenu = false;
  paused = false;
}

// ============ HELPERS ============
function dist(a, b) {
  const dx = a.x - b.x, dy = a.y - b.y;
  return Math.sqrt(dx * dx + dy * dy);
}
function circlesOverlap(a, ar, b, br) {
  const dx = a.x - b.x, dy = a.y - b.y;
  return dx * dx + dy * dy < (ar + br) * (ar + br);
}
function clampToArena(x, y, r) {
  const d = Math.sqrt(x * x + y * y);
  if (d + r > ARENA_R) {
    const scale = (ARENA_R - r) / d;
    return { x: x * scale, y: y * scale };
  }
  return { x, y };
}

function spawnFloatingText(x, y, text, color, size) {
  floatingTexts.push({ x, y, text, color, size: size || 16, t: 0, dur: 1.2 });
}

function spawnParticles(x, y, count, color, life) {
  for (let i = 0; i < count && particles.length < MAX_PARTICLES; i++) {
    const angle = Math.random() * Math.PI * 2;
    const speed = 40 + Math.random() * 160;
    particles.push({
      x, y,
      vx: Math.cos(angle) * speed, vy: Math.sin(angle) * speed,
      life: life * (0.5 + Math.random() * 0.5), maxLife: life,
      color, size: 1 + Math.random() * 3
    });
  }
}

function applyPowerup(type) {
  const def = POWERUP_DEFS[type];
  const durMult = 1 + getPerkCount('powerDur') * 0.3;
  const dur = def.dur * durMult;
  switch (type) {
    case 'spread': player.spread = dur; break;
    case 'rapid': player.rapid = dur; break;
    case 'megablast': player.megablast = dur; break;
    case 'heal': player.hp = Math.min(player.hp + 2, player.maxHp); break;
    case 'shield': player.shield = dur; break;
    case 'ricochet': player.ricochet = dur; break;
    case 'homing': player.homing = dur; break;
    case 'overcharge': player.overcharge = dur; break;
  }
}

function applyWeaponDrop(type) {
  const def = WEAPON_DROP_DEFS[type];
  const durMult = 1 + getPerkCount('powerDur') * 0.3;
  const dur = def.dur * durMult;
  // Weapons are exclusive: picking one replaces the other
  player.shotgun = 0; player.minigun = 0; player.grenade = 0; player.saber = 0; player.lance = 0;
  player[type] = dur;
}

function endGame() {
  gameOver = true;
  sfx('death');
  if (score > highScore) {
    highScore = score;
    localStorage.setItem('arenaShooterHS', String(highScore));
  }
}

// ============ ENEMY SPAWNING ============
function spawnEnemy(forceType) {
  let type = forceType;
  if (!type) {
    const types = ['small', 'medium', 'large', 'chaser', 'spawner', 'electric'];
    const weights = [0.30, 0.25, 0.12, 0.15, 0.08, 0.10];
    let r = Math.random(), cumul = 0;
    type = 'small';
    for (let i = 0; i < types.length; i++) {
      cumul += weights[i];
      if (r < cumul) { type = types[i]; break; }
    }
  }
  // sizeClass: 0=small, 1=medium, 2=large, 3=xlarge, 4=superlarge
  const defs = {
    small:    { r: 12, hp: 5,  maxHp: 5,  speed: 60,  color: '#4f8', score: 10,  sizeClass: 0 },
    medium:   { r: 18, hp: 12, maxHp: 12, speed: 45,  color: '#f84', score: 25,  sizeClass: 1 },
    large:    { r: 26, hp: 25, maxHp: 25, speed: 30,  color: '#f44', score: 50,  sizeClass: 2 },
    chaser:   { r: 16, hp: 3,  maxHp: 3,  speed: 120, color: '#8ff', score: 15,  sizeClass: 0 },
    spawner:  { r: 28, hp: 40, maxHp: 40, speed: 18,  color: '#a6a', score: 60,  sizeClass: 2 },
    electric: { r: 16, hp: 15, maxHp: 15, speed: 35,  color: '#ff0', score: 35,  sizeClass: 1 },
    boss:     { r: 40, hp: 80, maxHp: 80, speed: 20,  color: '#f22', score: 200, sizeClass: 3 },
    hive:     { r: 50, hp: 250, maxHp: 250, speed: 0, color: '#6a4', score: 120, sizeClass: 3 },
    dummy:    { r: 24, hp: 9999, maxHp: 9999, speed: 0, color: '#888', score: 0, sizeClass: 1 },
  };
  const d = { ...defs[type] };
  // Scale with wave difficulty
  const scaleFactor = 1 + wave * 0.03;
  d.hp = Math.floor(d.hp * scaleFactor);
  d.maxHp = d.hp;
  d.score = Math.floor(d.score * scaleFactor);
  // Spawn location
  const angle = Math.random() * Math.PI * 2;
  let sx, sy;
  if (type === 'dummy') {
    sx = ARENA_R * 0.5;
    sy = 0;
  } else if (type === 'hive') {
    // Spawn inside arena, away from player
    const spawnR = 200 + Math.random() * (ARENA_R - 300);
    sx = Math.cos(angle) * spawnR;
    sy = Math.sin(angle) * spawnR;
    // Push away if too close to player
    const pdx = sx - player.x, pdy = sy - player.y;
    if (Math.sqrt(pdx * pdx + pdy * pdy) < 200) {
      sx = player.x + Math.cos(angle + Math.PI) * 300;
      sy = player.y + Math.sin(angle + Math.PI) * 300;
    }
    const clamped = clampToArena(sx, sy, d.r);
    sx = clamped.x; sy = clamped.y;
  } else {
    const spawnDist = ARENA_R + 30;
    sx = Math.cos(angle) * spawnDist;
    sy = Math.sin(angle) * spawnDist;
  }
  const e = {
    x: sx, y: sy,
    ...d, type, stuck: [], charge: 0,
    wobble: Math.random() * Math.PI * 2,
    spawnTimer: type === 'spawner' ? 3 + Math.random() * 2 : type === 'hive' ? 1 + Math.random() : 0,
    zapTimer: type === 'electric' ? 2 + Math.random() : 0,
    zapActive: 0
  };
  enemies.push(e);
  return e;
}

function spawnBoss() {
  const boss = spawnEnemy('boss');
  boss.hp = 60 + waveNum * 10;
  boss.maxHp = boss.hp;
  waveAnnounce = { text: `BOSS WAVE ${waveNum}!`, t: 0, dur: 2.5, color: '#f44' };
  sfx('chain', { depth: 3 });
}

// ============ UPDATE ============
function update(dt) {
  if (startScreen) return;
  if (gameOver) return;
  if (paused) return;
  if (perkChoices) return; // Paused for perk selection

  // Level up timer
  if (levelUpTimer > 0) {
    levelUpTimer -= dt;
    if (levelUpTimer <= 0 && pendingPerks) {
      showPerkScreen();
      return;
    }
  }

  // Player aim angle
  // Convert screen mouse to world coords (camera follows player)
  const mouseWorldX = player.x + (mouse.sx - W / 2);
  const mouseWorldY = player.y - (mouse.sy - H / 2);
  player.angle = Math.atan2(mouseWorldY - player.y, mouseWorldX - player.x);

  // Movement
  let spd = 180 * (1 + getPerkCount('moveSpeed') * 0.12) * dt;
  {
    let dx = 0, dy = 0;
    if (keys['KeyW'] || keys['ArrowUp']) dy += 1;
    if (keys['KeyS'] || keys['ArrowDown']) dy -= 1;
    if (keys['KeyA'] || keys['ArrowLeft']) dx -= 1;
    if (keys['KeyD'] || keys['ArrowRight']) dx += 1;
    if (dx || dy) {
      const len = Math.sqrt(dx * dx + dy * dy);
      player.x += (dx / len) * spd;
      player.y += (dy / len) * spd;
    }
  }
  const clamped = clampToArena(player.x, player.y, player.r);
  player.x = clamped.x; player.y = clamped.y;
  if (player.invuln > 0) player.invuln -= dt;

  // Powerup timers
  if (player.spread > 0) player.spread -= dt;
  if (player.rapid > 0) player.rapid -= dt;
  if (player.shield > 0) player.shield -= dt;
  if (player.megablast > 0) player.megablast -= dt;
  if (player.ricochet > 0) player.ricochet -= dt;
  if (player.homing > 0) player.homing -= dt;
  if (player.overcharge > 0) player.overcharge -= dt;
  if (player.shotgun > 0) player.shotgun -= dt;
  if (player.minigun > 0) player.minigun -= dt;
  if (player.grenade > 0) player.grenade -= dt;
  if (player.saber > 0) player.saber -= dt;
  if (player.saberSwingT > 0) player.saberSwingT -= dt;
  if (player.saberRepelCD > 0) player.saberRepelCD -= dt;
  if (player.lance > 0) player.lance -= dt;
  if (player.lanceSwingT > 0) player.lanceSwingT -= dt;
  if (player.lanceSpearCD > 0) player.lanceSpearCD -= dt;

  // Combo
  if (comboTimer > 0) { comboTimer -= dt; if (comboTimer <= 0) combo = 0; }

  // Shooting - mouse aim
  const perkFireMult = 1 + getPerkCount('fireRate') * 0.15;
  // Weapon powerup overrides
  let wRate = 0.14, wSpeed = 450, wSize = 4, wCount = 1, wSpreadArc = 0;
  if (player.lance > 0) { wRate = 0.26; }
  else if (player.saber > 0) { wRate = 0.18; }
  else if (player.grenade > 0) { wRate = 0.7; }
  else if (player.minigun > 0) { wRate = 0.05; wSpeed = 420; wSize = 2.5; wSpreadArc = 0.18; }
  else if (player.shotgun > 0) { wRate = 0.38; wSpeed = 900; wSize = 3; wCount = 6; wSpreadArc = 0.5; }
  const baseRate = wRate / perkFireMult;
  const fireRate = player.rapid > 0 ? baseRate * 0.4 : baseRate;
  shootCooldown -= dt;
  // Lance melee attack — narrow triangle, long reach
  if ((mouse.down || mouse.clicked) && shootCooldown <= 0 && player.lance > 0) {
    const baseRange = 400;
    const lanceRange = baseRange + getPerkCount('bulletSize') * 40;
    const baseArc = Math.PI / 12; // 15 degree narrow thrust
    const lanceArc = Math.min(baseArc + (player.spread > 0 ? Math.PI / 12 : 0), Math.PI / 4);
    const lanceDmg = 12;
    let a = player.angle;
    // Homing: auto-target nearest enemy to cursor, fallback to nearest to player
    if (player.homing > 0) {
      const cursorX = player.x + (mouse.sx - W / 2);
      const cursorY = player.y - (mouse.sy - H / 2);
      let cursorTarget = null, cursorDist = Infinity;
      let nearestTarget = null, nearestDist = Infinity;
      for (let e of enemies) {
        if (e.hp <= 0) continue;
        const dp = Math.sqrt((e.x - player.x) ** 2 + (e.y - player.y) ** 2);
        if (dp > lanceRange + e.r) continue;
        if (dp < nearestDist) { nearestDist = dp; nearestTarget = e; }
        const dc = Math.sqrt((e.x - cursorX) ** 2 + (e.y - cursorY) ** 2);
        if (dc < lanceRange && dc < cursorDist) { cursorDist = dc; cursorTarget = e; }
      }
      const target = cursorTarget || nearestTarget;
      if (target) a = Math.atan2(target.y - player.y, target.x - player.x);
    }
    player.lanceSwingT = 0.15;
    player.lanceSwingAngle = a;
    player.lanceSwingArc = lanceArc;
    player.lanceSwingRange = lanceRange;
    function lanceStrike(angle) {
      for (let e of enemies) {
        const dx = e.x - player.x, dy = e.y - player.y;
        const d = Math.sqrt(dx * dx + dy * dy);
        if (d > lanceRange + e.r) continue;
        const ea = Math.atan2(dy, dx);
        let diff = ea - angle;
        while (diff > Math.PI) diff -= Math.PI * 2;
        while (diff < -Math.PI) diff += Math.PI * 2;
        const angularRadius = d > 0 ? Math.atan2(e.r, d) : Math.PI;
        if (Math.abs(diff) > lanceArc / 2 + angularRadius) continue;
        // Critical hit at the tip — enemies in the outer 30% of range
        const tipThreshold = lanceRange * 0.7;
        const isCrit = d >= tipThreshold;
        const dmg = isCrit ? lanceDmg * 3 : lanceDmg;
        e.hp -= dmg;
        if (isCrit) {
          spawnParticles(e.x, e.y, 10, '#ff0', 0.4);
          spawnFloatingText(e.x, e.y + e.r + 10, `CRIT ${dmg}!`, '#f44', 22);
        } else {
          spawnFloatingText(e.x, e.y + e.r + 5, `${dmg}`, '#fff', 16);
        }
        spawnParticles(e.x, e.y, 4, '#4f4', 0.3);
      }
      spawnParticles(player.x + Math.cos(angle) * 80, player.y + Math.sin(angle) * 80, 6, '#4f4', 0.3);
    }
    lanceStrike(a);
    sfx('shoot');
    // Double Tap: delayed additional strikes
    const extraStrikes = getPerkCount('multishot');
    if (extraStrikes > 0) {
      for (let s = 0; s < extraStrikes; s++) {
        const delay = (s + 1) * 80;
        const strikeAngle = a;
        setTimeout(() => {
          if (player.lance <= 0) return;
          player.lanceSwingT = 0.1;
          player.lanceSwingAngle = strikeAngle;
          lanceStrike(strikeAngle);
          sfx('shoot');
        }, delay);
      }
    }
    shootCooldown = fireRate;
    mouse.clicked = false;
  }
  // Saber melee attack
  else if ((mouse.down || mouse.clicked) && shootCooldown <= 0 && player.saber > 0) {
    const baseRange = 160;
    const saberRange = baseRange + getPerkCount('bulletSize') * 30; // Big Bullets increases range
    const baseArc = Math.PI / 3; // 60 degree swing
    const saberArc = Math.min(baseArc + (player.spread > 0 ? Math.PI / 6 : 0), Math.PI / 2); // Spread widens arc, cap 90°
    const saberDmg = 8;
    let a = player.angle;
    // Homing: auto-target nearest enemy to cursor, fallback to nearest to player
    if (player.homing > 0) {
      const cursorX = player.x + (mouse.sx - W / 2);
      const cursorY = player.y - (mouse.sy - H / 2);
      let cursorTarget = null, cursorDist = Infinity;
      let nearestTarget = null, nearestDist = Infinity;
      for (let e of enemies) {
        if (e.hp <= 0) continue;
        const dp = Math.sqrt((e.x - player.x) ** 2 + (e.y - player.y) ** 2);
        if (dp > saberRange + e.r) continue;
        if (dp < nearestDist) { nearestDist = dp; nearestTarget = e; }
        const dc = Math.sqrt((e.x - cursorX) ** 2 + (e.y - cursorY) ** 2);
        if (dc < saberRange && dc < cursorDist) { cursorDist = dc; cursorTarget = e; }
      }
      const target = cursorTarget || nearestTarget;
      if (target) a = Math.atan2(target.y - player.y, target.x - player.x);
    }
    player.saberSwingT = 0.2;
    player.saberSwingAngle = a;
    player.saberSwingArc = saberArc;
    player.saberSwingRange = saberRange;
    function saberStrike(angle) {
      for (let e of enemies) {
        const dx = e.x - player.x, dy = e.y - player.y;
        const d = Math.sqrt(dx * dx + dy * dy);
        if (d > saberRange + e.r) continue;
        const ea = Math.atan2(dy, dx);
        let diff = ea - angle;
        while (diff > Math.PI) diff -= Math.PI * 2;
        while (diff < -Math.PI) diff += Math.PI * 2;
        const angularRadius = d > 0 ? Math.atan2(e.r, d) : Math.PI;
        if (Math.abs(diff) > saberArc / 2 + angularRadius) continue;
        e.hp -= saberDmg;
        spawnFloatingText(e.x, e.y + e.r + 5, `${saberDmg}`, '#fff', 16);
        spawnParticles(e.x, e.y, 4, '#0ff', 0.3);
      }
      spawnParticles(player.x + Math.cos(angle) * 50, player.y + Math.sin(angle) * 50, 6, '#0ff', 0.3);
    }
    saberStrike(a);
    sfx('shoot');
    // Double Tap: delayed second strike
    const extraStrikes = getPerkCount('multishot');
    if (extraStrikes > 0) {
      for (let s = 0; s < extraStrikes; s++) {
        const delay = (s + 1) * 80;
        const strikeAngle = a;
        setTimeout(() => {
          if (player.saber <= 0) return;
          player.saberSwingT = 0.15;
          player.saberSwingAngle = strikeAngle;
          saberStrike(strikeAngle);
          sfx('shoot');
        }, delay);
      }
    }
    shootCooldown = fireRate;
    mouse.clicked = false;
  } else if ((mouse.down || mouse.clicked) && shootCooldown <= 0 && player.grenade > 0) {
    // Lob grenade toward reticle
    const mouseWorldX = player.x + (mouse.sx - W / 2);
    const mouseWorldY = player.y - (mouse.sy - H / 2);
    const gdx = mouseWorldX - player.x, gdy = mouseWorldY - player.y;
    const gDist = Math.sqrt(gdx * gdx + gdy * gdy);
    const gAngle = Math.atan2(gdy, gdx);
    const extraShots = getPerkCount('multishot');
    const gBase = player.spread > 0 ? 3 : 1;
    const gCount = gBase + extraShots;
    const gArc = gCount > 1 ? 0.3 + extraShots * 0.08 : 0;
    const gSpeedMult = 1 + getPerkCount('bulletSpeed') * 0.2;
    const gSizeMult = 1 + getPerkCount('bulletSize') * 0.25;
    const gSpeed = 600 * gSpeedMult; // constant speed
    const travelTime = Math.max(0.7, gDist / gSpeed); // minimum 0.7s airtime
    for (let gi = 0; gi < gCount; gi++) {
      const offset = gCount > 1 ? (gi / (gCount - 1) - 0.5) * gArc : 0;
      const a2 = gAngle + offset;
      const tx = player.x + Math.cos(a2) * gDist;
      const ty = player.y + Math.sin(a2) * gDist;
      grenades.push({
        x: player.x, y: player.y,
        sx: player.x, sy: player.y,
        tx: tx, ty: ty,
        t: 0, dur: travelTime, r: 6 * gSizeMult, z: 0,
        gid: ++grenadeIdCounter
      });
    }
    shootCooldown = fireRate;
    sfx('shoot');
  } else if ((mouse.down || mouse.clicked) && shootCooldown <= 0 && player.grenade <= 0 && player.saber <= 0 && player.lance <= 0 && bullets.length < MAX_BULLETS) {
    const a = player.angle;
    const bspd = wSpeed * (1 + getPerkCount('bulletSpeed') * 0.2);
    const baseBr = player.megablast > 0 ? wSize * 2 : wSize;
    const bSizeMult = player.shotgun > 0 ? 0.5 : 0.25;
    const bRadius = baseBr * (1 + getPerkCount('bulletSize') * bSizeMult);
    const mega = player.megablast > 0;
    const extraShots = getPerkCount('multishot');
    const shotgunBonus = player.shotgun > 0 ? 2 : 1;
    const baseCount = wCount + extraShots * shotgunBonus;

    function fireBullet(angle, dispersed) {
      const fa = angle + (wSpreadArc > 0 && wCount <= 1 ? (Math.random() - 0.5) * wSpreadArc : 0);
      const spawnDist = dispersed ? 16 + Math.random() * 20 : 16;
      const spdVar = dispersed ? bspd * (0.8 + Math.random() * 0.4) : bspd;
      bullets.push({
        x: player.x + Math.cos(fa) * spawnDist, y: player.y + Math.sin(fa) * spawnDist,
        r: bRadius, vx: Math.cos(fa) * spdVar, vy: Math.sin(fa) * spdVar, mega
      });
    }

    if (wCount > 1) {
      // Shotgun-style dispersed (spread doubles pellets)
      const shotCount = player.spread > 0 ? baseCount * 2 : baseCount;
      for (let i = 0; i < shotCount; i++) {
        const sa = a + (Math.random() - 0.5) * wSpreadArc;
        fireBullet(sa, true);
      }
    } else if (player.spread > 0) {
      const spreadCount = baseCount * 3;
      const totalArc = Math.min(0.4 + wSpreadArc, player.minigun > 0 ? 0.4 : Math.PI / 4);
      for (let i = 0; i < spreadCount; i++) {
        const sa = a + (i / (spreadCount - 1) - 0.5) * totalArc;
        fireBullet(sa);
      }
    } else if (player.minigun > 0) {
      const maxArc = 0.5;
      const totalShots = 1 + extraShots;
      for (let ms = 0; ms < totalShots; ms++) {
        const offset = (Math.random() - 0.5) * maxArc;
        fireBullet(a + offset);
      }
    } else {
      const totalShots = 1 + extraShots;
      const maxArc = Math.PI / 4;
      const arc = Math.min(extraShots * 0.08 * 2, maxArc);
      for (let ms = 0; ms < totalShots; ms++) {
        const offset = totalShots > 1 ? (ms / (totalShots - 1) - 0.5) * arc : 0;
        fireBullet(a + offset);
      }
    }
    shootCooldown = fireRate;
    sfx('shoot');
  }

  // Grenades
  for (let i = grenades.length - 1; i >= 0; i--) {
    const g = grenades[i];
    g.t += dt;
    const frac = Math.min(g.t / g.dur, 1);
    // Constant horizontal speed
    g.x = g.sx + (g.tx - g.sx) * frac;
    g.y = g.sy + (g.ty - g.sy) * frac;
    // Parabolic arc (gravity) — peaks at midpoint, lands at frac=1
    const throwDist = Math.sqrt((g.tx - g.sx) ** 2 + (g.ty - g.sy) ** 2);
    const arcHeight = Math.max(60, 30 + throwDist * 0.2);
    g.z = arcHeight * 4 * frac * (1 - frac);
    if (frac >= 1) {
      // Explode: shrapnel ring
      const shrapnelCount = 24 + Math.floor(getPerkCount('shrapnel') * 6);
      const blastPerk = 1 + getPerkCount('blastRadius') * 0.2;
      const gMegaMult = player.megablast > 0 ? 2 : 1;
      const gOverMult = player.overcharge > 0 ? 1.8 : 1;
      for (let s = 0; s < shrapnelCount * gMegaMult && bullets.length < MAX_BULLETS; s++) {
        const angle = (Math.PI * 2 / (shrapnelCount * gMegaMult)) * s + (Math.random() - 0.5) * 0.4;
        const spd2 = (160 + Math.random() * 140) * gOverMult;
        const sr = 3 * (player.megablast > 0 ? 1.5 : 1);
        bullets.push({ x: g.x, y: g.y, r: sr, vx: Math.cos(angle) * spd2, vy: Math.sin(angle) * spd2, shrapnel: true, grenadeShrapnel: true, gid: g.gid });
      }
      // Explosion visual
      const sides = 5 + Math.floor(Math.random() * 4);
      const rot = Math.random() * Math.PI * 2;
      explosions.push({ x: g.x, y: g.y, r: 0, maxR: 50 * blastPerk * gMegaMult * gOverMult, t: 0, dur: 0.4, sides, rot });
      // Damage nearby enemies
      const gBlastRange = 60 * blastPerk * gMegaMult * gOverMult;
      for (let e of enemies) {
        if (dist(g, e) < gBlastRange + e.r) {
          e.stuck.push({ ox: (Math.random() - 0.5) * e.r, oy: (Math.random() - 0.5) * e.r, pulseT: 0 });
        }
      }
      spawnParticles(g.x, g.y, 20, '#4f4', 0.5);
      spawnParticles(g.x, g.y, 10, '#ff0', 0.4);
      sfx('explode', { intensity: 3 });
      shakeTimer = 0.2; shakeIntensity = 6;
      grenades.splice(i, 1);
    }
  }

  // Detonate
  if ((keys['KeyX'] || keys['ShiftLeft'] || keys['ShiftRight']) && !detonating) {
    detonating = true;
    if (player.lance > 0) triggerLanceSpear();
    else if (player.saber > 0) triggerSaberRepel();
    else triggerDetonation();
  }
  if (!keys['KeyX'] && !keys['ShiftLeft'] && !keys['ShiftRight']) detonating = false;

  // Bullets
  for (let i = bullets.length - 1; i >= 0; i--) {
    const b = bullets[i];
    // Homing: gently steer toward nearest enemy
    if (player.homing > 0 && !b.shrapnel) {
      let closestDist = 200, closest = null;
      for (let e of enemies) {
        const d = dist(b, e);
        if (d < closestDist) { closestDist = d; closest = e; }
      }
      if (closest) {
        const desired = Math.atan2(closest.y - b.y, closest.x - b.x);
        const current = Math.atan2(b.vy, b.vx);
        let diff = desired - current;
        while (diff > Math.PI) diff -= Math.PI * 2;
        while (diff < -Math.PI) diff += Math.PI * 2;
        const turn = Math.min(Math.abs(diff), 3.5 * dt) * Math.sign(diff);
        const spd = Math.sqrt(b.vx * b.vx + b.vy * b.vy);
        const newAngle = current + turn;
        b.vx = Math.cos(newAngle) * spd;
        b.vy = Math.sin(newAngle) * spd;
      }
    }
    // Grenade shrapnel decelerates
    if (b.grenadeShrapnel) {
      const drag = Math.pow(0.3, dt);
      b.vx *= drag; b.vy *= drag;
      // Remove when nearly stopped (unless marked for detonation)
      if (b.vx * b.vx + b.vy * b.vy < 100) {
        if (b._frozen) { b.vx = 0; b.vy = 0; }
        else { bullets.splice(i, 1); continue; }
      }
    }
    b.x += b.vx * dt;
    b.y += b.vy * dt;
    // Out of arena
    if (b.x * b.x + b.y * b.y > (ARENA_R + 50) * (ARENA_R + 50)) { bullets.splice(i, 1); continue; }
    // Spear wave — burn damage per tick
    if (b.spear) {
      b.life -= dt;
      // Shrink in last 1s
      if (b.life < 1) {
        b.spearScale = b.life; // 1 -> 0
      }
      if (b.life <= 0) {
        // Death explosion — small green pop
        spawnParticles(b.x, b.y, 12, '#4f4', 0.4);
        spawnParticles(b.x, b.y, 6, '#8f4', 0.3);
        spawnParticles(b.x, b.y, 3, '#fff', 0.2);
        explosions.push({ x: b.x, y: b.y, r: 0, maxR: 40, t: 0, dur: 0.2, spearBirth: true, angle: Math.atan2(b.vy, b.vx) });
        sfx('explode', { intensity: 0.3 });
        bullets.splice(i, 1); continue;
      }
      // Burn tick timer (every 0.15s)
      b.burnTimer = (b.burnTimer || 0) - dt;
      if (b.burnTimer <= 0) {
        b.burnTimer = 0.15;
        for (let e of enemies) {
          if (e.hp <= 0) continue;
          if (circlesOverlap(b, b.r, e, e.r)) {
            e.hp -= b.dmg;
            spawnFloatingText(e.x, e.y + e.r + 5, `${b.dmg}`, '#fff', 17);
            spawnParticles(e.x, e.y, 3, '#4f4', 0.2);
            spawnParticles(e.x, e.y, 2, '#ff0', 0.15);
          }
        }
      }
      // Visual wake trail — green embers
      b.wakeTimer = (b.wakeTimer || 0) - dt;
      if (b.wakeTimer <= 0) {
        b.wakeTimer = 0.015;
        for (let w = 0; w < 6; w++) {
          const ox = (Math.random() - 0.5) * 140;
          const oy = (Math.random() - 0.5) * 140;
          // Embers drift upward and outward slowly
          const emberColors = ['#2a2', '#4f4', '#6f2', '#8f4', '#af6', '#ff4'];
          spawnParticles(b.x + ox, b.y + oy, 1, emberColors[Math.floor(Math.random() * emberColors.length)], 1.0 + Math.random() * 0.8);
        }
        // Bright hot sparks near center
        spawnParticles(b.x + (Math.random() - 0.5) * 40, b.y + (Math.random() - 0.5) * 40, 1, '#ffa', 0.5);
        spawnParticles(b.x + (Math.random() - 0.5) * 30, b.y + (Math.random() - 0.5) * 30, 1, '#fff', 0.3);
      }
      continue;
    }
    // Hit enemy
    let hit = false;
    for (let e of enemies) {
      if (circlesOverlap(b, b.r, e, e.r)) {
        e.stuck.push({ ox: b.x - e.x, oy: b.y - e.y, pulseT: 0 });
        spawnParticles(b.x, b.y, 3, '#ff0', 0.2);
        sfx('stick');
        // Ricochet: bullet bounces to a nearby enemy
        if (player.ricochet > 0 && !b.ricocheted) {
          let nextEnemy = null, nd = 250;
          for (let other of enemies) {
            if (other === e) continue;
            const d2 = dist(b, other);
            if (d2 < nd) { nd = d2; nextEnemy = other; }
          }
          if (nextEnemy) {
            const ang = Math.atan2(nextEnemy.y - b.y, nextEnemy.x - b.x);
            const spd = Math.sqrt(b.vx * b.vx + b.vy * b.vy);
            b.vx = Math.cos(ang) * spd;
            b.vy = Math.sin(ang) * spd;
            b.ricocheted = true;
            spawnParticles(b.x, b.y, 5, '#f84', 0.3);
            hit = false; // don't remove bullet
          } else {
            bullets.splice(i, 1); hit = true;
          }
        } else {
          bullets.splice(i, 1); hit = true;
        }
        break;
      }
    }
    if (hit) continue;
  }

  // Enemy spawning
  spawnTimer -= dt;
  if (spawnTimer <= 0 && !debugNoEnemies) {
    waveNum++;
    if (waveNum % 20 === 0) {
      spawnBoss();
      spawnTimer = 4;
    } else if (waveNum % 12 === 6 && waveNum > 10) {
      spawnEnemy('hive');
      waveAnnounce = { text: 'HIVE SPAWNED!', t: 0, dur: 2, color: '#6a4' };
      sfx('chain', { depth: 2 });
      spawnTimer = 3;
    } else {
      const count = Math.min(3 + Math.floor(wave / 2), 7);
      for (let i = 0; i < count; i++) spawnEnemy();
      spawnTimer = Math.max(0.8, 2.5 - wave * 0.06);
      if (waveNum % 20 === 1 && waveNum > 1) {
        waveAnnounce = { text: `WAVE ${waveNum}`, t: 0, dur: 1.5, color: '#fff' };
      }
    }
    wave += 0.15;
  }

  // Enemies
  for (let i = enemies.length - 1; i >= 0; i--) {
    const e = enemies[i];
    // Move toward player with slight wobble
    const toPlayerX = player.x - e.x, toPlayerY = player.y - e.y;
    const tpDist = Math.sqrt(toPlayerX * toPlayerX + toPlayerY * toPlayerY);
    if (e.stunT > 0) e.stunT -= dt;
    if (tpDist > 1 && e.speed > 0 && !(e.stunT > 0)) {
      e.wobble += dt * 2;
      const wobbleAngle = Math.atan2(toPlayerY, toPlayerX) + Math.sin(e.wobble) * 0.3;
      e.x += Math.cos(wobbleAngle) * e.speed * ENEMY_SPEED_MULT * dt;
      e.y += Math.sin(wobbleAngle) * e.speed * ENEMY_SPEED_MULT * dt;
    }
    // Repel velocity
    if (e.repelVx || e.repelVy) {
      e.x += (e.repelVx || 0) * dt;
      e.y += (e.repelVy || 0) * dt;
      const decay = Math.pow(0.02, dt);
      e.repelVx = (e.repelVx || 0) * decay;
      e.repelVy = (e.repelVy || 0) * decay;
      if (Math.abs(e.repelVx) < 1 && Math.abs(e.repelVy) < 1) { e.repelVx = 0; e.repelVy = 0; }
    }
    for (let s of e.stuck) s.pulseT += dt;

    // Spawner: periodically spawns small enemies nearby
    if (e.type === 'spawner' && e.hp > 0) {
      e.spawnTimer -= dt;
      if (e.spawnTimer <= 0) {
        e.spawnTimer = 3 + Math.random() * 2;
        // Spawn 2 small enemies around the spawner
        for (let s = 0; s < 2; s++) {
          const sa = Math.random() * Math.PI * 2;
          const child = {
            x: e.x + Math.cos(sa) * 35, y: e.y + Math.sin(sa) * 35,
            r: 10, hp: 3, maxHp: 3, speed: 55, color: '#c8c', score: 5,
            type: 'small', stuck: [], wobble: Math.random() * Math.PI * 2,
            spawnTimer: 0, zapTimer: 0, zapActive: 0
          };
          enemies.push(child);
          spawnParticles(child.x, child.y, 4, '#a6a', 0.3);
        }
        spawnParticles(e.x, e.y, 6, '#a6a', 0.4);
        sfx('stick');
      }
    }

    // Hive: rapidly spawns critters
    if (e.type === 'hive' && e.hp > 0) {
      e.spawnTimer -= dt;
      if (e.spawnTimer <= 0) {
        e.spawnTimer = 1.2 + Math.random() * 0.8;
        const critterCount = 3 + Math.floor(Math.random() * 2);
        for (let s = 0; s < critterCount; s++) {
          const sa = Math.random() * Math.PI * 2;
          const child = {
            x: e.x + Math.cos(sa) * 45, y: e.y + Math.sin(sa) * 45,
            r: 8, hp: 2, maxHp: 2, speed: 75, color: '#8c6', score: 3,
            type: 'small', stuck: [], wobble: Math.random() * Math.PI * 2,
            spawnTimer: 0, zapTimer: 0, zapActive: 0
          };
          enemies.push(child);
          spawnParticles(child.x, child.y, 3, '#6a4', 0.2);
        }
        spawnParticles(e.x, e.y, 8, '#6a4', 0.5);
        sfx('stick');
      }
    }

    // Electric: periodic zap field
    if (e.type === 'electric' && e.hp > 0) {
      if (e.zapActive > 0) {
        e.zapActive -= dt;
        // Damage player if in range
        const zapRadius = 140;
        if (player.invuln <= 0 && dist(player, e) < zapRadius + player.r) {
          if (player.shield > 0) {
            player.shield = 0;
            spawnParticles(player.x, player.y, 8, '#ff8', 0.3);
          } else if (!(getPerkCount('armor') > 0 && Math.random() < getPerkCount('armor') * 0.2)) {
            player.hp--;
            player.invuln = 1.5;
            shakeTimer = 0.2; shakeIntensity = 4;
            spawnParticles(player.x, player.y, 8, '#ff0', 0.4);
            spawnFloatingText(player.x, player.y - player.r - 10, '1', '#f44', 19);
            sfx('hit');
            if (player.hp <= 0) endGame();
          } else {
            spawnFloatingText(player.x, player.y + 20, 'DEFLECT!', '#aaa', 14);
            player.invuln = 0.5;
          }
        }
      } else {
        e.zapTimer -= dt;
        if (e.zapTimer <= 0) {
          e.zapTimer = 3 + Math.random() * 1.5;
          e.zapActive = 0.8; // zap lasts 0.8s
          spawnParticles(e.x, e.y, 12, '#ff0', 0.5);
          sfx('chain', { depth: 1 });
        }
      }
    }

    // Clamp to arena
    const ec = clampToArena(e.x, e.y, e.r);
    e.x = ec.x; e.y = ec.y;

    // Collision with player
    if (player.invuln <= 0 && circlesOverlap(player, player.r, e, e.r)) {
      if (player.shield > 0) {
        player.shield = 0;
        spawnParticles(player.x, player.y, 8, '#ff8', 0.3);
      } else if (getPerkCount('armor') > 0 && Math.random() < getPerkCount('armor') * 0.2) {
        spawnFloatingText(player.x, player.y + 20, 'DEFLECT!', '#aaa', 14);
        spawnParticles(player.x, player.y, 4, '#aaa', 0.2);
        player.invuln = 0.5;
      } else {
        player.hp--;
        spawnFloatingText(player.x, player.y - player.r - 10, '1', '#f44', 19);
        player.invuln = 1.5;
        shakeTimer = 0.3; shakeIntensity = 6;
        spawnParticles(player.x, player.y, 10, '#f00', 0.5);
        sfx('hit');
        if (player.hp <= 0) endGame();
      }
    }

    // Death
    if (e.hp <= 0) {
      combo++; comboTimer = 2;
      if (combo > maxCombo) maxCombo = combo;
      const comboMult = Math.min(1 + Math.floor(combo / 3), 8);
      const detBonus = player.detonationBonus || 1;
      const totalMult = comboMult * detBonus;
      const pts = e.score * totalMult;
      score += pts;

      const multParts = [];
      if (comboMult > 1) multParts.push(`combo x${comboMult}`);
      if (detBonus > 1) multParts.push(`det x${detBonus}`);
      const multStr = multParts.length > 0 ? ` (${multParts.join(' ')})` : '';
      const col = totalMult >= 10 ? '#f4f' : totalMult >= 4 ? '#ff4' : totalMult > 1 ? '#4ff' : '#fff';
      spawnFloatingText(e.x, e.y + 20, `+${pts}${multStr}`, col, totalMult > 2 ? 18 : 14);

      spawnParticles(e.x, e.y, 15, e.color, 0.6);
      if (e.type === 'boss') {
        for (let k = 0; k < 5; k++) {
          setTimeout(() => {
            spawnParticles(e.x + (Math.random() - 0.5) * 40, e.y + (Math.random() - 0.5) * 40, 20, '#ff0', 0.8);
            sfx('explode', { intensity: 5 });
            shakeTimer = 0.4; shakeIntensity = 12;
          }, k * 100);
        }
        spawnFloatingText(e.x, e.y + 40, 'BOSS DOWN!', '#f44', 24);
      }
      sfx('enemyDie');
      gainXp(e.score);

      // Shrapnel on death (disabled by default — future perk/skill/weapon)
      if (e.explodedBy && player.deathShrapnel) {
        const stuckCount = e.stuckBeforeDetonation || (e.stuck ? e.stuck.length : 0);
        const hpFactor = Math.ceil(e.maxHp / 3);
        const shrapnelMult = 1 + getPerkCount('shrapnel') * 0.5;
        const shrapnelCount = Math.floor(Math.max(stuckCount, 2) * hpFactor * shrapnelMult);
        for (let s = 0; s < shrapnelCount && bullets.length < MAX_BULLETS; s++) {
          const angle = (Math.PI * 2 / shrapnelCount) * s + (Math.random() - 0.5) * 0.5;
          const spd2 = 180 + Math.random() * 120;
          bullets.push({ x: e.x, y: e.y, r: 3, vx: Math.cos(angle) * spd2, vy: Math.sin(angle) * spd2, shrapnel: true });
        }
      }

      // Powerup / weapon drop (max 5 on field at once)
      const MAX_POWERUPS = 5;
      const dropBonus = getPerkCount('dropRate') * 0.15;
      const dropChance = e.type === 'boss' ? 1.0 : Math.min((e.type === 'small' ? 0.10 : 0.25) + dropBonus, 0.8);
      if (!debugNoDrops && powerups.length < MAX_POWERUPS && Math.random() < dropChance) {
        // 25% chance to drop a weapon instead of a powerup
        const isWeapon = Math.random() < 0.25;
        if (isWeapon) {
          const wtypes = Object.keys(WEAPON_DROP_DEFS);
          const wtype = wtypes[Math.floor(Math.random() * wtypes.length)];
          const wdef = WEAPON_DROP_DEFS[wtype];
          powerups.push({ x: e.x, y: e.y, r: 10, type: wtype, color: wdef.color, label: wdef.label, life: 15, bobT: 0, isWeapon: true });
        } else {
          const types = Object.keys(POWERUP_DEFS);
          const ptype = types[Math.floor(Math.random() * types.length)];
          const def = POWERUP_DEFS[ptype];
          powerups.push({ x: e.x, y: e.y, r: 10, type: ptype, color: def.color, label: def.label, life: 15, bobT: 0 });
        }
        if (e.type === 'boss') {
          const types = Object.keys(POWERUP_DEFS);
          const ptype2 = types[Math.floor(Math.random() * types.length)];
          const def2 = POWERUP_DEFS[ptype2];
          powerups.push({ x: e.x + 20, y: e.y + 15, r: 10, type: ptype2, color: def2.color, label: def2.label, life: 15, bobT: 0 });
        }
      }
      enemies.splice(i, 1);
    }
  }

  // Powerups
  for (let i = powerups.length - 1; i >= 0; i--) {
    const p = powerups[i];
    p.bobT += dt;
    p.life -= dt;
    if (p.life <= 0) { powerups.splice(i, 1); continue; }
    // Slow float in fixed direction, bounce off arena edge
    if (p.driftAngle == null) p.driftAngle = Math.random() * Math.PI * 2;
    const floatSpeed = 15;
    const nx = p.x + Math.cos(p.driftAngle) * floatSpeed * dt;
    const ny = p.y + Math.sin(p.driftAngle) * floatSpeed * dt;
    if (nx * nx + ny * ny < (ARENA_R - 30) * (ARENA_R - 30)) {
      p.x = nx; p.y = ny;
    } else {
      // Reflect off arena wall
      const wallAngle = Math.atan2(p.y, p.x);
      p.driftAngle = Math.PI + 2 * wallAngle - p.driftAngle;
    }
    if (circlesOverlap(player, player.r + 5, p, p.r)) {
      if (p.isWeapon) {
        applyWeaponDrop(p.type);
      } else {
        applyPowerup(p.type);
      }
      spawnParticles(p.x, p.y, 8, p.color, 0.4);
      sfx('powerup');
      const lbl = p.isWeapon ? WEAPON_DROP_DEFS[p.type].label : POWERUP_DEFS[p.type].label;
      spawnFloatingText(p.x, p.y + 15, lbl, p.color, 14);
      powerups.splice(i, 1);
    }
  }

  // Floating texts
  for (let i = floatingTexts.length - 1; i >= 0; i--) {
    const ft = floatingTexts[i];
    ft.t += dt; ft.y += 40 * dt;
    if (ft.t >= ft.dur) floatingTexts.splice(i, 1);
  }

  // Wave announcement
  if (waveAnnounce) {
    waveAnnounce.t += dt;
    if (waveAnnounce.t >= waveAnnounce.dur) waveAnnounce = null;
  }

  // Explosions
  for (let i = explosions.length - 1; i >= 0; i--) {
    const ex = explosions[i];
    ex.t += dt;
    ex.r = ex.maxR * Math.sin(Math.min(ex.t / ex.dur, 1) * Math.PI);
    if (ex.t >= ex.dur) explosions.splice(i, 1);
  }

  // Particles
  for (let i = particles.length - 1; i >= 0; i--) {
    const p = particles[i];
    p.x += p.vx * dt; p.y += p.vy * dt;
    p.life -= dt;
    if (p.life <= 0) particles.splice(i, 1);
  }

  if (shakeTimer > 0) shakeTimer -= dt;
  mouse.clicked = false;
}

// ============ DETONATION ============
function triggerDetonation() {
  const clickWorldX = player.x + (mouse.sx - W / 2);
  const clickWorldY = player.y - (mouse.sy - H / 2);
  const clickPt = { x: clickWorldX, y: clickWorldY };

  // Count total stuck for bonus tier
  let totalStuckCount = 0;
  for (let e of enemies) totalStuckCount += e.stuck.length;

  // AOE indicator at click point
  explosions.push({ x: clickWorldX, y: clickWorldY, r: 0, maxR: 120, t: 0, dur: 0.4, sides: 24, rot: 0, indicator: true });
  sfx('explode', { intensity: 1 });

  const stuckBonus = 1;
  const initRadius = 120;

  // Find first wave: enemies near click point that have stuck bullets or charge
  const firstWave = [];
  for (let e of enemies) {
    if (e.hp <= 0) continue;
    if (e.stuck.length === 0 && (e.charge || 0) === 0) continue;
    if (dist(e, clickPt) < initRadius + e.r) firstWave.push(e);
  }
  firstWave.sort((a, b) => dist(a, clickPt) - dist(b, clickPt));

  // Check if any grenade shrapnel is near click point — trigger its group
  triggerGrenadeGroupsNear(clickPt, initRadius);

  if (firstWave.length > 0) {
    processEnemyDetonationQueue(firstWave, 0, 0, stuckBonus);
  }
}

// ============ GRENADE GROUP DETONATION SYSTEM ============
// Shrapnel registry: maps gid -> array of {x, y} positions snapshot at detonation time
const _detonatingGids = new Set();

function triggerGrenadeGroupsNear(origin, radius) {
  // Find gids of any grenade shrapnel in range that isn't already detonating
  const newGids = new Set();
  for (const b of bullets) {
    if (!b.grenadeShrapnel) continue;
    if (_detonatingGids.has(b.gid)) continue;
    if (dist(b, origin) <= radius) newGids.add(b.gid);
  }
  for (const gid of newGids) {
    _detonatingGids.add(gid);
    // Mark all shrapnel in this group for detonation — they keep moving normally
    const group = [];
    for (const b of bullets) {
      if (b.grenadeShrapnel && b.gid === gid) {
        b._frozen = true;
        group.push(b);
      }
    }
    // Sort closest to furthest from origin
    group.sort((a, b) => dist(a, origin) - dist(b, origin));
    // Fire independent sequential detonation
    detonateGrenadeGroup(group, 0, gid);
  }
}

const GRENADE_GROUP_INTERVAL = 30;

function detonateGrenadeGroup(group, idx, gid) {
  if (idx >= group.length) {
    _detonatingGids.delete(gid);
    return;
  }
  const b = group[idx];
  // Use bullet's current position (it's frozen in place)
  const pt = { x: b.x, y: b.y };
  const megaMult = player.megablast > 0 ? 2 : 1;
  const overMult = player.overcharge > 0 ? 1.8 : 1;
  const blastPerk = 1 + getPerkCount('blastRadius') * 0.2;
  const gsRadius = 70 * megaMult * overMult * blastPerk;
  const r = 40 * megaMult * overMult;

  // Remove this bullet from bullets array
  const bi = bullets.indexOf(b);
  if (bi >= 0) bullets.splice(bi, 1);

  // Explosion effect
  explosions.push({ x: pt.x, y: pt.y, r: 0, maxR: r, t: 0, dur: 0.3, sides: 5 + Math.floor(Math.random() * 4), rot: Math.random() * Math.PI * 2 });
  spawnParticles(pt.x, pt.y, 6, '#f44', 0.4);
  spawnParticles(pt.x, pt.y, 4, '#f80', 0.5);
  sfx('explode', { intensity: 1 });
  shakeTimer = Math.max(shakeTimer, 0.1); shakeIntensity = Math.max(shakeIntensity, 4);

  // Damage enemies
  for (let e of enemies) {
    if (dist(pt, e) < gsRadius + e.r) { e.hp -= 1; e.explodedBy = true; spawnFloatingText(e.x, e.y + e.r + 5, '1', '#fff', 16); }
  }

  // Chain: check if this explosion reaches shrapnel from other groups
  triggerGrenadeGroupsNear(pt, gsRadius);

  // Next in group
  if (idx + 1 < group.length) {
    setTimeout(() => detonateGrenadeGroup(group, idx + 1, gid), GRENADE_GROUP_INTERVAL);
  } else {
    _detonatingGids.delete(gid);
  }
}

// ============ ENEMY DETONATION QUEUE ============
const DETONATE_INTERVAL = 120;

function processEnemyDetonationQueue(queue, idx, depth, stuckBonus) {
  if (idx >= queue.length) return;
  const megaMult = player.megablast > 0 ? 2 : 1;
  const overMult = player.overcharge > 0 ? 1.8 : 1;
  const blastPerk = 1 + getPerkCount('blastRadius') * 0.2;
  const chainPerk = 1 + getPerkCount('chainRange') * 0.25;
  const blastRadius = 80 * megaMult * overMult * blastPerk * (1 + (stuckBonus - 1) * 0.15);
  const chainedEnemies = [];

  const e = queue[idx];
  e._lastDetonateT = performance.now();

  // Stuck bullet detonation
  if (e.stuck.length > 0) {
    const count = e.stuck.length;
    e.hp -= count;
    e.explodedBy = true;
    spawnFloatingText(e.x, e.y + e.r + 5, `${count}`, '#fff', 18);
    const baseArea = 140 * 140 * Math.PI;
    const area = Math.min(baseArea + count * 8000, 800 * 800 * Math.PI) * megaMult * overMult;
    const r = Math.sqrt(area / Math.PI);
    explosions.push({ x: e.x, y: e.y, r: 0, maxR: r, t: 0, dur: 0.4 + (megaMult - 1) * 0.2, sides: 5 + Math.floor(Math.random() * 4), rot: Math.random() * Math.PI * 2 });
    shakeTimer = 0.2 + count * 0.05 * megaMult;
    shakeIntensity = (4 + count * 2) * megaMult;
    spawnParticles(e.x, e.y, (8 + count * 4) * megaMult, '#ff0', 0.5);
    spawnParticles(e.x, e.y, (5 + count * 2) * megaMult, '#f80', 0.7);
    if (megaMult > 1) spawnParticles(e.x, e.y, 12, '#fff', 0.6);
    sfx('explode', { intensity: count * megaMult });
    if (depth > 0) sfx('chain', { depth });
    // Area damage to nearby enemies
    for (let other of enemies) {
      if (other === e) continue;
      if (dist(other, e) < r) {
        other.hp -= count;
        other.explodedBy = true;
        spawnFloatingText(other.x, other.y + other.r + 5, `${count}`, '#fff', 16);
      }
    }
    e.stuckBeforeDetonation = count;
    e.stuck = [];
    // Chain to nearby stuck/charged enemies
    const chainRadius = (blastRadius + r) * chainPerk;
    for (let other of enemies) {
      if (performance.now() - (other._lastDetonateT || 0) < 300) continue;
      if (queue.includes(other) || chainedEnemies.includes(other)) continue;
      if (other.stuck.length === 0 && (other.charge || 0) === 0) continue;
      if (dist(other, e) < chainRadius) {
        chainedEnemies.push(other);
      }
    }
    // Trigger grenade groups in blast range
    triggerGrenadeGroupsNear(e, chainRadius);
  }

  // Charge detonation
  if (e.charge > 0) {
    const chargeRadius = 80 + e.charge * 10;
    const chargeDmg = e.charge * 3;
    const cr = 30 + e.charge * 8;
    explosions.push({ x: e.x, y: e.y, r: 0, maxR: cr, t: 0, dur: 0.35, sides: 6, rot: Math.random() * Math.PI * 2 });
    spawnParticles(e.x, e.y, 8 + e.charge * 3, '#ff0', 0.5);
    spawnParticles(e.x, e.y, 5 + e.charge * 2, '#0ff', 0.4);
    sfx('explode', { intensity: e.charge });
    shakeTimer = Math.max(shakeTimer, 0.15); shakeIntensity = Math.max(shakeIntensity, 4 + e.charge);
    spawnFloatingText(e.x, e.y + 30, `CHARGE x${e.charge}`, '#ff0', 16);
    // Detonate nearby shrapnel bullets (non-grenade)
    for (let bi = bullets.length - 1; bi >= 0; bi--) {
      const b = bullets[bi];
      if (!b.shrapnel || b.grenadeShrapnel) continue;
      if (dist(b, e) < chargeRadius) {
        for (let other of enemies) {
          if (other === e) continue;
          if (dist(b, other) < 40 + e.charge * 5) {
            other.hp -= Math.ceil(chargeDmg * 0.5);
            other.explodedBy = true;
          }
        }
        spawnParticles(b.x, b.y, 4, '#f80', 0.3);
        bullets.splice(bi, 1);
      }
    }
    // Damage nearby enemies
    for (let other of enemies) {
      if (other === e || other.hp <= 0) continue;
      if (dist(other, e) < chargeRadius + other.r) {
        other.hp -= chargeDmg;
        other.explodedBy = true;
        spawnFloatingText(other.x, other.y + other.r + 5, `${chargeDmg}`, '#fff', 16);
      }
    }
    e.hp -= chargeDmg;
    e.explodedBy = true;
    spawnFloatingText(e.x, e.y + e.r + 5, `${chargeDmg}`, '#fff', 18);
    // Chain to nearby charged/stuck enemies
    for (let other of enemies) {
      if (performance.now() - (other._lastDetonateT || 0) < 300) continue;
      if (queue.includes(other) || chainedEnemies.includes(other)) continue;
      if (other.stuck.length === 0 && (other.charge || 0) === 0) continue;
      if (dist(other, e) < chargeRadius + other.r) {
        chainedEnemies.push(other);
      }
    }
    // Trigger grenade groups in blast range
    triggerGrenadeGroupsNear(e, chargeRadius);
    e.charge = 0;
  }

  // Append chained enemies sorted by distance
  if (chainedEnemies.length > 0) {
    chainedEnemies.sort((a, b) => dist(a, e) - dist(b, e));
    for (const c of chainedEnemies) queue.push(c);
  }

  // Next enemy
  if (idx + 1 < queue.length) {
    setTimeout(() => processEnemyDetonationQueue(queue, idx + 1, depth + 1, stuckBonus), DETONATE_INTERVAL);
  }
}

// ============ SABER REPEL ============
function triggerSaberRepel() {
  if (player.saberRepelCD > 0 && !debugNoCooldowns) return;
  if (!debugNoCooldowns) player.saberRepelCD = 5;
  const repelRadius = 250;
  const repelForce = 2000;
  sfx('explode', { intensity: 0.5 });
  spawnParticles(player.x, player.y, 20, '#0ff', 0.4);
  explosions.push({ x: player.x, y: player.y, r: 0, maxR: repelRadius, t: 0, dur: 0.2, repel: true });
  for (let e of enemies) {
    if (e.hp <= 0) continue;
    if ((e.sizeClass || 0) >= 3) continue;
    const dx = e.x - player.x, dy = e.y - player.y;
    const d = Math.sqrt(dx * dx + dy * dy);
    if (d > repelRadius + e.r) continue;
    const falloff = 1 - d / (repelRadius + e.r);
    const force = repelForce * falloff;
    const nx = d > 0 ? dx / d : 0, ny = d > 0 ? dy / d : 1;
    e.repelVx = (e.repelVx || 0) + nx * force;
    e.repelVy = (e.repelVy || 0) + ny * force;
    e.stunT = 3.5;
  }
}

// ============ LANCE SPEAR ============
function triggerLanceSpear() {
  if (player.lanceSpearCD > 0 && !debugNoCooldowns) return;
  if (!debugNoCooldowns) player.lanceSpearCD = 8;
  const a = player.angle;
  const spearSpeed = 160;
  const spearDmg = 15;
  const sx = player.x + Math.cos(a) * 30, sy = player.y + Math.sin(a) * 30;
  sfx('explode', { intensity: 2 });
  shakeTimer = 0.2; shakeIntensity = 7;
  // Forward-facing cone of green embers
  for (let i = 0; i < 30; i++) {
    const spread = (Math.random() - 0.5) * Math.PI * 0.6;
    const spd = 200 + Math.random() * 400;
    const fa = a + spread;
    const px = sx + Math.cos(fa) * (10 + Math.random() * 30);
    const py = sy + Math.sin(fa) * (10 + Math.random() * 30);
    const colors = ['#4f4', '#8f4', '#af6', '#ff4', '#fff'];
    spawnParticles(px, py, 1, colors[Math.floor(Math.random() * colors.length)], 0.4 + Math.random() * 0.4);
  }
  // Forward shockwave
  explosions.push({ x: sx, y: sy, r: 0, maxR: 150, t: 0, dur: 0.25, spearBirth: true, angle: a });
  // Massive piercing wave projectile — infinite range (despawns out of arena)
  bullets.push({
    x: player.x + Math.cos(a) * 30, y: player.y + Math.sin(a) * 30,
    vx: Math.cos(a) * spearSpeed, vy: Math.sin(a) * spearSpeed,
    r: 160, life: 4, dmg: spearDmg,
    spear: true, pierced: new Set()
  });
}

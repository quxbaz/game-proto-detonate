<!DOCTYPE html>
<html>
<head>
<meta charset="utf-8">
<title>Chain Reaction Arena</title>
<style>
* { margin: 0; padding: 0; }
body { background: #000; overflow: hidden; cursor: crosshair; }
canvas { display: block; }
#hud { position: absolute; top: 0; left: 0; pointer-events: none; z-index: 10; }

</style>
</head>
<body>
<canvas id="hud"></canvas>
<script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
<script>
// ============ THREE.JS SETUP ============
let W = window.innerWidth, H = window.innerHeight;

const renderer = new THREE.WebGLRenderer({ antialias: true });
renderer.setSize(W, H);
renderer.setPixelRatio(window.devicePixelRatio);
renderer.shadowMap.enabled = false;
renderer.toneMapping = THREE.ACESFilmicToneMapping;
renderer.toneMappingExposure = 1.2;
renderer.domElement.style.position = 'absolute';
renderer.domElement.style.top = '0';
renderer.domElement.style.left = '0';
document.body.appendChild(renderer.domElement);

const scene = new THREE.Scene();
scene.background = new THREE.Color(0x080818);

// Top-down camera
const camera = new THREE.OrthographicCamera(-W/2, W/2, H/2, -H/2, 1, 2000);
camera.position.set(0, 0, 500);
camera.lookAt(0, 0, 0);
camera.updateProjectionMatrix();

// HUD overlay
const hudCanvas = document.getElementById('hud');
const ctx = hudCanvas.getContext('2d');
hudCanvas.width = W; hudCanvas.height = H;

window.addEventListener('resize', () => {
  W = window.innerWidth; H = window.innerHeight;
  renderer.setSize(W, H);
  camera.left = -W/2; camera.right = W/2;
  camera.top = H/2; camera.bottom = -H/2;
  camera.updateProjectionMatrix();
  hudCanvas.width = W; hudCanvas.height = H;
});

// Lighting
scene.add(new THREE.AmbientLight(0xffffff, 0.8));
const dirLight = new THREE.DirectionalLight(0xaaaaff, 0.6);
dirLight.position.set(0, 0, 400);
scene.add(dirLight);

// Explosion light pool
const MAX_EXP_LIGHTS = 6;
const expLights = [];
for (let i = 0; i < MAX_EXP_LIGHTS; i++) {
  const l = new THREE.PointLight(0xff8800, 0, 300);
  l.visible = false;
  scene.add(l);
  expLights.push(l);
}

// ============ ARENA FLOOR ============
const ARENA_R = 850;
const floorGeo = new THREE.CircleGeometry(ARENA_R, 64);
const floorMat = new THREE.MeshStandardMaterial({ color: 0x222244, metalness: 0.2, roughness: 0.8 });
const floor = new THREE.Mesh(floorGeo, floorMat);
floor.position.z = -5;
scene.add(floor);
// Arena ring
const ringGeo = new THREE.TorusGeometry(ARENA_R, 3, 8, 64);
const ringMat = new THREE.MeshBasicMaterial({ color: 0x224488, transparent: true, opacity: 0.6 });
const ring = new THREE.Mesh(ringGeo, ringMat);
ring.position.z = -2;
scene.add(ring);
// Grid lines on floor
const gridHelper = new THREE.GridHelper(ARENA_R * 2, 30, 0x2a2a50, 0x2a2a50);
gridHelper.rotation.x = Math.PI / 2;
gridHelper.position.z = -4;
scene.add(gridHelper);

// ============ AUDIO ============
const audioCtx = new (window.AudioContext || window.webkitAudioContext)();
function sfx(type, opts = {}) {
  if (audioCtx.state === 'suspended') audioCtx.resume();
  const now = audioCtx.currentTime;
  const g = audioCtx.createGain();
  g.connect(audioCtx.destination);
  if (type === 'shoot') {
    const osc = audioCtx.createOscillator();
    osc.type = 'square';
    osc.frequency.setValueAtTime(880, now);
    osc.frequency.exponentialRampToValueAtTime(220, now + 0.08);
    g.gain.setValueAtTime(0.12, now);
    g.gain.exponentialRampToValueAtTime(0.001, now + 0.08);
    osc.connect(g); osc.start(now); osc.stop(now + 0.08);
  }
  if (type === 'stick') {
    const osc = audioCtx.createOscillator();
    osc.type = 'sine';
    osc.frequency.setValueAtTime(600, now);
    osc.frequency.exponentialRampToValueAtTime(1200, now + 0.06);
    g.gain.setValueAtTime(0.15, now);
    g.gain.exponentialRampToValueAtTime(0.001, now + 0.1);
    osc.connect(g); osc.start(now); osc.stop(now + 0.1);
    const osc2 = audioCtx.createOscillator();
    const g2 = audioCtx.createGain();
    osc2.type = 'triangle'; osc2.frequency.setValueAtTime(1400, now);
    g2.gain.setValueAtTime(0.1, now); g2.gain.exponentialRampToValueAtTime(0.001, now + 0.03);
    osc2.connect(g2); g2.connect(audioCtx.destination);
    osc2.start(now); osc2.stop(now + 0.03);
  }
  if (type === 'explode') {
    const count = opts.intensity || 1;
    const vol = Math.min(0.3, 0.1 + count * 0.04);
    const dur = Math.min(0.6, 0.2 + count * 0.05);
    const bufSize = audioCtx.sampleRate * dur;
    const buf = audioCtx.createBuffer(1, bufSize, audioCtx.sampleRate);
    const data = buf.getChannelData(0);
    for (let i = 0; i < bufSize; i++) data[i] = Math.random() * 2 - 1;
    const noise = audioCtx.createBufferSource(); noise.buffer = buf;
    const filter = audioCtx.createBiquadFilter(); filter.type = 'lowpass';
    filter.frequency.setValueAtTime(800 + count * 100, now);
    filter.frequency.exponentialRampToValueAtTime(60, now + dur);
    g.gain.setValueAtTime(vol, now); g.gain.exponentialRampToValueAtTime(0.001, now + dur);
    noise.connect(filter); filter.connect(g); noise.start(now); noise.stop(now + dur);
    const sub = audioCtx.createOscillator(); const gSub = audioCtx.createGain();
    sub.type = 'sine'; sub.frequency.setValueAtTime(80 + count * 10, now);
    sub.frequency.exponentialRampToValueAtTime(20, now + dur * 0.8);
    gSub.gain.setValueAtTime(vol * 1.2, now); gSub.gain.exponentialRampToValueAtTime(0.001, now + dur * 0.8);
    sub.connect(gSub); gSub.connect(audioCtx.destination); sub.start(now); sub.stop(now + dur * 0.8);
  }
  if (type === 'chain') {
    const osc = audioCtx.createOscillator(); osc.type = 'sine';
    const pitch = 400 + (opts.depth || 0) * 200;
    osc.frequency.setValueAtTime(pitch, now);
    osc.frequency.exponentialRampToValueAtTime(pitch * 2, now + 0.15);
    g.gain.setValueAtTime(0.12, now); g.gain.exponentialRampToValueAtTime(0.001, now + 0.15);
    osc.connect(g); osc.start(now); osc.stop(now + 0.15);
  }
  if (type === 'hit') {
    const osc = audioCtx.createOscillator(); osc.type = 'sawtooth';
    osc.frequency.setValueAtTime(200, now); osc.frequency.exponentialRampToValueAtTime(80, now + 0.2);
    g.gain.setValueAtTime(0.15, now); g.gain.exponentialRampToValueAtTime(0.001, now + 0.2);
    osc.connect(g); osc.start(now); osc.stop(now + 0.2);
  }
  if (type === 'death') {
    const bufSize = audioCtx.sampleRate * 0.8;
    const buf = audioCtx.createBuffer(1, bufSize, audioCtx.sampleRate);
    const data = buf.getChannelData(0);
    for (let i = 0; i < bufSize; i++) data[i] = Math.random() * 2 - 1;
    const noise = audioCtx.createBufferSource(); noise.buffer = buf;
    const filter = audioCtx.createBiquadFilter(); filter.type = 'lowpass';
    filter.frequency.setValueAtTime(2000, now); filter.frequency.exponentialRampToValueAtTime(100, now + 0.8);
    g.gain.setValueAtTime(0.2, now); g.gain.exponentialRampToValueAtTime(0.001, now + 0.8);
    noise.connect(filter); filter.connect(g); noise.start(now); noise.stop(now + 0.8);
  }
  if (type === 'enemyDie') {
    const osc = audioCtx.createOscillator(); osc.type = 'square';
    osc.frequency.setValueAtTime(300, now); osc.frequency.exponentialRampToValueAtTime(50, now + 0.15);
    g.gain.setValueAtTime(0.08, now); g.gain.exponentialRampToValueAtTime(0.001, now + 0.15);
    osc.connect(g); osc.start(now); osc.stop(now + 0.15);
  }
  if (type === 'powerup') {
    [0, 0.06, 0.12].forEach((t, i) => {
      const o = audioCtx.createOscillator(); const gn = audioCtx.createGain();
      o.type = 'sine'; o.frequency.setValueAtTime([523, 659, 784][i], now + t);
      gn.gain.setValueAtTime(0.1, now + t); gn.gain.exponentialRampToValueAtTime(0.001, now + t + 0.12);
      o.connect(gn); gn.connect(audioCtx.destination); o.start(now + t); o.stop(now + t + 0.12);
    });
  }
}

// ============ 3D MESH MANAGEMENT ============
const meshMap = new WeakMap();
const activeMeshes = new Set();
let prevMeshes = new Set();

function getOrCreateMesh(obj, createFn) {
  if (!meshMap.has(obj)) {
    const mesh = createFn();
    scene.add(mesh);
    meshMap.set(obj, mesh);
  }
  activeMeshes.add(obj);
  return meshMap.get(obj);
}

function cleanupMeshes() {
  for (const obj of prevMeshes) {
    if (!activeMeshes.has(obj)) {
      const mesh = meshMap.get(obj);
      if (mesh) { scene.remove(mesh); meshMap.delete(obj); }
    }
  }
  prevMeshes = new Set(activeMeshes);
  activeMeshes.clear();
}

// ============ GAME STATE ============
let player, bullets, enemies, explosions, particles, powerups;
let floatingTexts, waveAnnounce;
let score, highScore, wave, waveNum, spawnTimer, gameOver, shakeTimer, shakeIntensity;
let combo, comboTimer, maxCombo;
let xp, playerLevel, xpToNext, perkChoices, perksPicked;
let keys = {};
let mouse = { sx: W / 2, sy: H / 2, down: false };
let detonating = false;
let startScreen = true;
let paused = false;

// ============ PERK SYSTEM ============
const ALL_PERKS = [
  { id: 'maxHp',       label: '+1 Max HP',           color: '#f44', desc: 'Increases maximum health by 1 and heals 1 HP', icon: '+HP' },
  { id: 'moveSpeed',   label: 'Swift',               color: '#4af', desc: 'Move 12% faster', icon: 'SPD' },
  { id: 'fireRate',    label: 'Trigger Happy',        color: '#f4f', desc: 'Shoot 15% faster', icon: 'ROF' },
  { id: 'bulletSize',  label: 'Big Bullets',          color: '#ff4', desc: 'Bullets are 25% larger', icon: 'BIG' },
  { id: 'blastRadius', label: 'Wide Blast',           color: '#fa0', desc: 'Explosions 20% bigger', icon: 'AOE' },
  { id: 'shrapnel',    label: 'Extra Shrapnel',       color: '#f84', desc: '+50% shrapnel on chain kills', icon: 'SHR' },
  { id: 'powerDur',    label: 'Lasting Power',        color: '#8ff', desc: 'Powerups last 30% longer', icon: 'DUR' },
  { id: 'dropRate',    label: 'Lucky',                color: '#4f4', desc: 'Powerup drop rate +15%', icon: 'LCK' },
  { id: 'bulletSpeed', label: 'Velocity',             color: '#aaf', desc: 'Bullets travel 20% faster', icon: 'VEL' },
  { id: 'chainRange',  label: 'Chain Reach',          color: '#ff8', desc: 'Chain explosions reach 25% further', icon: 'CHN' },
  { id: 'armor',       label: 'Tough',                color: '#aaa', desc: '20% chance to ignore damage', icon: 'ARM' },
  { id: 'multishot',   label: 'Double Tap',           color: '#f8f', desc: 'Fire an extra bullet', icon: 'x2' },
  { id: 'vampiricPerm',label: 'Blood Drain',          color: '#f22', desc: '10% chance to heal on kill', icon: 'VMP' },
];

function getPerkCount(id) {
  return perksPicked.filter(p => p === id).length;
}

function xpForLevel(lvl) {
  return Math.floor(200 + lvl * 150 + lvl * lvl * 50);
}

function gainXp(amount) {
  const xpMult = 1;
  xp += Math.floor(amount * xpMult);
  while (xp >= xpToNext) {
    xp -= xpToNext;
    playerLevel++;
    xpToNext = xpForLevel(playerLevel);
    // Apply max HP perk immediately if chosen before
    sfx('powerup');
    offerPerks();
  }
}

function offerPerks() {
  // Pick 3 random unique perks
  const shuffled = ALL_PERKS.slice().sort(() => Math.random() - 0.5);
  perkChoices = shuffled.slice(0, 3);
}

function selectPerk(index) {
  if (!perkChoices || index >= perkChoices.length) return;
  const perk = perkChoices[index];
  perksPicked.push(perk.id);

  // Immediate effects
  if (perk.id === 'maxHp') {
    player.maxHp++;
    player.hp = Math.min(player.hp + 1, player.maxHp);
  }

  spawnFloatingText(player.x, player.y + 30, perk.label, perk.color, 18);
  spawnParticles(player.x, player.y, 15, perk.color, 0.5);
  perkChoices = null;
}

highScore = parseInt(localStorage.getItem('arenaShooterHS') || '0');

const MAX_BULLETS = 3000;
const MAX_PARTICLES = 6000;

const POWERUP_DEFS = {
  spread:    { label: 'SPREAD',    color: '#4ff', dur: 12 },
  rapid:     { label: 'RAPID',     color: '#f4f', dur: 10 },
  megablast: { label: 'MEGA',      color: '#ff4', dur: 10 },
  heal:      { label: '+HP',       color: '#4f4', dur: 0 },
  shield:    { label: 'SHIELD',    color: '#ff8', dur: 8 },
  ricochet:  { label: 'RICOCHET',  color: '#f84', dur: 10 },
  homing:    { label: 'HOMING',    color: '#8ff', dur: 8 },
  overcharge:{ label: 'OVERCHARGE',color: '#fa0', dur: 10 },
  vampiric:  { label: 'VAMPIRIC',  color: '#f44', dur: 12 },
};

const WEAPON_DROP_DEFS = {
  shotgun:   { label: 'SHOTGUN',  color: '#f84', dur: 10 },
  minigun:   { label: 'MINIGUN',  color: '#ff4', dur: 10 },
};

function init() {
  // Clean up 3D objects
  for (const obj of prevMeshes) {
    const mesh = meshMap.get(obj);
    if (mesh) scene.remove(mesh);
  }
  prevMeshes.clear(); activeMeshes.clear();
  for (const l of expLights) l.visible = false;

  player = {
    x: 0, y: 0, r: 14, hp: 5, maxHp: 5, invuln: 0,
    spread: 0, rapid: 0, megablast: 0, shield: 0,
    ricochet: 0, homing: 0, overcharge: 0, vampiric: 0,
    shotgun: 0, minigun: 0,
    detonationBonus: 1, angle: 0
  };
  bullets = [];
  enemies = [];
  explosions = [];
  particles = [];
  powerups = [];
  floatingTexts = [];
  waveAnnounce = null;
  score = 0;
  wave = 1;
  waveNum = 0;
  spawnTimer = 0;
  gameOver = false;
  shakeTimer = 0;
  shakeIntensity = 0;
  detonating = false;
  combo = 0;
  comboTimer = 0;
  maxCombo = 0;
  xp = 0;
  playerLevel = 1;
  xpToNext = xpForLevel(1);
  perkChoices = null;
  perksPicked = [];
}

init();

// ============ INPUT ============
document.addEventListener('keydown', e => {
  keys[e.code] = true;
  if (e.code === 'Space') e.preventDefault();
  if (startScreen) return;
  if (e.code === 'KeyR' && gameOver) init();
  if (e.code === 'Escape' && !gameOver && !startScreen && !perkChoices) paused = !paused;
  // Perk selection with 1/2/3
  if (perkChoices) {
    if (e.code === 'Digit1') selectPerk(0);
    else if (e.code === 'Digit2') selectPerk(1);
    else if (e.code === 'Digit3') selectPerk(2);
  }
});
document.addEventListener('keyup', e => { keys[e.code] = false; });
document.addEventListener('mousemove', e => {
  mouse.sx = e.clientX; // raw screen coords
  mouse.sy = e.clientY;
});
document.addEventListener('mousedown', e => {
  if (e.button === 0) {
    if (startScreen) { startScreen = false; init(); document.documentElement.requestFullscreen().catch(()=>{}); return; }
    if (paused) { paused = false; return; }
    if (perkChoices) {
      // Check if clicking a perk card
      const cardW = 200, cardH = 140, gap = 30;
      const totalW = perkChoices.length * cardW + (perkChoices.length - 1) * gap;
      const startX = W / 2 - totalW / 2;
      const cardY = H / 2 - cardH / 2 + 20;
      for (let i = 0; i < perkChoices.length; i++) {
        const cx = startX + i * (cardW + gap);
        if (e.clientX >= cx && e.clientX <= cx + cardW && e.clientY >= cardY && e.clientY <= cardY + cardH) {
          selectPerk(i);
          return;
        }
      }
    } else {
      mouse.down = true;
    }
  }
});
document.addEventListener('mouseup', e => { if (e.button === 0) mouse.down = false; });
document.addEventListener('contextmenu', e => e.preventDefault());

let shootCooldown = 0;

// ============ HELPERS ============
function dist(a, b) {
  const dx = a.x - b.x, dy = a.y - b.y;
  return Math.sqrt(dx * dx + dy * dy);
}
function circlesOverlap(a, ar, b, br) {
  const dx = a.x - b.x, dy = a.y - b.y;
  return dx * dx + dy * dy < (ar + br) * (ar + br);
}
function clampToArena(x, y, r) {
  const d = Math.sqrt(x * x + y * y);
  if (d + r > ARENA_R) {
    const scale = (ARENA_R - r) / d;
    return { x: x * scale, y: y * scale };
  }
  return { x, y };
}

function spawnFloatingText(x, y, text, color, size) {
  floatingTexts.push({ x, y, text, color, size: size || 16, t: 0, dur: 1.2 });
}

function spawnParticles(x, y, count, color, life) {
  for (let i = 0; i < count && particles.length < MAX_PARTICLES; i++) {
    const angle = Math.random() * Math.PI * 2;
    const speed = 40 + Math.random() * 160;
    particles.push({
      x, y,
      vx: Math.cos(angle) * speed, vy: Math.sin(angle) * speed,
      life: life * (0.5 + Math.random() * 0.5), maxLife: life,
      color, size: 1 + Math.random() * 3
    });
  }
}

function applyPowerup(type) {
  const def = POWERUP_DEFS[type];
  const durMult = 1 + getPerkCount('powerDur') * 0.3;
  const dur = def.dur * durMult;
  switch (type) {
    case 'spread': player.spread = dur; break;
    case 'rapid': player.rapid = dur; break;
    case 'megablast': player.megablast = dur; break;
    case 'heal': player.hp = Math.min(player.hp + 2, player.maxHp); break;
    case 'shield': player.shield = dur; break;
    case 'ricochet': player.ricochet = dur; break;
    case 'homing': player.homing = dur; break;
    case 'overcharge': player.overcharge = dur; break;
    case 'vampiric': player.vampiric = dur; break;
  }
}

function applyWeaponDrop(type) {
  const def = WEAPON_DROP_DEFS[type];
  const durMult = 1 + getPerkCount('powerDur') * 0.3;
  const dur = def.dur * durMult;
  // Weapons are exclusive: picking one replaces the other
  player.shotgun = 0; player.minigun = 0;
  player[type] = dur;
}

function endGame() {
  gameOver = true;
  sfx('death');
  if (score > highScore) {
    highScore = score;
    localStorage.setItem('arenaShooterHS', String(highScore));
  }
}

// ============ ENEMY SPAWNING ============
function spawnEnemy(forceType) {
  let type = forceType;
  if (!type) {
    const types = ['small', 'medium', 'large', 'runner', 'spawner', 'electric'];
    const weights = [0.30, 0.25, 0.12, 0.15, 0.08, 0.10];
    let r = Math.random(), cumul = 0;
    type = 'small';
    for (let i = 0; i < types.length; i++) {
      cumul += weights[i];
      if (r < cumul) { type = types[i]; break; }
    }
  }
  const defs = {
    small:    { r: 12, hp: 5,  maxHp: 5,  speed: 60,  color: '#4f8', score: 10 },
    medium:   { r: 18, hp: 12, maxHp: 12, speed: 45,  color: '#f84', score: 25 },
    large:    { r: 26, hp: 25, maxHp: 25, speed: 30,  color: '#f44', score: 50 },
    runner:   { r: 16, hp: 3,  maxHp: 3,  speed: 120, color: '#8ff', score: 15 },
    spawner:  { r: 28, hp: 40, maxHp: 40, speed: 18,  color: '#a6a', score: 60 },
    electric: { r: 16, hp: 15, maxHp: 15, speed: 35,  color: '#ff0', score: 35 },
    boss:     { r: 40, hp: 80, maxHp: 80, speed: 20,  color: '#f22', score: 200 },
    hive:     { r: 36, hp: 100, maxHp: 100, speed: 0, color: '#6a4', score: 120 },
  };
  const d = { ...defs[type] };
  // Scale with wave difficulty
  const scaleFactor = 1 + wave * 0.03;
  d.hp = Math.floor(d.hp * scaleFactor);
  d.maxHp = d.hp;
  d.score = Math.floor(d.score * scaleFactor);
  // Spawn location
  const angle = Math.random() * Math.PI * 2;
  let sx, sy;
  if (type === 'hive') {
    // Spawn inside arena, away from player
    const spawnR = 200 + Math.random() * (ARENA_R - 300);
    sx = Math.cos(angle) * spawnR;
    sy = Math.sin(angle) * spawnR;
    // Push away if too close to player
    const pdx = sx - player.x, pdy = sy - player.y;
    if (Math.sqrt(pdx * pdx + pdy * pdy) < 200) {
      sx = player.x + Math.cos(angle + Math.PI) * 300;
      sy = player.y + Math.sin(angle + Math.PI) * 300;
    }
    const clamped = clampToArena(sx, sy, d.r);
    sx = clamped.x; sy = clamped.y;
  } else {
    const spawnDist = ARENA_R + 30;
    sx = Math.cos(angle) * spawnDist;
    sy = Math.sin(angle) * spawnDist;
  }
  const e = {
    x: sx, y: sy,
    ...d, type, stuck: [],
    wobble: Math.random() * Math.PI * 2,
    spawnTimer: type === 'spawner' ? 3 + Math.random() * 2 : type === 'hive' ? 1 + Math.random() : 0,
    zapTimer: type === 'electric' ? 2 + Math.random() : 0,
    zapActive: 0
  };
  enemies.push(e);
  return e;
}

function spawnBoss() {
  const boss = spawnEnemy('boss');
  boss.hp = 60 + waveNum * 10;
  boss.maxHp = boss.hp;
  waveAnnounce = { text: `BOSS WAVE ${waveNum}!`, t: 0, dur: 2.5, color: '#f44' };
  sfx('chain', { depth: 3 });
}

// ============ UPDATE ============
function update(dt) {
  if (startScreen) return;
  if (gameOver) return;
  if (paused) return;
  if (perkChoices) return; // Paused for perk selection

  // Player aim angle
  // Convert screen mouse to world coords (camera follows player)
  const mouseWorldX = player.x + (mouse.sx - W / 2);
  const mouseWorldY = player.y - (mouse.sy - H / 2);
  player.angle = Math.atan2(mouseWorldY - player.y, mouseWorldX - player.x);

  // Movement
  let spd = 180 * (1 + getPerkCount('moveSpeed') * 0.12) * dt;
  {
    let dx = 0, dy = 0;
    if (keys['KeyW'] || keys['ArrowUp']) dy += 1;
    if (keys['KeyS'] || keys['ArrowDown']) dy -= 1;
    if (keys['KeyA'] || keys['ArrowLeft']) dx -= 1;
    if (keys['KeyD'] || keys['ArrowRight']) dx += 1;
    if (dx || dy) {
      const len = Math.sqrt(dx * dx + dy * dy);
      player.x += (dx / len) * spd;
      player.y += (dy / len) * spd;
    }
  }
  const clamped = clampToArena(player.x, player.y, player.r);
  player.x = clamped.x; player.y = clamped.y;
  if (player.invuln > 0) player.invuln -= dt;

  // Powerup timers
  if (player.spread > 0) player.spread -= dt;
  if (player.rapid > 0) player.rapid -= dt;
  if (player.shield > 0) player.shield -= dt;
  if (player.megablast > 0) player.megablast -= dt;
  if (player.ricochet > 0) player.ricochet -= dt;
  if (player.homing > 0) player.homing -= dt;
  if (player.overcharge > 0) player.overcharge -= dt;
  if (player.vampiric > 0) player.vampiric -= dt;
  if (player.shotgun > 0) player.shotgun -= dt;
  if (player.minigun > 0) player.minigun -= dt;

  // Combo
  if (comboTimer > 0) { comboTimer -= dt; if (comboTimer <= 0) combo = 0; }

  // Shooting - mouse aim
  const perkFireMult = 1 + getPerkCount('fireRate') * 0.15;
  // Weapon powerup overrides
  let wRate = 0.14, wSpeed = 450, wSize = 4, wCount = 1, wSpreadArc = 0;
  if (player.minigun > 0) { wRate = 0.05; wSpeed = 420; wSize = 2.5; wSpreadArc = 0.15; }
  else if (player.shotgun > 0) { wRate = 0.38; wSpeed = 360; wSize = 3; wCount = 6; wSpreadArc = 0.5; }
  const baseRate = wRate / perkFireMult;
  const fireRate = player.rapid > 0 ? baseRate * 0.4 : baseRate;
  shootCooldown -= dt;
  if (mouse.down && shootCooldown <= 0 && bullets.length < MAX_BULLETS) {
    const a = player.angle;
    const bspd = wSpeed * (1 + getPerkCount('bulletSpeed') * 0.2);
    const baseBr = player.megablast > 0 ? wSize * 2 : wSize;
    const bRadius = baseBr * (1 + getPerkCount('bulletSize') * 0.25);
    const mega = player.megablast > 0;
    const extraShots = getPerkCount('multishot');
    const baseCount = wCount + extraShots;

    function fireBullet(angle) {
      const fa = angle + (wSpreadArc > 0 && wCount <= 1 ? (Math.random() - 0.5) * wSpreadArc : 0);
      bullets.push({
        x: player.x + Math.cos(fa) * 16, y: player.y + Math.sin(fa) * 16,
        r: bRadius, vx: Math.cos(fa) * bspd, vy: Math.sin(fa) * bspd, mega
      });
    }

    if (player.spread > 0) {
      const spreadCount = baseCount * 3;
      const totalArc = 0.4 + wSpreadArc;
      for (let i = 0; i < spreadCount; i++) {
        const sa = a + (i / (spreadCount - 1) - 0.5) * totalArc;
        fireBullet(sa);
      }
    } else if (wCount > 1) {
      // Shotgun-style fan
      for (let i = 0; i < baseCount; i++) {
        const sa = a + (i / (baseCount - 1) - 0.5) * wSpreadArc;
        fireBullet(sa);
      }
    } else {
      fireBullet(a);
      for (let ms = 0; ms < extraShots; ms++) {
        const offset = (ms + 1) * 0.08 * (ms % 2 === 0 ? 1 : -1);
        fireBullet(a + offset);
      }
    }
    shootCooldown = fireRate;
    sfx('shoot');
  }

  // Detonate
  if ((keys['KeyX'] || keys['ShiftLeft'] || keys['ShiftRight']) && !detonating) {
    detonating = true;
    triggerDetonation();
  }
  if (!keys['KeyX'] && !keys['ShiftLeft'] && !keys['ShiftRight']) detonating = false;

  // Bullets
  for (let i = bullets.length - 1; i >= 0; i--) {
    const b = bullets[i];
    // Homing: gently steer toward nearest enemy
    if (player.homing > 0 && !b.shrapnel) {
      let closestDist = 200, closest = null;
      for (let e of enemies) {
        const d = dist(b, e);
        if (d < closestDist) { closestDist = d; closest = e; }
      }
      if (closest) {
        const desired = Math.atan2(closest.y - b.y, closest.x - b.x);
        const current = Math.atan2(b.vy, b.vx);
        let diff = desired - current;
        while (diff > Math.PI) diff -= Math.PI * 2;
        while (diff < -Math.PI) diff += Math.PI * 2;
        const turn = Math.min(Math.abs(diff), 3.5 * dt) * Math.sign(diff);
        const spd = Math.sqrt(b.vx * b.vx + b.vy * b.vy);
        const newAngle = current + turn;
        b.vx = Math.cos(newAngle) * spd;
        b.vy = Math.sin(newAngle) * spd;
      }
    }
    b.x += b.vx * dt;
    b.y += b.vy * dt;
    // Out of arena
    if (b.x * b.x + b.y * b.y > (ARENA_R + 50) * (ARENA_R + 50)) { bullets.splice(i, 1); continue; }
    // Hit enemy
    let hit = false;
    for (let e of enemies) {
      if (circlesOverlap(b, b.r, e, e.r)) {
        e.stuck.push({ ox: b.x - e.x, oy: b.y - e.y, pulseT: 0 });
        spawnParticles(b.x, b.y, 3, '#ff0', 0.2);
        sfx('stick');
        // Ricochet: bullet bounces to a nearby enemy
        if (player.ricochet > 0 && !b.ricocheted) {
          let nextEnemy = null, nd = 250;
          for (let other of enemies) {
            if (other === e) continue;
            const d2 = dist(b, other);
            if (d2 < nd) { nd = d2; nextEnemy = other; }
          }
          if (nextEnemy) {
            const ang = Math.atan2(nextEnemy.y - b.y, nextEnemy.x - b.x);
            const spd = Math.sqrt(b.vx * b.vx + b.vy * b.vy);
            b.vx = Math.cos(ang) * spd;
            b.vy = Math.sin(ang) * spd;
            b.ricocheted = true;
            spawnParticles(b.x, b.y, 5, '#f84', 0.3);
            hit = false; // don't remove bullet
          } else {
            bullets.splice(i, 1); hit = true;
          }
        } else {
          bullets.splice(i, 1); hit = true;
        }
        break;
      }
    }
    if (hit) continue;
  }

  // Enemy spawning
  spawnTimer -= dt;
  if (spawnTimer <= 0) {
    waveNum++;
    if (waveNum % 20 === 0) {
      spawnBoss();
      spawnTimer = 4;
    } else if (waveNum % 12 === 6 && waveNum > 10) {
      spawnEnemy('hive');
      waveAnnounce = { text: 'HIVE SPAWNED!', t: 0, dur: 2, color: '#6a4' };
      sfx('chain', { depth: 2 });
      spawnTimer = 3;
    } else {
      const count = Math.min(3 + Math.floor(wave / 2), 7);
      for (let i = 0; i < count; i++) spawnEnemy();
      spawnTimer = Math.max(0.8, 2.5 - wave * 0.06);
      if (waveNum % 20 === 1 && waveNum > 1) {
        waveAnnounce = { text: `WAVE ${waveNum}`, t: 0, dur: 1.5, color: '#fff' };
      }
    }
    wave += 0.15;
  }

  // Enemies
  for (let i = enemies.length - 1; i >= 0; i--) {
    const e = enemies[i];
    // Move toward player with slight wobble
    const toPlayerX = player.x - e.x, toPlayerY = player.y - e.y;
    const tpDist = Math.sqrt(toPlayerX * toPlayerX + toPlayerY * toPlayerY);
    if (tpDist > 1 && e.speed > 0) {
      e.wobble += dt * 2;
      const wobbleAngle = Math.atan2(toPlayerY, toPlayerX) + Math.sin(e.wobble) * 0.3;
      e.x += Math.cos(wobbleAngle) * e.speed * dt;
      e.y += Math.sin(wobbleAngle) * e.speed * dt;
    }
    for (let s of e.stuck) s.pulseT += dt;

    // Spawner: periodically spawns small enemies nearby
    if (e.type === 'spawner' && e.hp > 0) {
      e.spawnTimer -= dt;
      if (e.spawnTimer <= 0) {
        e.spawnTimer = 3 + Math.random() * 2;
        // Spawn 2 small enemies around the spawner
        for (let s = 0; s < 2; s++) {
          const sa = Math.random() * Math.PI * 2;
          const child = {
            x: e.x + Math.cos(sa) * 35, y: e.y + Math.sin(sa) * 35,
            r: 10, hp: 3, maxHp: 3, speed: 55, color: '#c8c', score: 5,
            type: 'small', stuck: [], wobble: Math.random() * Math.PI * 2,
            spawnTimer: 0, zapTimer: 0, zapActive: 0
          };
          enemies.push(child);
          spawnParticles(child.x, child.y, 4, '#a6a', 0.3);
        }
        spawnParticles(e.x, e.y, 6, '#a6a', 0.4);
        sfx('stick');
      }
    }

    // Hive: rapidly spawns critters
    if (e.type === 'hive' && e.hp > 0) {
      e.spawnTimer -= dt;
      if (e.spawnTimer <= 0) {
        e.spawnTimer = 1.2 + Math.random() * 0.8;
        const critterCount = 3 + Math.floor(Math.random() * 2);
        for (let s = 0; s < critterCount; s++) {
          const sa = Math.random() * Math.PI * 2;
          const child = {
            x: e.x + Math.cos(sa) * 45, y: e.y + Math.sin(sa) * 45,
            r: 8, hp: 2, maxHp: 2, speed: 75, color: '#8c6', score: 3,
            type: 'small', stuck: [], wobble: Math.random() * Math.PI * 2,
            spawnTimer: 0, zapTimer: 0, zapActive: 0
          };
          enemies.push(child);
          spawnParticles(child.x, child.y, 3, '#6a4', 0.2);
        }
        spawnParticles(e.x, e.y, 8, '#6a4', 0.5);
        sfx('stick');
      }
    }

    // Electric: periodic zap field
    if (e.type === 'electric' && e.hp > 0) {
      if (e.zapActive > 0) {
        e.zapActive -= dt;
        // Damage player if in range
        const zapRadius = 140;
        if (player.invuln <= 0 && dist(player, e) < zapRadius + player.r) {
          if (player.shield > 0) {
            player.shield = 0;
            spawnParticles(player.x, player.y, 8, '#ff8', 0.3);
          } else if (!(getPerkCount('armor') > 0 && Math.random() < getPerkCount('armor') * 0.2)) {
            player.hp--;
            player.invuln = 1.5;
            shakeTimer = 0.2; shakeIntensity = 4;
            spawnParticles(player.x, player.y, 8, '#ff0', 0.4);
            sfx('hit');
            if (player.hp <= 0) endGame();
          } else {
            spawnFloatingText(player.x, player.y + 20, 'DEFLECT!', '#aaa', 14);
            player.invuln = 0.5;
          }
        }
      } else {
        e.zapTimer -= dt;
        if (e.zapTimer <= 0) {
          e.zapTimer = 3 + Math.random() * 1.5;
          e.zapActive = 0.8; // zap lasts 0.8s
          spawnParticles(e.x, e.y, 12, '#ff0', 0.5);
          sfx('chain', { depth: 1 });
        }
      }
    }

    // Clamp to arena
    const ec = clampToArena(e.x, e.y, e.r);
    e.x = ec.x; e.y = ec.y;

    // Collision with player
    if (player.invuln <= 0 && circlesOverlap(player, player.r, e, e.r)) {
      if (player.shield > 0) {
        player.shield = 0;
        spawnParticles(player.x, player.y, 8, '#ff8', 0.3);
      } else if (getPerkCount('armor') > 0 && Math.random() < getPerkCount('armor') * 0.2) {
        spawnFloatingText(player.x, player.y + 20, 'DEFLECT!', '#aaa', 14);
        spawnParticles(player.x, player.y, 4, '#aaa', 0.2);
        player.invuln = 0.5;
      } else {
        player.hp--;
        player.invuln = 1.5;
        shakeTimer = 0.3; shakeIntensity = 6;
        spawnParticles(player.x, player.y, 10, '#f00', 0.5);
        sfx('hit');
        if (player.hp <= 0) endGame();
      }
    }

    // Death
    if (e.hp <= 0) {
      combo++; comboTimer = 2;
      if (combo > maxCombo) maxCombo = combo;
      const comboMult = Math.min(1 + Math.floor(combo / 3), 8);
      const detBonus = player.detonationBonus || 1;
      const totalMult = comboMult * detBonus;
      const pts = e.score * totalMult;
      score += pts;

      const multParts = [];
      if (comboMult > 1) multParts.push(`combo x${comboMult}`);
      if (detBonus > 1) multParts.push(`det x${detBonus}`);
      const multStr = multParts.length > 0 ? ` (${multParts.join(' ')})` : '';
      const col = totalMult >= 10 ? '#f4f' : totalMult >= 4 ? '#ff4' : totalMult > 1 ? '#4ff' : '#fff';
      spawnFloatingText(e.x, e.y + 20, `+${pts}${multStr}`, col, totalMult > 2 ? 18 : 14);

      spawnParticles(e.x, e.y, 15, e.color, 0.6);
      if (e.type === 'boss') {
        for (let k = 0; k < 5; k++) {
          setTimeout(() => {
            spawnParticles(e.x + (Math.random() - 0.5) * 40, e.y + (Math.random() - 0.5) * 40, 20, '#ff0', 0.8);
            sfx('explode', { intensity: 5 });
            shakeTimer = 0.4; shakeIntensity = 12;
          }, k * 100);
        }
        spawnFloatingText(e.x, e.y + 40, 'BOSS DOWN!', '#f44', 24);
      }
      sfx('enemyDie');
      gainXp(e.score);

      // Permanent vampiric perk
      if (getPerkCount('vampiricPerm') > 0 && player.hp < player.maxHp) {
        const chance = getPerkCount('vampiricPerm') * 0.1;
        if (Math.random() < chance) {
          player.hp = Math.min(player.hp + 1, player.maxHp);
          spawnFloatingText(player.x, player.y + 25, '+1 HP', '#f22', 12);
        }
      }

      // Vampiric heal (scales with vampiric perk)
      if (player.vampiric > 0 && player.hp < player.maxHp) {
        const baseHealChance = 0.3 + getPerkCount('vampiricPerm') * 0.15;
        const healChance = e.type === 'boss' ? 1.0 : Math.min(baseHealChance, 0.9);
        if (Math.random() < healChance) {
          player.hp = Math.min(player.hp + 1, player.maxHp);
          spawnFloatingText(player.x, player.y + 25, '+1 HP', '#f44', 14);
          spawnParticles(player.x, player.y, 6, '#f44', 0.3);
        }
      }

      // Shrapnel
      if (e.explodedBy) {
        const stuckCount = e.stuckBeforeDetonation || (e.stuck ? e.stuck.length : 0);
        const hpFactor = Math.ceil(e.maxHp / 3);
        const shrapnelMult = 1 + getPerkCount('shrapnel') * 0.5;
        const shrapnelCount = Math.floor(Math.max(stuckCount, 2) * hpFactor * shrapnelMult);
        for (let s = 0; s < shrapnelCount && bullets.length < MAX_BULLETS; s++) {
          const angle = (Math.PI * 2 / shrapnelCount) * s + (Math.random() - 0.5) * 0.5;
          const spd2 = 180 + Math.random() * 120;
          bullets.push({ x: e.x, y: e.y, r: 3, vx: Math.cos(angle) * spd2, vy: Math.sin(angle) * spd2, shrapnel: true });
        }
      }

      // Powerup / weapon drop (max 5 on field at once)
      const MAX_POWERUPS = 5;
      const dropBonus = getPerkCount('dropRate') * 0.15;
      const dropChance = e.type === 'boss' ? 1.0 : Math.min((e.type === 'small' ? 0.10 : 0.25) + dropBonus, 0.8);
      if (powerups.length < MAX_POWERUPS && Math.random() < dropChance) {
        // 25% chance to drop a weapon instead of a powerup
        const isWeapon = Math.random() < 0.25;
        if (isWeapon) {
          const wtypes = Object.keys(WEAPON_DROP_DEFS);
          const wtype = wtypes[Math.floor(Math.random() * wtypes.length)];
          const wdef = WEAPON_DROP_DEFS[wtype];
          powerups.push({ x: e.x, y: e.y, r: 10, type: wtype, color: wdef.color, label: wdef.label, life: 15, bobT: 0, isWeapon: true });
        } else {
          const types = Object.keys(POWERUP_DEFS);
          const ptype = types[Math.floor(Math.random() * types.length)];
          const def = POWERUP_DEFS[ptype];
          powerups.push({ x: e.x, y: e.y, r: 10, type: ptype, color: def.color, label: def.label, life: 15, bobT: 0 });
        }
        if (e.type === 'boss') {
          const types = Object.keys(POWERUP_DEFS);
          const ptype2 = types[Math.floor(Math.random() * types.length)];
          const def2 = POWERUP_DEFS[ptype2];
          powerups.push({ x: e.x + 20, y: e.y + 15, r: 10, type: ptype2, color: def2.color, label: def2.label, life: 15, bobT: 0 });
        }
      }
      enemies.splice(i, 1);
    }
  }

  // Powerups
  for (let i = powerups.length - 1; i >= 0; i--) {
    const p = powerups[i];
    p.bobT += dt;
    p.life -= dt;
    if (p.life <= 0) { powerups.splice(i, 1); continue; }
    // Drift toward player
    const pdx = player.x - p.x, pdy = player.y - p.y;
    const pdist = Math.sqrt(pdx * pdx + pdy * pdy);
    if (pdist > 1) {
      const driftSpeed = pdist < 120 ? 100 : 30; // faster when close
      p.x += (pdx / pdist) * driftSpeed * dt;
      p.y += (pdy / pdist) * driftSpeed * dt;
    }
    if (circlesOverlap(player, player.r + 5, p, p.r)) {
      if (p.isWeapon) {
        applyWeaponDrop(p.type);
      } else {
        applyPowerup(p.type);
      }
      spawnParticles(p.x, p.y, 8, p.color, 0.4);
      sfx('powerup');
      const lbl = p.isWeapon ? WEAPON_DROP_DEFS[p.type].label : POWERUP_DEFS[p.type].label;
      spawnFloatingText(p.x, p.y + 15, lbl, p.color, 14);
      powerups.splice(i, 1);
    }
  }

  // Floating texts
  for (let i = floatingTexts.length - 1; i >= 0; i--) {
    const ft = floatingTexts[i];
    ft.t += dt; ft.y += 40 * dt;
    if (ft.t >= ft.dur) floatingTexts.splice(i, 1);
  }

  // Wave announcement
  if (waveAnnounce) {
    waveAnnounce.t += dt;
    if (waveAnnounce.t >= waveAnnounce.dur) waveAnnounce = null;
  }

  // Explosions
  for (let i = explosions.length - 1; i >= 0; i--) {
    const ex = explosions[i];
    ex.t += dt;
    ex.r = ex.maxR * Math.sin(Math.min(ex.t / ex.dur, 1) * Math.PI);
    if (ex.t >= ex.dur) explosions.splice(i, 1);
  }

  // Particles
  for (let i = particles.length - 1; i >= 0; i--) {
    const p = particles[i];
    p.x += p.vx * dt; p.y += p.vy * dt;
    p.life -= dt;
    if (p.life <= 0) particles.splice(i, 1);
  }

  if (shakeTimer > 0) shakeTimer -= dt;
}

// ============ DETONATION ============
function triggerDetonation() {
  let toDetonate = [];
  let totalStuckCount = 0;
  for (let e of enemies) {
    if (e.stuck.length > 0) { toDetonate.push(e); totalStuckCount += e.stuck.length; }
  }
  if (toDetonate.length === 0) return;

  let stuckBonus = 1, bonusLabel = '';
  if (totalStuckCount >= 30) { stuckBonus = 8; bonusLabel = 'APOCALYPSE'; }
  else if (totalStuckCount >= 20) { stuckBonus = 5; bonusLabel = 'MASSIVE'; }
  else if (totalStuckCount >= 15) { stuckBonus = 4; bonusLabel = 'HUGE'; }
  else if (totalStuckCount >= 10) { stuckBonus = 3; bonusLabel = 'BIG'; }
  else if (totalStuckCount >= 5) { stuckBonus = 2; bonusLabel = 'NICE'; }

  if (stuckBonus > 1) {
    const col = stuckBonus >= 5 ? '#f4f' : stuckBonus >= 3 ? '#ff4' : '#4ff';
    waveAnnounce = { text: `${bonusLabel} DETONATION x${stuckBonus}!`, t: 0, dur: 1.5, color: col };
    sfx('chain', { depth: Math.min(stuckBonus, 5) });
  }

  player.detonationBonus = stuckBonus;
  setTimeout(() => { player.detonationBonus = 1; }, 2000 + toDetonate.length * 200);

  const flatBonus = totalStuckCount * 5 * stuckBonus;
  score += flatBonus;
  let avgX = 0, avgY = 0;
  for (let e of toDetonate) { avgX += e.x; avgY += e.y; }
  avgX /= toDetonate.length; avgY /= toDetonate.length;
  if (flatBonus > 0) {
    const col = stuckBonus >= 5 ? '#f4f' : stuckBonus >= 3 ? '#ff4' : '#fff';
    spawnFloatingText(avgX, avgY + 30, `DETONATE +${flatBonus}`, col, stuckBonus > 1 ? 20 : 14);
  }

  chainExplode(toDetonate, 0, stuckBonus);
}

function chainExplode(initialEnemies, depth, stuckBonus) {
  let nextWave = [];
  const megaMult = player.megablast > 0 ? 2 : 1;
  stuckBonus = stuckBonus || 1;
  const overMult = player.overcharge > 0 ? 1.8 : 1;
  const blastPerk = 1 + getPerkCount('blastRadius') * 0.2;
  const chainPerk = 1 + getPerkCount('chainRange') * 0.25;
  const blastRadius = 80 * megaMult * overMult * blastPerk * (1 + (stuckBonus - 1) * 0.15);

  for (let e of initialEnemies) {
    if (e.stuck.length === 0) continue;
    const count = e.stuck.length;
    const dmg = count * 2;

    e.hp -= dmg;
    e.explodedBy = true;
    const r = (30 + count * 10) * megaMult * overMult;
    const sides = 5 + Math.floor(Math.random() * 4);
    const rot = Math.random() * Math.PI * 2;
    explosions.push({ x: e.x, y: e.y, r: 0, maxR: r, t: 0, dur: 0.4 + (megaMult - 1) * 0.2, sides, rot });
    shakeTimer = 0.2 + count * 0.05 * megaMult;
    shakeIntensity = (4 + count * 2) * megaMult;
    spawnParticles(e.x, e.y, (8 + count * 4) * megaMult, '#ff0', 0.5);
    spawnParticles(e.x, e.y, (5 + count * 2) * megaMult, '#f80', 0.7);
    if (megaMult > 1) spawnParticles(e.x, e.y, 12, '#fff', 0.6);
    sfx('explode', { intensity: count * megaMult });
    if (depth > 0) sfx('chain', { depth });

    for (let other of enemies) {
      if (other === e || other.stuck.length === 0 || initialEnemies.includes(other)) continue;
      if (dist(other, e) < (blastRadius + r) * chainPerk) nextWave.push(other);
    }

    for (let other of enemies) {
      if (other === e) continue;
      if (dist(other, e) < r) {
        other.hp -= Math.ceil(count * 0.5 * megaMult);
        other.explodedBy = true;
      }
    }

    e.stuckBeforeDetonation = count;
    e.stuck = [];
  }
  if (nextWave.length > 0) chainExplode(nextWave, depth + 1, stuckBonus);
}

// ============ RIGHT-CLICK DETONATE (single listener) ============
document.addEventListener('mousedown', e => {
  if (e.button === 2 && !gameOver) triggerDetonation();
});

const bulletMat = new THREE.MeshBasicMaterial({ color: 0xffff00 });
const shrapnelGeo = new THREE.SphereGeometry(3, 6, 6);
const shrapnelMat = new THREE.MeshBasicMaterial({ color: 0xff8800 });
const shrapnelRingGeo = new THREE.TorusGeometry(6, 0.8, 4, 8);
const shrapnelRingMat = new THREE.MeshBasicMaterial({ color: 0xffcc44, transparent: true, opacity: 0.5 });
const stuckGeo = new THREE.SphereGeometry(3, 6, 6);
const stuckMat = new THREE.MeshBasicMaterial({ color: 0xffaa00 });
const explosionGeo = new THREE.SphereGeometry(1, 10, 10);
const explosionCoreMat = new THREE.MeshBasicMaterial({ color: 0xffff88, transparent: true, opacity: 1.0 });

// Player mesh
const playerGroup = new THREE.Group();
scene.add(playerGroup);
const playerBodyMat = new THREE.MeshStandardMaterial({ color: 0x44aaff, emissive: 0x2266aa, emissiveIntensity: 0.5, metalness: 0.7, roughness: 0.3 });
const playerBody = new THREE.Mesh(new THREE.CylinderGeometry(8, 14, 10, 8), playerBodyMat);
playerBody.rotation.x = Math.PI / 2;
playerGroup.add(playerBody);
// Gun barrel
const barrelMat = new THREE.MeshBasicMaterial({ color: 0x88ccff });
const barrel = new THREE.Mesh(new THREE.BoxGeometry(20, 4, 4), barrelMat);
barrel.position.set(14, 0, 0);
playerGroup.add(barrel);
// Engine light
const pEngineLight = new THREE.PointLight(0x44aaff, 0.5, 60);
playerGroup.add(pEngineLight);
// Shield
const pShieldGeo = new THREE.TorusGeometry(20, 1.5, 6, 16);
const pShieldMat = new THREE.MeshBasicMaterial({ color: 0xffff88, transparent: true, opacity: 0.5 });
const pShieldMesh = new THREE.Mesh(pShieldGeo, pShieldMat);
pShieldMesh.visible = false;
playerGroup.add(pShieldMesh);

// Instanced particles
const maxParticles3D = 4000;
const particleInstanced = new THREE.InstancedMesh(
  new THREE.BoxGeometry(1, 1, 1),
  new THREE.MeshBasicMaterial({ color: 0xffffff }),
  maxParticles3D
);
particleInstanced.instanceMatrix.setUsage(THREE.DynamicDrawUsage);
particleInstanced.count = 0;
scene.add(particleInstanced);
const dummyMatrix = new THREE.Matrix4();
const dummyColor = new THREE.Color();

// ============ 3D DRAW ============
function draw3D(now) {
  // Camera follows player with shake
  const shakeX = shakeTimer > 0 ? (Math.random() - 0.5) * shakeIntensity * 2 : 0;
  const shakeY = shakeTimer > 0 ? (Math.random() - 0.5) * shakeIntensity * 2 : 0;
  camera.position.set(player.x + shakeX, player.y + shakeY, 500);
  camera.lookAt(player.x, player.y, 0);

  // Player
  const vis = player.invuln <= 0 || Math.floor(player.invuln * 10) % 2 === 0;
  playerGroup.visible = vis && !gameOver && !startScreen;
  playerGroup.position.set(player.x, player.y, 0);
  playerGroup.rotation.z = player.angle;
  pShieldMesh.visible = player.shield > 0;
  if (player.shield > 0) { pShieldMesh.rotation.z = now * 0.002 - player.angle; pShieldMat.opacity = 0.3 + 0.2 * Math.sin(now * 0.01); }

  // Enemies
  for (let e of enemies) {
    const mesh = getOrCreateMesh(e, () => {
      let geo, mat;
      if (e.type === 'hive') {
        geo = new THREE.IcosahedronGeometry(e.r, 1);
        mat = new THREE.MeshStandardMaterial({
          color: new THREE.Color(e.color), emissive: new THREE.Color(e.color),
          emissiveIntensity: 0.3, metalness: 0.3, roughness: 0.7
        });
      } else if (e.type === 'runner') {
        geo = new THREE.SphereGeometry(e.r, 16, 12);
        mat = new THREE.MeshStandardMaterial({
          color: new THREE.Color(e.color), emissive: new THREE.Color(e.color),
          emissiveIntensity: 0.3, metalness: 0.6, roughness: 0.2
        });
      } else {
        const depth = e.type === 'boss' ? 20 : e.type === 'large' || e.type === 'spawner' ? 14 : e.type === 'hive' ? 18 : 8;
        const segments = e.type === 'boss' ? 8 : e.type === 'spawner' ? 10 : 6;
        geo = new THREE.CylinderGeometry(e.r * 0.8, e.r, depth, segments);
        geo.rotateX(Math.PI / 2);
        mat = new THREE.MeshStandardMaterial({
          color: new THREE.Color(e.color), emissive: new THREE.Color(e.color),
          emissiveIntensity: 0.2, metalness: 0.4, roughness: 0.5
        });
      }
      const m = new THREE.Mesh(geo, mat);
      // Eyes
      const eyeSize = e.type === 'boss' ? 5 : e.type === 'runner' ? 2 : 2.5;
      const eyeGeo = new THREE.SphereGeometry(eyeSize, 6, 6);
      const eyeMat = new THREE.MeshBasicMaterial({ color: e.type === 'boss' ? 0xffff00 : 0x111111 });
      const eye = new THREE.Mesh(eyeGeo, eyeMat);
      const eyeZ = e.type === 'runner' ? e.r * 0.7 : e.type === 'hive' ? e.r * 0.6 : (e.type === 'boss' ? 11 : e.type === 'large' || e.type === 'spawner' ? 8 : 5);
      eye.position.set(e.r * 0.5, 0, eyeZ);
      eye.name = 'eye';
      m.add(eye);
      // Runner: speed trail rings
      if (e.type === 'runner') {
        for (let ri = 0; ri < 3; ri++) {
          const trailGeo = new THREE.TorusGeometry(e.r + 4 + ri * 5, 0.6, 4, 16);
          const trailMat = new THREE.MeshBasicMaterial({ color: 0x88ffff, transparent: true, opacity: 0.4 - ri * 0.12 });
          const trail = new THREE.Mesh(trailGeo, trailMat);
          trail.name = 'trail' + ri;
          m.add(trail);
        }
      }
      if (e.type === 'boss') {
        const eye2 = new THREE.Mesh(eyeGeo, eyeMat);
        eye2.position.set(e.r * 0.3, e.r * 0.4, eyeZ);
        m.add(eye2);
        const eye3 = new THREE.Mesh(eyeGeo, eyeMat);
        eye3.position.set(e.r * 0.3, -e.r * 0.4, eyeZ);
        m.add(eye3);
      }
      // Electric: add zap ring
      if (e.type === 'electric') {
        const zapRingGeo = new THREE.TorusGeometry(140, 1.5, 6, 24);
        const zapRingMat = new THREE.MeshBasicMaterial({ color: 0xffff00, transparent: true, opacity: 0 });
        const zapRing = new THREE.Mesh(zapRingGeo, zapRingMat);
        zapRing.name = 'zapRing';
        m.add(zapRing);
      }
      // Spawner: add spawner ring
      if (e.type === 'spawner') {
        const spawnRingGeo = new THREE.TorusGeometry(35, 1, 6, 16);
        const spawnRingMat = new THREE.MeshBasicMaterial({ color: 0xaa66aa, transparent: true, opacity: 0.3 });
        const spawnRing = new THREE.Mesh(spawnRingGeo, spawnRingMat);
        spawnRing.name = 'spawnRing';
        m.add(spawnRing);
      }
      // Hive: pulsing rings
      if (e.type === 'hive') {
        for (let hi = 0; hi < 2; hi++) {
          const hiveRingGeo = new THREE.TorusGeometry(e.r + 8 + hi * 12, 1.2, 6, 20);
          const hiveRingMat = new THREE.MeshBasicMaterial({ color: 0x6aa644, transparent: true, opacity: 0.35 });
          const hiveRing = new THREE.Mesh(hiveRingGeo, hiveRingMat);
          hiveRing.name = 'hiveRing' + hi;
          m.add(hiveRing);
        }
      }
      return m;
    });
    const faceAngle = Math.atan2(player.y - e.y, player.x - e.x);
    mesh.position.set(e.x, e.y, 0);
    mesh.rotation.z = faceAngle;
    if (e.stuck.length > 0) {
      mesh.material.emissiveIntensity = 0.2 + 0.3 * Math.sin(now * 0.008) + e.stuck.length * 0.05;
    } else {
      mesh.material.emissiveIntensity = 0.2;
    }
    // Electric zap ring animation
    if (e.type === 'electric') {
      const zapRing = mesh.getObjectByName('zapRing');
      if (zapRing) {
        zapRing.material.opacity = e.zapActive > 0 ? 0.5 + 0.3 * Math.sin(now * 0.02) : 0;
        zapRing.rotation.z = now * 0.003 - faceAngle;
        if (e.zapActive > 0) zapRing.scale.setScalar(0.8 + 0.2 * Math.sin(now * 0.015));
      }
    }
    // Spawner ring rotation
    if (e.type === 'spawner') {
      const spawnRing = mesh.getObjectByName('spawnRing');
      if (spawnRing) {
        spawnRing.rotation.z = now * 0.002 - faceAngle;
        const spawnPulse = e.spawnTimer < 1 ? 0.4 + 0.4 * Math.sin(now * 0.01) : 0.3;
        spawnRing.material.opacity = spawnPulse;
      }
    }
    // Hive: pulsing rings
    if (e.type === 'hive') {
      for (let hi = 0; hi < 2; hi++) {
        const hiveRing = mesh.getObjectByName('hiveRing' + hi);
        if (hiveRing) {
          const phase = now * 0.005 + hi * 1.5;
          const pulse = 0.7 + 0.3 * Math.sin(phase);
          hiveRing.scale.setScalar(pulse);
          hiveRing.material.opacity = (0.3 + (e.spawnTimer < 0.5 ? 0.3 : 0)) * pulse;
          hiveRing.rotation.z = now * (0.001 + hi * 0.002);
        }
      }
    }
    // Runner: animated speed trail rings
    if (e.type === 'runner') {
      for (let ri = 0; ri < 3; ri++) {
        const trail = mesh.getObjectByName('trail' + ri);
        if (trail) {
          const phase = now * 0.008 + ri * 2.1;
          const pulse = 0.6 + 0.4 * Math.sin(phase);
          trail.scale.setScalar(pulse);
          trail.material.opacity = (0.35 - ri * 0.1) * pulse;
          trail.rotation.z = now * (0.004 + ri * 0.002) - faceAngle;
        }
      }
    }
  }

  // Stuck bullets
  for (let e of enemies) {
    for (let s of e.stuck) {
      const sm = getOrCreateMesh(s, () => new THREE.Mesh(stuckGeo, stuckMat.clone()));
      const pulse = 0.5 + 0.5 * Math.sin(s.pulseT * 8);
      sm.position.set(e.x + s.ox, e.y + s.oy, 8);
      sm.scale.setScalar(0.8 + pulse * 0.4);
      sm.material.color.setRGB(1, 0.5 + pulse * 0.3, pulse * 0.2);
    }
  }

  // Bullets
  for (let b of bullets) {
    const mesh = getOrCreateMesh(b, () => {
      if (b.shrapnel) {
        const m = new THREE.Mesh(shrapnelGeo, shrapnelMat.clone());
        const ring = new THREE.Mesh(shrapnelRingGeo, shrapnelRingMat.clone());
        ring.name = 'ring';
        m.add(ring);
        return m;
      }
      if (b.mega) {
        const group = new THREE.Group();
        const core = new THREE.Mesh(new THREE.SphereGeometry(9, 8, 8), new THREE.MeshBasicMaterial({ color: 0xffff00 }));
        group.add(core);
        const glow = new THREE.Mesh(new THREE.SphereGeometry(13, 8, 8), new THREE.MeshBasicMaterial({ color: 0xffaa00, transparent: true, opacity: 0.3 }));
        glow.name = 'mglow';
        group.add(glow);
        return group;
      }
      return new THREE.Mesh(bulletGeo, bulletMat);
    });
    mesh.position.set(b.x, b.y, 4);
    if (b.shrapnel) {
      const pulse = 0.6 + 0.4 * Math.sin(now * 0.012 + b.x);
      mesh.scale.setScalar(0.8 + pulse * 0.3);
      mesh.material.color.setRGB(1, 0.4 + pulse * 0.4, pulse * 0.1);
      const ring = mesh.getObjectByName('ring');
      if (ring) { ring.rotation.x = now * 0.005; ring.rotation.y = now * 0.003; ring.material.opacity = 0.3 + pulse * 0.3; }
    }
    if (b.mega) {
      const mglow = mesh.getObjectByName('mglow');
      if (mglow) {
        const pulse = 0.5 + 0.5 * Math.sin(now * 0.01 + b.x);
        mglow.scale.setScalar(0.9 + pulse * 0.3);
        mglow.material.opacity = 0.2 + pulse * 0.15;
      }
    }
  }

  // Explosions
  const sortedExp = explosions.slice().sort((a, b) => b.maxR - a.maxR);
  let li = 0;
  for (const l of expLights) l.visible = false;
  for (let ex of sortedExp) {
    const sides = ex.sides || 6;
    const mesh = getOrCreateMesh(ex, () => {
      function makeIrregularPoly(sides) {
        const shape = new THREE.Shape();
        for (let i = 0; i < sides; i++) {
          const angle = (Math.PI * 2 / sides) * i;
          const r = 0.7 + Math.random() * 0.3;
          const x = Math.cos(angle) * r, y = Math.sin(angle) * r;
          if (i === 0) shape.moveTo(x, y); else shape.lineTo(x, y);
        }
        shape.closePath();
        return new THREE.ShapeGeometry(shape);
      }
      const polyGeo = makeIrregularPoly(sides);
      const m = new THREE.Mesh(polyGeo, new THREE.MeshBasicMaterial({ color: 0xffdd00, transparent: true, opacity: 1.0 }));
      const coreGeo = makeIrregularPoly(sides);
      const core = new THREE.Mesh(coreGeo, explosionCoreMat.clone());
      core.name = 'core';
      m.add(core);
      return m;
    });
    const alpha = 1 - ex.t / ex.dur;
    mesh.position.set(ex.x, ex.y, 2);
    mesh.scale.setScalar(Math.max(0.1, ex.r));
    mesh.rotation.z = ex.rot || 0;
    mesh.material.opacity = Math.max(alpha, 0.4);
    mesh.material.color.setHSL(0.14 - alpha * 0.02, 1, 0.55 + alpha * 0.25);
    const core = mesh.getObjectByName('core');
    if (core) { core.scale.setScalar(0.5); core.material.opacity = Math.max(alpha, 0.5); }
    if (li < MAX_EXP_LIGHTS) {
      const lt = expLights[li++];
      lt.visible = true;
      lt.position.set(ex.x, ex.y, 30);
      lt.intensity = alpha * 3 * (ex.maxR / 50);
      lt.distance = Math.min(ex.r * 3, 300);
    }
  }

  // Powerups
  for (let p of powerups) {
    const fade = p.life < 3 ? 0.3 + 0.7 * (p.life / 3) : 1;
    const blink = p.life < 3 && Math.floor(p.life * 6) % 2 === 0;
    const mesh = getOrCreateMesh(p, () => {
      const group = new THREE.Group();
      // Core octahedron
      const core = new THREE.Mesh(
        new THREE.OctahedronGeometry(8, 0),
        new THREE.MeshBasicMaterial({ color: new THREE.Color(p.color), transparent: true })
      );
      core.name = 'pcore';
      group.add(core);
      // Pulsing ring
      const ringGeo = new THREE.RingGeometry(14, 17, 24);
      const ringMat = new THREE.MeshBasicMaterial({ color: new THREE.Color(p.color), transparent: true, opacity: 0.6, side: THREE.DoubleSide });
      const ring = new THREE.Mesh(ringGeo, ringMat);
      ring.name = 'pring';
      group.add(ring);
      // Outer glow ring
      const glowGeo = new THREE.RingGeometry(18, 24, 24);
      const glowMat = new THREE.MeshBasicMaterial({ color: new THREE.Color(p.color), transparent: true, opacity: 0.25, side: THREE.DoubleSide });
      const glow = new THREE.Mesh(glowGeo, glowMat);
      glow.name = 'pglow';
      group.add(glow);
      return group;
    });
    mesh.visible = !blink;
    const bobZ = 5 + Math.sin(p.bobT * 4) * 4;
    mesh.position.set(p.x, p.y, bobZ);
    const pcore = mesh.getObjectByName('pcore');
    if (pcore) {
      pcore.rotation.z = now * 0.003;
      pcore.rotation.y = now * 0.002;
      pcore.material.opacity = fade;
    }
    const pring = mesh.getObjectByName('pring');
    if (pring) {
      const pulse = 0.8 + 0.4 * Math.sin(now * 0.006);
      pring.scale.setScalar(pulse);
      pring.material.opacity = fade * 0.6 * pulse;
      pring.rotation.z = -now * 0.002;
    }
    const pglow = mesh.getObjectByName('pglow');
    if (pglow) {
      const pulse2 = 0.7 + 0.5 * Math.sin(now * 0.004 + 1);
      pglow.scale.setScalar(pulse2);
      pglow.material.opacity = fade * 0.2 * pulse2;
      pglow.rotation.z = now * 0.001;
    }
  }

  // Particles
  let pIdx = 0;
  const pCount = Math.min(particles.length, maxParticles3D);
  for (let i = 0; i < pCount; i++) {
    const p = particles[i];
    const alpha = p.life / p.maxLife;
    const s = p.size * alpha;
    dummyMatrix.makeScale(s, s, s);
    dummyMatrix.setPosition(p.x, p.y, 2);
    particleInstanced.setMatrixAt(pIdx, dummyMatrix);
    dummyColor.set(p.color);
    particleInstanced.setColorAt(pIdx, dummyColor);
    pIdx++;
  }
  particleInstanced.count = pIdx;
  if (pIdx > 0) {
    particleInstanced.instanceMatrix.needsUpdate = true;
    if (particleInstanced.instanceColor) particleInstanced.instanceColor.needsUpdate = true;
  }

  cleanupMeshes();
  renderer.render(scene, camera);
}

// ============ HUD ============
function drawHUD(now) {
  ctx.clearRect(0, 0, W, H);

  // Floating texts (convert world to screen)
  for (let ft of floatingTexts) {
    const alpha = 1 - ft.t / ft.dur;
    const sx = W / 2 + (ft.x - player.x);
    const sy = H / 2 - (ft.y - player.y);
    ctx.globalAlpha = alpha;
    ctx.fillStyle = ft.color;
    ctx.font = `bold ${ft.size}px monospace`;
    ctx.textAlign = 'center';
    ctx.fillText(ft.text, sx, sy);
  }
  ctx.globalAlpha = 1;
  ctx.textAlign = 'left';

  // Wave announcement
  if (waveAnnounce) {
    const wa = waveAnnounce;
    const alpha = wa.t < 0.3 ? wa.t / 0.3 : wa.t > wa.dur - 0.5 ? (wa.dur - wa.t) / 0.5 : 1;
    ctx.globalAlpha = alpha;
    ctx.fillStyle = wa.color;
    ctx.font = 'bold 36px monospace';
    ctx.textAlign = 'center';
    ctx.fillText(wa.text, W / 2, H / 2 - 80);
    ctx.textAlign = 'left';
    ctx.globalAlpha = 1;
  }

  // Score & high score
  ctx.fillStyle = '#fff'; ctx.font = '14px monospace';
  ctx.fillText(`SCORE: ${score}`, 10, 20);
  ctx.fillStyle = '#888'; ctx.font = '11px monospace';
  ctx.fillText(`HI: ${highScore}`, 10 + String(score).length * 8 + 70, 20);

  // HP & XP bars under player
  {
    const px = W / 2, py = H / 2 + 28;
    const barW = 40, barH = 4;

    // HP bar
    ctx.fillStyle = '#333';
    ctx.fillRect(px - barW / 2, py, barW, barH);
    ctx.fillStyle = '#f44';
    ctx.fillRect(px - barW / 2, py, barW * (player.hp / player.maxHp), barH);

    // XP bar
    ctx.fillStyle = '#222';
    ctx.fillRect(px - barW / 2, py + barH + 1, barW, 3);
    ctx.fillStyle = '#af4';
    ctx.fillRect(px - barW / 2, py + barH + 1, barW * (xp / xpToNext), 3);

    // Level label
    ctx.fillStyle = '#af4'; ctx.font = 'bold 9px monospace'; ctx.textAlign = 'center';
    ctx.fillText(`LV${playerLevel}`, px, py + barH + 12);

    ctx.textAlign = 'left';
  }

  // Combo
  if (combo > 1) {
    const mult = Math.min(1 + Math.floor(combo / 3), 8);
    const pulse = 0.8 + 0.2 * Math.sin(now / 100);
    ctx.fillStyle = mult >= 5 ? '#f4f' : mult >= 3 ? '#ff4' : '#4ff';
    ctx.globalAlpha = pulse;
    ctx.font = `bold ${16 + mult}px monospace`;
    ctx.fillText(`${combo} COMBO x${mult}`, W - 180, 22);
    ctx.fillStyle = '#333'; ctx.fillRect(W - 180, 28, 100, 4);
    ctx.fillStyle = mult >= 5 ? '#f4f' : mult >= 3 ? '#ff4' : '#4ff';
    ctx.fillRect(W - 180, 28, 100 * (comboTimer / 2), 4);
    ctx.globalAlpha = 1;
  }

  // Weapon & powerup bar (bottom center)
  {
    const activeItems = [];
    // Weapon first
    const wLabel = player.shotgun > 0 ? 'SHOTGUN' : player.minigun > 0 ? 'MINIGUN' : 'PISTOL';
    const wColor = player.shotgun > 0 ? '#f84' : player.minigun > 0 ? '#ff4' : '#4af';
    const wTime = player.shotgun > 0 ? player.shotgun : player.minigun > 0 ? player.minigun : -1;
    activeItems.push({ label: wLabel, color: wColor, t: wTime, max: 10, isWeapon: true });
    // Powerups
    if (player.spread > 0) activeItems.push({ label: 'SPREAD', color: '#4ff', t: player.spread, max: 12 });
    if (player.rapid > 0) activeItems.push({ label: 'RAPID', color: '#f4f', t: player.rapid, max: 10 });
    if (player.megablast > 0) activeItems.push({ label: 'MEGA', color: '#ff4', t: player.megablast, max: 10 });
    if (player.shield > 0) activeItems.push({ label: 'SHIELD', color: '#ff8', t: player.shield, max: 8 });
    if (player.ricochet > 0) activeItems.push({ label: 'RICOCHET', color: '#f84', t: player.ricochet, max: 10 });
    if (player.homing > 0) activeItems.push({ label: 'HOMING', color: '#8ff', t: player.homing, max: 8 });
    if (player.overcharge > 0) activeItems.push({ label: 'OVERCHARGE', color: '#fa0', t: player.overcharge, max: 10 });
    if (player.vampiric > 0) activeItems.push({ label: 'VAMPIRIC', color: '#f44', t: player.vampiric, max: 12 });

    const barW = 150, barH = 22, gap = 10;
    const totalH = activeItems.length * barH + (activeItems.length - 1) * gap;
    const bx = W / 2 - barW / 2;
    const startY = H - 75 - totalH;

    for (let i = 0; i < activeItems.length; i++) {
      const item = activeItems[i];
      const by = startY + i * (barH + gap);

      // Background
      ctx.fillStyle = 'rgba(0,0,0,0.5)';
      ctx.fillRect(bx, by, barW, barH);

      // Duration fill (pistol has no timer)
      if (item.t > 0) {
        const frac = item.t / item.max;
        ctx.fillStyle = item.color;
        ctx.globalAlpha = 0.35;
        ctx.fillRect(bx, by, barW * frac, barH);
        ctx.globalAlpha = 1;
      }

      // Border
      ctx.strokeStyle = item.color;
      ctx.lineWidth = item.isWeapon ? 2 : 1;
      ctx.strokeRect(bx, by, barW, barH);

      // Label
      ctx.fillStyle = item.color; ctx.font = 'bold 14px monospace'; ctx.textAlign = 'center';
      ctx.fillText(item.label, bx + barW / 2, by + 16);
    }
    ctx.textAlign = 'left';
  }

  // Stuck count & detonation tier
  let totalStuck = 0;
  for (let e of enemies) totalStuck += e.stuck.length;
  if (totalStuck > 0) {
    const pulse = 0.7 + 0.3 * Math.sin(now / 200);
    let tierLabel = '', tierColor = '#f80';
    if (totalStuck >= 30) { tierLabel = ' APOCALYPSE x8'; tierColor = '#f4f'; }
    else if (totalStuck >= 20) { tierLabel = ' MASSIVE x5'; tierColor = '#f4f'; }
    else if (totalStuck >= 15) { tierLabel = ' HUGE x4'; tierColor = '#ff4'; }
    else if (totalStuck >= 10) { tierLabel = ' BIG x3'; tierColor = '#ff4'; }
    else if (totalStuck >= 5) { tierLabel = ' NICE x2'; tierColor = '#4ff'; }
    let nextAt = totalStuck < 5 ? 5 : totalStuck < 10 ? 10 : totalStuck < 15 ? 15 : totalStuck < 20 ? 20 : totalStuck < 30 ? 30 : 0;
    ctx.fillStyle = `rgba(255,128,0,${pulse})`;
    ctx.font = 'bold 16px monospace';
    ctx.textAlign = 'center';
    ctx.fillText(`STUCK: ${totalStuck}${tierLabel}`, W / 2, 20);
    if (nextAt > 0) { ctx.fillStyle = 'rgba(255,255,255,0.4)'; ctx.font = '11px monospace'; ctx.fillText(`next bonus at ${nextAt}`, W / 2, 34); }
    ctx.fillStyle = tierColor; ctx.font = '12px monospace';
    ctx.fillText('[X/SHIFT/RIGHT-CLICK to DETONATE]', W / 2, nextAt > 0 ? 48 : 34);
    ctx.textAlign = 'left';
  }

  // Wave
  ctx.fillStyle = '#666'; ctx.font = '11px monospace';
  ctx.fillText(`WAVE ${waveNum}`, W - 70, 14);

  // Minimap
  {
    const mmR = 60; // minimap radius
    const mmX = W - mmR - 15, mmY = H - mmR - 25;
    const scale = mmR / ARENA_R;

    // Background
    ctx.globalAlpha = 0.4;
    ctx.fillStyle = '#111';
    ctx.beginPath(); ctx.arc(mmX, mmY, mmR, 0, Math.PI * 2); ctx.fill();
    ctx.strokeStyle = '#446'; ctx.lineWidth = 1;
    ctx.beginPath(); ctx.arc(mmX, mmY, mmR, 0, Math.PI * 2); ctx.stroke();
    ctx.globalAlpha = 1;

    // Enemies
    for (let e of enemies) {
      const ex = mmX + e.x * scale, ey = mmY - e.y * scale;
      const er = Math.max(1.5, e.r * scale * 0.5);
      ctx.fillStyle = e.stuck.length > 0 ? '#fa0' : e.color;
      ctx.beginPath(); ctx.arc(ex, ey, er, 0, Math.PI * 2); ctx.fill();
    }

    // Powerups
    for (let p of powerups) {
      const px2 = mmX + p.x * scale, py2 = mmY - p.y * scale;
      ctx.fillStyle = p.color;
      ctx.fillRect(px2 - 1.5, py2 - 1.5, 3, 3);
    }

    // Player
    ctx.fillStyle = '#4af';
    const ppx = mmX + player.x * scale, ppy = mmY - player.y * scale;
    ctx.beginPath(); ctx.arc(ppx, ppy, 3, 0, Math.PI * 2); ctx.fill();
  }

  // Controls
  ctx.fillStyle = 'rgba(255,255,255,0.3)'; ctx.font = '11px monospace';
  ctx.fillText('WASD: Move | Mouse: Aim & Shoot | Right-Click/X: Detonate | R: Restart', W / 2 - 250, H - 10);

  // Acquired perks (small icons)
  if (perksPicked.length > 0) {
    let hudPerkY = 40;
    ctx.fillStyle = 'rgba(255,255,255,0.3)'; ctx.font = '9px monospace';
    ctx.fillText('PERKS:', 10, hudPerkY);
    let px = 52;
    const perkCounts = {};
    for (const pid of perksPicked) perkCounts[pid] = (perkCounts[pid] || 0) + 1;
    for (const [pid, cnt] of Object.entries(perkCounts)) {
      const pdef = ALL_PERKS.find(p => p.id === pid);
      if (!pdef) continue;
      ctx.fillStyle = pdef.color; ctx.font = 'bold 9px monospace';
      ctx.fillText(pdef.icon + (cnt > 1 ? `x${cnt}` : ''), px, hudPerkY);
      px += (pdef.icon.length + (cnt > 1 ? 3 : 0)) * 6 + 6;
    }
  }

  // Perk selection screen
  if (perkChoices) {
    ctx.fillStyle = 'rgba(0,0,0,0.75)'; ctx.fillRect(0, 0, W, H);

    ctx.fillStyle = '#af4'; ctx.font = 'bold 30px monospace'; ctx.textAlign = 'center';
    ctx.fillText(`LEVEL UP! (Lv ${playerLevel})`, W / 2, H / 2 - 110);
    ctx.fillStyle = '#fff'; ctx.font = '14px monospace';
    ctx.fillText('Choose a perk (click or press 1/2/3)', W / 2, H / 2 - 80);

    const cardW = 200, cardH = 140, gap = 30;
    const totalW = perkChoices.length * cardW + (perkChoices.length - 1) * gap;
    const startX = W / 2 - totalW / 2;
    const cardY = H / 2 - cardH / 2 + 20;

    for (let i = 0; i < perkChoices.length; i++) {
      const perk = perkChoices[i];
      const cx = startX + i * (cardW + gap);
      const stacks = getPerkCount(perk.id);

      // Card hover detection
      const hovered = mouse.sx >= cx && mouse.sx <= cx + cardW && mouse.sy >= cardY && mouse.sy <= cardY + cardH;

      // Card background
      ctx.fillStyle = hovered ? 'rgba(60,60,80,0.95)' : 'rgba(30,30,50,0.95)';
      ctx.fillRect(cx, cardY, cardW, cardH);
      ctx.strokeStyle = perk.color;
      ctx.lineWidth = hovered ? 3 : 1.5;
      ctx.strokeRect(cx, cardY, cardW, cardH);

      // Number
      ctx.fillStyle = 'rgba(255,255,255,0.3)'; ctx.font = 'bold 16px monospace';
      ctx.textAlign = 'left';
      ctx.fillText(`[${i + 1}]`, cx + 8, cardY + 22);

      // Icon
      ctx.fillStyle = perk.color; ctx.font = 'bold 22px monospace';
      ctx.textAlign = 'center';
      ctx.fillText(perk.icon, cx + cardW / 2, cardY + 38);

      // Label
      ctx.fillStyle = '#fff'; ctx.font = 'bold 13px monospace';
      ctx.fillText(perk.label, cx + cardW / 2, cardY + 62);

      // Description (word wrap)
      ctx.fillStyle = '#aaa'; ctx.font = '11px monospace';
      const words = perk.desc.split(' ');
      let line = '', ly = cardY + 82;
      for (const w of words) {
        const test = line + (line ? ' ' : '') + w;
        if (ctx.measureText(test).width > cardW - 20) {
          ctx.fillText(line, cx + cardW / 2, ly); ly += 14; line = w;
        } else { line = test; }
      }
      if (line) ctx.fillText(line, cx + cardW / 2, ly);

      // Stack count
      if (stacks > 0) {
        ctx.fillStyle = perk.color; ctx.font = '10px monospace';
        ctx.fillText(`(owned: ${stacks})`, cx + cardW / 2, cardY + cardH - 8);
      }
    }

    ctx.textAlign = 'left';
  }

  // Crosshair - follows mouse directly
  const cx = mouse.sx;
  const cy = mouse.sy;
  ctx.strokeStyle = 'rgba(255,255,255,0.6)'; ctx.lineWidth = 1.5;
  ctx.beginPath(); ctx.arc(cx, cy, 10, 0, Math.PI * 2); ctx.stroke();
  ctx.beginPath(); ctx.moveTo(cx - 15, cy); ctx.lineTo(cx - 6, cy); ctx.stroke();
  ctx.beginPath(); ctx.moveTo(cx + 6, cy); ctx.lineTo(cx + 15, cy); ctx.stroke();
  ctx.beginPath(); ctx.moveTo(cx, cy - 15); ctx.lineTo(cx, cy - 6); ctx.stroke();
  ctx.beginPath(); ctx.moveTo(cx, cy + 6); ctx.lineTo(cx, cy + 15); ctx.stroke();

  // Paused
  if (paused) {
    ctx.fillStyle = 'rgba(0,0,0,0.6)'; ctx.fillRect(0, 0, W, H);
    ctx.fillStyle = '#fff'; ctx.font = 'bold 36px monospace'; ctx.textAlign = 'center';
    ctx.fillText('PAUSED', W / 2, H / 2 - 10);
    ctx.fillStyle = '#aaa'; ctx.font = '14px monospace';
    ctx.fillText('Click or press ESC to resume', W / 2, H / 2 + 25);
    ctx.textAlign = 'left';
  }

  // Start screen
  if (startScreen) {
    ctx.fillStyle = 'rgba(0,0,0,0.85)'; ctx.fillRect(0, 0, W, H);
    ctx.textAlign = 'center';

    // Title
    const titlePulse = 0.85 + 0.15 * Math.sin(now * 0.003);
    ctx.globalAlpha = titlePulse;
    ctx.fillStyle = '#ff4'; ctx.font = 'bold 52px monospace';
    ctx.fillText('CHAIN REACTION', W / 2, H / 2 - 120);
    ctx.fillStyle = '#f80'; ctx.font = 'bold 28px monospace';
    ctx.fillText('ARENA', W / 2, H / 2 - 82);
    ctx.globalAlpha = 1;

    // Controls
    ctx.fillStyle = '#aaa'; ctx.font = '14px monospace';
    const controls = [
      'WASD - Move',
      'Mouse - Aim & Shoot',
      'Right-Click / X / Shift - Detonate',
    ];
    let cy = H / 2 - 30;
    for (const line of controls) {
      ctx.fillText(line, W / 2, cy);
      cy += 22;
    }

    // Tips
    ctx.fillStyle = '#f84'; ctx.font = 'bold 13px monospace';
    cy += 10;
    ctx.fillText('Stick bullets to enemies, then DETONATE for chain reactions!', W / 2, cy);
    cy += 18;
    ctx.fillStyle = '#4ff'; ctx.font = '12px monospace';
    ctx.fillText('More stuck bullets = bigger bonus multiplier', W / 2, cy);

    // Start prompt
    const startPulse = 0.5 + 0.5 * Math.sin(now * 0.005);
    ctx.globalAlpha = startPulse;
    ctx.fillStyle = '#fff'; ctx.font = 'bold 22px monospace';
    ctx.fillText('Click to start', W / 2, H / 2 + 130);
    ctx.globalAlpha = 1;

    // High score
    if (highScore > 0) {
      ctx.fillStyle = '#888'; ctx.font = '13px monospace';
      ctx.fillText(`High Score: ${highScore}`, W / 2, H / 2 + 165);
    }

    ctx.textAlign = 'left';
    return;
  }

  // Game over
  if (gameOver) {
    ctx.fillStyle = 'rgba(0,0,0,0.7)'; ctx.fillRect(0, 0, W, H);
    ctx.fillStyle = '#f44'; ctx.font = '48px monospace'; ctx.textAlign = 'center';
    ctx.fillText('GAME OVER', W / 2, H / 2 - 40);
    ctx.fillStyle = '#fff'; ctx.font = '20px monospace';
    ctx.fillText(`Score: ${score}`, W / 2, H / 2);
    if (score >= highScore && score > 0) {
      ctx.fillStyle = '#ff4'; ctx.font = 'bold 16px monospace';
      ctx.fillText('NEW HIGH SCORE!', W / 2, H / 2 + 25);
    }
    ctx.fillStyle = '#888'; ctx.font = '14px monospace';
    ctx.fillText(`Best Combo: ${maxCombo} | Wave: ${waveNum}`, W / 2, H / 2 + 50);
    ctx.fillStyle = '#fff'; ctx.font = '18px monospace';
    ctx.fillText('Press R to restart', W / 2, H / 2 + 80);
    ctx.textAlign = 'left';
  }
}

// ============ GAME LOOP ============
let lastTime = performance.now();
function loop(now) {
  const dt = Math.min((now - lastTime) / 1000, 0.05);
  lastTime = now;
  update(dt);
  draw3D(now);
  drawHUD(now);
  requestAnimationFrame(loop);
}
requestAnimationFrame(loop);
</script>
</body>
</html>
